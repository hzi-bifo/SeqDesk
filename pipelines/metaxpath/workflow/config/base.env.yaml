name: metaxpath
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9
  - flye>=2.9
  - myloasm>=0.4.0
  - kraken2>=2.1.2
  - taxonkit>=0.9.0
  - samtools>=1.15
  - minimap2>=2.24
  - blast>=2.10
  - seqkit>=2.0
  - dsk>=2.3
  - fastp>=0.22
  - sylph>=0.6
  - csvtk>=0.21.0
  - snakemake>=7.0
  - click>=8.0
  - rich-click
  - tqdm>=4.62
  - ete3>=3.1.2
  - pandas>=1.3
  - numpy>=1.21
  - pip:
    - biopython>=1.79
    - tabulate
    - cgecore
    - gitpython
    - python-dateutil
    - pretty_html_table
    - resfinder
    - pyyaml
