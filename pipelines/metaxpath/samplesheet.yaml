samplesheet:
  format: csv
  filename: samplesheet.csv
  rows:
    scope: sample
  columns:
    - name: sample
      source: sample.sampleId
      required: true

    - name: long_reads
      source: read.file1
      filters:
        paired: false
      transform:
        type: prepend_path
        base: "${DATA_BASE_PATH}"
      required: true

    - name: sequencer
      source: order.platform
      transform:
        type: map_value
        mapping:
          ont: Nanopore
          nanopore: Nanopore
          oxford_nanopore: Nanopore
          minion: Nanopore
          gridion: Nanopore
          promethion: Nanopore
          "ont-minion": Nanopore
          "ont-gridion": Nanopore
          "ont-promethion": Nanopore
          pacbio: PacBio
          sequel: PacBio
          revio: PacBio
      required: true

    - name: group
      source: study.id
      required: true
