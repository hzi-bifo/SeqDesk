samplesheet:
  format: csv
  filename: samplesheet.csv
  rows:
    scope: sample
  columns:
    - name: sample
      source: sample.sampleId
      required: true
    - name: short_reads_fastq_1
      source: read.file1
      required: false
    - name: short_reads_fastq_2
      source: read.file2
      required: false
    - name: long_reads_fastq_1
      source: null
      required: false
      default: ""
