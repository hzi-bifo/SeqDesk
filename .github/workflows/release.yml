name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  reviewer-install-gate:
    uses: ./.github/workflows/reviewer-install-matrix.yml
    permissions:
      contents: read

  update-rollback-gate:
    # Block the release on the in-app update + rollback E2E gate: a release cannot
    # publish unless an existing install can update to a new release and roll back
    # without losing data. Runs the real updater path on a PM2 install.
    uses: ./.github/workflows/update-rollback-e2e-ubuntu.yml

  build:
    needs: [reviewer-install-gate, update-rollback-gate]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Download the candidate that passed the reviewer matrix
        uses: actions/download-artifact@v8
        with:
          name: reviewer-candidate
          path: ${{ runner.temp }}/reviewer-candidate

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify and prepare the tested release package
        env:
          CANDIDATE_DIR: ${{ runner.temp }}/reviewer-candidate
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.VERSION }}
          METADATA="$CANDIDATE_DIR/candidate.json"
          CANDIDATE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version" "$METADATA")"
          RELEASE_NAME="$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).releaseTarball" "$METADATA")"
          test "$CANDIDATE_VERSION" = "$VERSION"
          test "$RELEASE_NAME" = "seqdesk-${VERSION}.tar.gz"
          (cd "$CANDIDATE_DIR" && sha256sum -c SHA256SUMS)
          cp "$CANDIDATE_DIR/$RELEASE_NAME" "$RELEASE_NAME"
          sha256sum "seqdesk-${VERSION}.tar.gz" > "seqdesk-${VERSION}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seqdesk-${{ steps.version.outputs.VERSION }}.tar.gz
            seqdesk-${{ steps.version.outputs.VERSION }}.tar.gz.sha256
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
