name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  update-rollback-gate:
    # Block the release on the in-app update + rollback E2E gate: a release cannot
    # publish unless an existing install can update to a new release and roll back
    # without losing data. Runs the real updater path on a PM2 install.
    uses: ./.github/workflows/update-rollback-e2e-ubuntu.yml

  build:
    needs: update-rollback-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public
          DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create release package
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.VERSION }}
          scripts/build-release.sh "$VERSION" --skip-build
          sha256sum "seqdesk-${VERSION}.tar.gz" > "seqdesk-${VERSION}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seqdesk-${{ steps.version.outputs.VERSION }}.tar.gz
            seqdesk-${{ steps.version.outputs.VERSION }}.tar.gz.sha256
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
