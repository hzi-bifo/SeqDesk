name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create release package
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.VERSION }}
          scripts/build-release.sh "$VERSION" --skip-build
          sha256sum "seqdesk-${VERSION}.tar.gz" > "seqdesk-${VERSION}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            seqdesk-${{ steps.version.outputs.VERSION }}.tar.gz
            seqdesk-${{ steps.version.outputs.VERSION }}.tar.gz.sha256
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
