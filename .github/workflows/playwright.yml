name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seqdesk
          POSTGRES_PASSWORD: seqdesk
          POSTGRES_DB: seqdesk_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seqdesk -d seqdesk_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_e2e?schema=public
      DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_e2e?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: seqdesk-playwright-ci-secret
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare database
        run: |
          npm run db:migrate:deploy
          npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install Nextflow
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://get.nextflow.io | bash
          mv nextflow "$HOME/.local/bin/nextflow"
          chmod +x "$HOME/.local/bin/nextflow"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/nextflow" -version

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Playwright results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
