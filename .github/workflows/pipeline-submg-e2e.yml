# Pipeline submg E2E (ENA test server)
#
# Proves the **submg** pipeline actually submits to ENA and writes the returned
# accessions back into SeqDesk's DB — end to end, through the running app.
#
# submg is a custom (non-Nextflow) runner: SeqDesk generates SubMG YAML, runs
# `submg-cli submit` inside a conda env, parses the webin/SubMG receipts and
# persists ENA accessions onto Sample/Read/Assembly rows. This workflow boots the
# built app against a local PostgreSQL, provisions a `submg` conda env (submg from
# source + Java + the ENA Webin-CLI jar), seeds a submittable study, registers it
# on the ENA TEST server, runs submg, then asserts the sample accession was
# written back.
#
# submg only needs outbound network (to wwwdev.ebi.ac.uk) + conda + Postgres, so
# it runs on a GitHub-hosted runner (like the sibling ena-submission-e2e), not the
# self-hosted SLURM runner. Network- and credential-gated, so it is scheduled +
# manual only and self-skips without the ENA_USERNAME / ENA_PWD secrets (a Webin
# TEST account), keeping the workflow green when they are unset.

name: Pipeline submg E2E

on:
  schedule:
    - cron: "30 3 * * 1" # Mondays 03:30 UTC
  workflow_dispatch:
    inputs:
      submit_reads:
        description: "Also submit reads to ENA (heavier webin upload; warn-only)"
        required: false
        default: false
        type: boolean
      submit_assembly:
        description: "Also submit the assembly to ENA (heavier webin upload; warn-only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pipeline-submg-e2e
  cancel-in-progress: false

jobs:
  submg_app_e2e:
    name: Pipeline submg E2E (ENA test server)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -el {0}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      SUBMG_CONDA_ENV: submg
      SUBMG_VERSION: v1.0.3
      PORT: "8897"
      DB_NAME: seqdesk_submg_e2e
      DB_USER: seqdesk
      DB_PASSWORD: seqdesk
      ENA_USERNAME: ${{ secrets.ENA_USERNAME }}
      ENA_PWD: ${{ secrets.ENA_PWD }}
      DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_submg_e2e?schema=public
      DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_submg_e2e?schema=public
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Note when skipped (no ENA secret)
        if: ${{ env.ENA_USERNAME == '' }}
        run: echo "ENA_USERNAME / ENA_PWD secrets are not set — submg ENA E2E will self-skip (workflow stays green)."

      - name: Setup Node.js
        if: ${{ env.ENA_USERNAME != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Miniconda
        if: ${{ env.ENA_USERNAME != '' }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Configure run paths
        if: ${{ env.ENA_USERNAME != '' }}
        run: |
          set -euo pipefail
          {
            echo "SERVER_LOG=$RUNNER_TEMP/server-submg.log"
            echo "SUBMG_E2E_LOG=$RUNNER_TEMP/submg-e2e.log"
            echo "SEQDESK_DATA_DIR=$RUNNER_TEMP/seqdesk-submg-data"
            echo "SEQDESK_RUN_DIR=$RUNNER_TEMP/seqdesk-submg-runs"
            echo "SEQDESK_DB_DIR=$RUNNER_TEMP/seqdesk-submg-dbs"
          } >> "$GITHUB_ENV"

      - name: Start PostgreSQL (throwaway DB)
        if: ${{ env.ENA_USERNAME != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE ${DB_USER} LOGIN PASSWORD '${DB_PASSWORD}'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE ${DB_USER} WITH PASSWORD '${DB_PASSWORD}'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = '${DB_NAME}'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER}"
          fi

      - name: Provision the submg conda environment
        if: ${{ env.ENA_USERNAME != '' }}
        run: |
          set -euo pipefail
          # submg has NO PyPI/bioconda package; it installs from source. The submit
          # command lives under the `submg-cli` entry point and wraps the ENA Webin-CLI
          # Java jar (so the env needs openjdk >=17). pysam (its only C-extension dep)
          # and tk (for the customtkinter import) come from conda so pip never builds.
          # download-webin fetches the Webin jar once now (needs network; the jar lands
          # in the user data dir, so the later app run must share $HOME — it does).
          conda create -y -n "$SUBMG_CONDA_ENV" \
            --override-channels -c conda-forge -c bioconda \
            python=3.11 'openjdk>=17' pip wheel pysam tk
          rm -rf "$RUNNER_TEMP/submg-src"
          git clone --depth 1 --branch "$SUBMG_VERSION" https://github.com/ttubb/submg "$RUNNER_TEMP/submg-src"
          conda run -n "$SUBMG_CONDA_ENV" python -m pip install "$RUNNER_TEMP/submg-src"
          conda run -n "$SUBMG_CONDA_ENV" submg-cli download-webin
          conda run -n "$SUBMG_CONDA_ENV" submg-cli --help >/dev/null
          echo "SEQDESK_CONDA_PATH=$(conda info --base)" >> "$GITHUB_ENV"
          echo "submg ($SUBMG_VERSION) provisioned in env $SUBMG_CONDA_ENV."

      - name: Install dependencies
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm ci

      - name: Generate Prisma client
        if: ${{ env.ENA_USERNAME != '' }}
        run: npx prisma generate

      - name: Apply database migrations
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm run db:migrate:deploy

      - name: Seed database (admin + researcher accounts)
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm run db:seed

      - name: Build SeqDesk app
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm run build

      - name: Boot SeqDesk app and verify readiness
        if: ${{ env.ENA_USERNAME != '' }}
        run: |
          set -euo pipefail
          mkdir -p "$SEQDESK_DATA_DIR" "$SEQDESK_RUN_DIR" "$SEQDESK_DB_DIR"
          export NEXTAUTH_URL="http://127.0.0.1:${PORT}"
          export NEXTAUTH_SECRET="pipeline-submg-e2e-secret"
          export SEQDESK_PIPELINES_ENABLED=true
          export SEQDESK_DATA_PATH="$SEQDESK_DATA_DIR"
          export SEQDESK_PIPELINE_RUN_DIR="$SEQDESK_RUN_DIR"
          export SEQDESK_PIPELINE_DATABASE_DIR="$SEQDESK_DB_DIR"
          # submg runs LOCALLY (the ENA submission needs outbound network); it activates
          # the provisioned conda env by name to find submg-cli + the Webin jar.
          export SEQDESK_CONDA_ENABLED=true
          export SEQDESK_CONDA_PATH="$SEQDESK_CONDA_PATH"
          export SEQDESK_CONDA_ENV="$SUBMG_CONDA_ENV"
          echo "[boot] SEQDESK_CONDA_PATH=$SEQDESK_CONDA_PATH SEQDESK_CONDA_ENV=$SEQDESK_CONDA_ENV"
          PORT="$PORT" npm run start >"$SERVER_LOG" 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >/dev/null; then READY=1; break; fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time." >&2
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          echo "SeqDesk app is ready on port $PORT."

      - name: Run submg ENA E2E (against the ENA TEST server)
        if: ${{ env.ENA_USERNAME != '' }}
        env:
          SEQDESK_SUBMG_E2E_BASE_URL: http://127.0.0.1:8897
          SEQDESK_SUBMG_E2E_EMAIL: admin@example.com
          SEQDESK_SUBMG_E2E_PASSWORD: admin
          SEQDESK_SUBMG_E2E_CONDA_ENV: submg
          SEQDESK_SUBMG_E2E_SUBMIT_READS: ${{ github.event.inputs.submit_reads || 'false' }}
          SEQDESK_SUBMG_E2E_SUBMIT_ASSEMBLY: ${{ github.event.inputs.submit_assembly || 'false' }}
        run: |
          set -euo pipefail
          npm run pipeline:e2e:submg 2>&1 | tee "$SUBMG_E2E_LOG"

      - name: Collect submg run diagnostics
        if: ${{ always() && env.ENA_USERNAME != '' }}
        run: |
          set +e
          if [ -n "${SEQDESK_RUN_DIR:-}" ] && [ -d "$SEQDESK_RUN_DIR" ]; then
            find "$SEQDESK_RUN_DIR" -maxdepth 5 -printf '%y %10s  %p\n' 2>/dev/null | head -200
            find "$SEQDESK_RUN_DIR" -type f \( \
                 -name 'pipeline.out' -o -name 'pipeline.err' -o -name 'run.sh' \
              -o -name 'submg-metadata.json' -o -name 'output_*' -o -name 'error_*' \
              -o -name 'submg.log' -o -name 'sample_preliminary_accessions.txt' -o -name 'webin-cli.report' \) 2>/dev/null \
            | while IFS= read -r f; do
                echo "::group::$f"; sed -n '1,300p' "$f"; echo "::endgroup::"
              done
          else
            echo "No run dir at '${SEQDESK_RUN_DIR:-<unset>}'."
          fi
          echo "::group::server.log (tail)"; tail -n 120 "${SERVER_LOG:-/dev/null}" 2>/dev/null; echo "::endgroup::"
          true

      - name: Stop SeqDesk app
        if: ${{ always() && env.ENA_USERNAME != '' }}
        run: |
          set +e
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          fi

      - name: Upload submg E2E artifacts
        if: ${{ always() && env.ENA_USERNAME != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-submg-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SERVER_LOG }}
            ${{ env.SUBMG_E2E_LOG }}
            ${{ env.SEQDESK_RUN_DIR }}
          if-no-files-found: warn
          retention-days: 14
