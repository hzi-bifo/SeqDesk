# Pipeline submg E2E (ENA test server)
#
# Proves the **submg** pipeline actually submits to ENA and writes the returned
# accessions back into SeqDesk's DB — end to end, through the running app.
#
# submg is a custom (non-Nextflow) runner: SeqDesk generates SubMG YAML, runs
# `submg-cli submit` inside a conda env, parses the webin/SubMG receipts and
# persists ENA accessions onto Sample/Read/Assembly rows. This workflow boots the
# built app against a local PostgreSQL, provisions a `submg` conda env (submg from
# source + Java + the ENA Webin-CLI jar), seeds a submittable study, registers it
# on the ENA TEST server, runs submg, then asserts the sample accession was
# written back.
#
# submg only needs outbound network (to wwwdev.ebi.ac.uk) + conda + Postgres, so
# it runs on a GitHub-hosted runner (like the sibling ena-submission-e2e), not the
# self-hosted SLURM runner. Network- and credential-gated, so it is scheduled +
# manual only and self-skips without the ENA_USERNAME / ENA_PWD secrets (a Webin
# TEST account), keeping the workflow green when they are unset.

name: Pipeline submg E2E

on:
  schedule:
    - cron: "30 3 * * 1" # Mondays 03:30 UTC
  workflow_dispatch:
    inputs:
      submit_reads:
        description: "Also submit reads to ENA (heavier webin upload; warn-only)"
        required: false
        default: false
        type: boolean
      submit_assembly:
        description: "Also submit the assembly to ENA (heavier webin upload; warn-only)"
        required: false
        default: false
        type: boolean
      run_human_gut:
        description: "Run the REAL human-gut shotgun study (PRJEB54724): download ~712 MB of real reads, MEGAHIT-assemble, and submit reads + assembly to the ENA TEST server"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pipeline-submg-e2e-gh
  cancel-in-progress: false

jobs:
  submg_app_e2e:
    name: Pipeline submg E2E (ENA test server)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      SUBMG_CONDA_ENV: submg
      SUBMG_VERSION: v1.0.3
      PORT: "8897"
      DB_NAME: seqdesk_submg_e2e
      DB_USER: seqdesk
      DB_PASSWORD: seqdesk
      ENA_USERNAME: ${{ secrets.ENA_USERNAME }}
      ENA_PWD: ${{ secrets.ENA_PWD }}
      DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_submg_e2e?schema=public
      DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_submg_e2e?schema=public
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Note when skipped (no ENA secret)
        if: ${{ env.ENA_USERNAME == '' }}
        run: echo "ENA_USERNAME / ENA_PWD secrets are not set — submg ENA E2E will self-skip (workflow stays green)."

      - name: Setup Node.js
        if: ${{ env.ENA_USERNAME != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Miniconda
        if: ${{ env.ENA_USERNAME != '' }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Configure run paths
        if: ${{ env.ENA_USERNAME != '' }}
        run: |
          set -euo pipefail
          {
            echo "SERVER_LOG=$RUNNER_TEMP/server-submg.log"
            echo "SUBMG_E2E_LOG=$RUNNER_TEMP/submg-e2e.log"
            echo "SEQDESK_DATA_DIR=$RUNNER_TEMP/seqdesk-submg-data"
            echo "SEQDESK_RUN_DIR=$RUNNER_TEMP/seqdesk-submg-runs"
            echo "SEQDESK_DB_DIR=$RUNNER_TEMP/seqdesk-submg-dbs"
          } >> "$GITHUB_ENV"

      - name: Start PostgreSQL (throwaway DB)
        if: ${{ env.ENA_USERNAME != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE ${DB_USER} LOGIN PASSWORD '${DB_PASSWORD}'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE ${DB_USER} WITH PASSWORD '${DB_PASSWORD}'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = '${DB_NAME}'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER}"
          fi

      - name: Provision the submg conda environment
        if: ${{ env.ENA_USERNAME != '' }}
        run: |
          set -euo pipefail
          # submg has NO PyPI/bioconda package; it installs from source. The submit
          # command lives under the `submg-cli` entry point and wraps the ENA Webin-CLI
          # Java jar (so the env needs openjdk >=17). pysam (its only C-extension dep)
          # and tk (for the customtkinter import) come from conda so pip never builds.
          # download-webin fetches the Webin jar once now (needs network; the jar lands
          # in the user data dir, so the later app run must share $HOME — it does).
          conda create -y -n "$SUBMG_CONDA_ENV" \
            --override-channels -c conda-forge -c bioconda \
            python=3.11 'openjdk>=17' pip wheel pysam tk megahit=1.2.9
          rm -rf "$RUNNER_TEMP/submg-src"
          git clone --depth 1 --branch "$SUBMG_VERSION" https://github.com/ttubb/submg "$RUNNER_TEMP/submg-src"
          conda run -n "$SUBMG_CONDA_ENV" python -m pip install "$RUNNER_TEMP/submg-src"
          conda run -n "$SUBMG_CONDA_ENV" submg-cli download-webin
          conda run -n "$SUBMG_CONDA_ENV" submg-cli --help >/dev/null
          echo "SEQDESK_CONDA_PATH=$(conda info --base)" >> "$GITHUB_ENV"
          echo "submg ($SUBMG_VERSION) provisioned in env $SUBMG_CONDA_ENV."

      - name: Install dependencies
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm ci

      - name: Generate Prisma client
        if: ${{ env.ENA_USERNAME != '' }}
        run: npx prisma generate

      - name: Apply database migrations
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm run db:migrate:deploy

      - name: Seed database (admin + researcher accounts)
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm run db:seed

      - name: Build SeqDesk app
        if: ${{ env.ENA_USERNAME != '' }}
        run: npm run build

      - name: Boot SeqDesk app and verify readiness
        if: ${{ env.ENA_USERNAME != '' }}
        run: |
          set -euo pipefail
          mkdir -p "$SEQDESK_DATA_DIR" "$SEQDESK_RUN_DIR" "$SEQDESK_DB_DIR"
          export NEXTAUTH_URL="http://127.0.0.1:${PORT}"
          export NEXTAUTH_SECRET="pipeline-submg-e2e-secret"
          export SEQDESK_PIPELINES_ENABLED=true
          export SEQDESK_DATA_PATH="$SEQDESK_DATA_DIR"
          export SEQDESK_PIPELINE_RUN_DIR="$SEQDESK_RUN_DIR"
          export SEQDESK_PIPELINE_DATABASE_DIR="$SEQDESK_DB_DIR"
          # submg runs LOCALLY (the ENA submission needs outbound network); it activates
          # the provisioned conda env by name to find submg-cli + the Webin jar.
          export SEQDESK_CONDA_ENABLED=true
          export SEQDESK_CONDA_PATH="$SEQDESK_CONDA_PATH"
          export SEQDESK_CONDA_ENV="$SUBMG_CONDA_ENV"
          echo "[boot] SEQDESK_CONDA_PATH=$SEQDESK_CONDA_PATH SEQDESK_CONDA_ENV=$SEQDESK_CONDA_ENV"
          PORT="$PORT" npm run start >"$SERVER_LOG" 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >/dev/null; then READY=1; break; fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time." >&2
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          echo "SeqDesk app is ready on port $PORT."

      - name: Run submg ENA E2E (against the ENA TEST server)
        if: ${{ env.ENA_USERNAME != '' }}
        env:
          SEQDESK_SUBMG_E2E_BASE_URL: http://127.0.0.1:8897
          SEQDESK_SUBMG_E2E_EMAIL: admin@example.com
          SEQDESK_SUBMG_E2E_PASSWORD: admin
          SEQDESK_SUBMG_E2E_CONDA_ENV: submg
          SEQDESK_SUBMG_E2E_MEGAHIT_BIN: ${{ env.SEQDESK_CONDA_PATH }}/envs/submg/bin/megahit
          SEQDESK_SUBMG_E2E_SUBMIT_READS: ${{ github.event.inputs.submit_reads || 'false' }}
          SEQDESK_SUBMG_E2E_SUBMIT_ASSEMBLY: ${{ github.event.inputs.submit_assembly || 'false' }}
        run: |
          set -euo pipefail
          npm run pipeline:e2e:submg 2>&1 | tee "$SUBMG_E2E_LOG"

      # Samples + READS + ASSEMBLY: the full "mag → submg" handoff. submg submits the
      # reads (→ ENA run accessions), then the mag-produced assembly referencing those
      # runs (submg requires ASSEMBLY|RUN_ACCESSIONS, which it derives from the read
      # submission), and SeqDesk takes up the read + assembly accessions (ERR/ERZ).
      # Warn-only (continue-on-error) while the heavier webin uploads from a hosted
      # runner + ENA validation are proven out; the samples legs above/below remain the
      # hard gates. Runs on the still-up source-boot app, on a second seeded study.
      - name: Run submg WITH reads + assembly submission (mag-style → ENA, warn-only)
        if: ${{ env.ENA_USERNAME != '' }}
        continue-on-error: true
        env:
          SEQDESK_SUBMG_E2E_BASE_URL: http://127.0.0.1:8897
          SEQDESK_SUBMG_E2E_EMAIL: admin@example.com
          SEQDESK_SUBMG_E2E_PASSWORD: admin
          SEQDESK_SUBMG_E2E_CONDA_ENV: submg
          SEQDESK_SUBMG_E2E_MEGAHIT_BIN: ${{ env.SEQDESK_CONDA_PATH }}/envs/submg/bin/megahit
          SEQDESK_SUBMG_E2E_SUBMIT_READS: "true"
          SEQDESK_SUBMG_E2E_SUBMIT_ASSEMBLY: "true"
        run: |
          set -euo pipefail
          npm run pipeline:e2e:submg 2>&1 | tee "$RUNNER_TEMP/submg-assembly.log"

      # ── GOAL: REAL human-gut shotgun study → REAL MEGAHIT assembly → ENA TEST ──────
      # Opt-in (run_human_gut), since it downloads ~712 MB of real reads. Seeds the real
      # human-gut shotgun example dataset (12 public ENA PRJEB54724 paired WGS samples),
      # assembles one sample with MEGAHIT (nf-core/mag's assembler, more threads/time than
      # the dummy leg needs), registers the study on ENA TEST, then submits the REAL reads
      # + REAL assembly to the ENA test server and asserts the ERR/ERZ accessions come back.
      # HARD gate (not warn-only): this is the success criterion — a real reads+assembly
      # submission to the ENA test server succeeding.
      - name: Run submg on the REAL human-gut shotgun study (reads + MEGAHIT assembly → ENA TEST)
        if: ${{ env.ENA_USERNAME != '' && github.event_name == 'workflow_dispatch' && inputs.run_human_gut == true }}
        env:
          SEQDESK_SUBMG_E2E_BASE_URL: http://127.0.0.1:8897
          SEQDESK_SUBMG_E2E_EMAIL: admin@example.com
          SEQDESK_SUBMG_E2E_PASSWORD: admin
          SEQDESK_SUBMG_E2E_CONDA_ENV: submg
          SEQDESK_SUBMG_E2E_MEGAHIT_BIN: ${{ env.SEQDESK_CONDA_PATH }}/envs/submg/bin/megahit
          SEQDESK_SUBMG_E2E_EXAMPLE_DATASET: human-gut-prjeb54724
          SEQDESK_SUBMG_E2E_STUDY_ALIAS: human-gut-shotgun-prjeb54724-ci
          SEQDESK_SUBMG_E2E_SUBMIT_READS: "true"
          SEQDESK_SUBMG_E2E_SUBMIT_ASSEMBLY: "true"
          SEQDESK_SUBMG_E2E_MEGAHIT_THREADS: "4"
          SEQDESK_SUBMG_E2E_MEGAHIT_TIMEOUT_SEC: "1200"
          SEQDESK_SUBMG_E2E_TIMEOUT_SECONDS: "1800"
        run: |
          set -euo pipefail
          npm run pipeline:e2e:submg 2>&1 | tee "$RUNNER_TEMP/submg-human-gut.log"
          echo "=== human-gut submission summary ==="
          grep -iE "Built REAL mag MEGAHIT assembly|wrote read accession|wrote assembly accession" "$RUNNER_TEMP/submg-human-gut.log" || true

      # Proof on the *installed* app (the realistic facility flow): install a
      # source-built release via the npm launcher + a mock release server, then run
      # the same submg integration against that installed instance and assert SeqDesk
      # ingests the ENA response into its DB. Installs from THIS source (not
      # seqdesk@latest) so the submg-runner fixes are present.
      - name: Install SeqDesk and run submg on the installed app
        if: ${{ env.ENA_USERNAME != '' }}
        env:
          SEQDESK_SUBMG_E2E_EMAIL: admin@example.com
          SEQDESK_SUBMG_E2E_PASSWORD: admin
          SEQDESK_SUBMG_E2E_CONDA_ENV: submg
          SEQDESK_SUBMG_E2E_MEGAHIT_BIN: ${{ env.SEQDESK_CONDA_PATH }}/envs/submg/bin/megahit
          SEQDESK_SUBMG_E2E_SUBMIT_READS: ${{ github.event.inputs.submit_reads || 'false' }}
          SEQDESK_SUBMG_E2E_SUBMIT_ASSEMBLY: ${{ github.event.inputs.submit_assembly || 'false' }}
        run: |
          set -euo pipefail
          # Free the source-boot app first (one app per host; avoids any .next contention
          # while build-release.sh rebuilds).
          if [ -n "${APP_PID:-}" ]; then kill "$APP_PID" >/dev/null 2>&1 || true; fi

          VERSION="$(node -p "require('./package.json').version")"
          WORK="$RUNNER_TEMP/install-submg"
          APP_DIR="$WORK/app"; MOCK_ROOT="$WORK/mock"; NPM_PREFIX="$WORK/npm-prefix"
          INSTALLED_PORT=$((PORT + 1)); MOCK_PORT=$((PORT + 2))
          INSTALLED_DATA="$WORK/data"; INSTALLED_RUNS="$WORK/runs"
          INSTALLED_DB_NAME="${DB_NAME}_installed"
          INSTALLED_DB_URL="postgresql://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5432/${INSTALLED_DB_NAME}?schema=public"
          echo "INSTALLED_RUNS=$INSTALLED_RUNS" >> "$GITHUB_ENV"
          rm -rf "$WORK"
          mkdir -p "$MOCK_ROOT/api" "$MOCK_ROOT/downloads" "$INSTALLED_DATA" "$INSTALLED_RUNS" "$NPM_PREFIX"

          echo "=== create a fresh DB for the installed app ==="
          sudo -u postgres psql -c "DROP DATABASE IF EXISTS ${INSTALLED_DB_NAME}" -c "CREATE DATABASE ${INSTALLED_DB_NAME} OWNER ${DB_USER}"

          echo "=== build release tarball + npm launcher ==="
          bash "$GITHUB_WORKSPACE/scripts/build-release.sh" "$VERSION" --offline-fonts --webpack
          cp "$GITHUB_WORKSPACE/seqdesk-${VERSION}.tar.gz" "$MOCK_ROOT/downloads/"
          cp "$GITHUB_WORKSPACE/scripts/install-dist.sh" "$MOCK_ROOT/install.sh"
          CHECKSUM="sha256:$(sha256sum "$MOCK_ROOT/downloads/seqdesk-${VERSION}.tar.gz" | cut -d' ' -f1)"
          printf '{"latest":{"version":"%s","channel":"stable","releaseDate":"%s","downloadUrl":"http://127.0.0.1:%s/downloads/seqdesk-%s.tar.gz","checksum":"%s","minNodeVersion":"18.0.0"},"updateAvailable":false}' \
            "$VERSION" "$(date -u +%F)" "$MOCK_PORT" "$VERSION" "$CHECKSUM" > "$MOCK_ROOT/api/version"
          ( cd "$GITHUB_WORKSPACE/npm/seqdesk" && npm run sync-version >/dev/null 2>&1 && npm pack --pack-destination "$WORK" >/dev/null )
          NPM_TGZ="$(find "$WORK" -maxdepth 1 -name 'seqdesk-*.tgz' | head -n1)"
          npm install -g "$NPM_TGZ" --prefix "$NPM_PREFIX" --cache "$WORK/npm-cache" >/dev/null

          echo "=== start mock release server ==="
          ( cd "$MOCK_ROOT" && exec python3 -m http.server "$MOCK_PORT" --bind 127.0.0.1 >"$WORK/mock.log" 2>&1 ) &
          MOCK_PID=$!
          for _ in $(seq 1 30); do curl -fsS "http://127.0.0.1:$MOCK_PORT/api/version" >/dev/null 2>&1 && break; sleep 1; done

          echo "=== install (with pipelines + conda configured for submg) ==="
          PATH="$NPM_PREFIX/bin:$PATH" \
          SEQDESK_API="http://127.0.0.1:$MOCK_PORT/api" \
          SEQDESK_INSTALL_URL="http://127.0.0.1:$MOCK_PORT/install.sh" \
          SEQDESK_LOG="$WORK/install.log" \
          SEQDESK_EXEC_CONDA_PATH="$SEQDESK_CONDA_PATH" \
          SEQDESK_EXEC_CONDA_ENV="$SUBMG_CONDA_ENV" \
            seqdesk -y --no-pm2 --with-pipelines \
              --dir "$APP_DIR" --port "$INSTALLED_PORT" \
              --data-path "$INSTALLED_DATA" --run-dir "$INSTALLED_RUNS" \
              --nextauth-url "http://127.0.0.1:$INSTALLED_PORT" \
              --database-url "$INSTALLED_DB_URL" --database-direct-url "$INSTALLED_DB_URL"
          kill "$MOCK_PID" >/dev/null 2>&1 || true
          test -x "$APP_DIR/start.sh"

          echo "=== boot the installed app (conda configured for the local submg run) ==="
          ( cd "$APP_DIR"
            export DATABASE_URL="$INSTALLED_DB_URL" DIRECT_URL="$INSTALLED_DB_URL"
            export SEQDESK_CONDA_ENABLED=true SEQDESK_CONDA_PATH="$SEQDESK_CONDA_PATH" SEQDESK_CONDA_ENV="$SUBMG_CONDA_ENV"
            export SEQDESK_PIPELINE_RUN_DIR="$INSTALLED_RUNS" SEQDESK_DATA_PATH="$INSTALLED_DATA"
            exec ./start.sh "$INSTALLED_PORT" ) >"$WORK/server.log" 2>&1 &
          INSTALLED_APP_PID=$!
          READY=0
          for _ in $(seq 1 90); do curl -fsS "http://127.0.0.1:$INSTALLED_PORT/api/auth/providers" >/dev/null 2>&1 && { READY=1; break; }; sleep 2; done
          if [ "$READY" -ne 1 ]; then echo "Installed app did not become ready." >&2; tail -n 200 "$WORK/server.log" || true; exit 1; fi

          echo "=== run the submg integration against the INSTALLED app ==="
          # Capture the DRIVER's own exit via PIPESTATUS[0] (tee can report a spurious
          # non-zero when the driver's process.exit closes the pipe). Stop the installed
          # app before the conditional so a leftover background job can't perturb the
          # step's own exit, and only fail explicitly — the success path ends naturally.
          set +e +o pipefail
          DATABASE_URL="$INSTALLED_DB_URL" DIRECT_URL="$INSTALLED_DB_URL" \
          SEQDESK_SUBMG_E2E_BASE_URL="http://127.0.0.1:$INSTALLED_PORT" \
            npm run pipeline:e2e:submg 2>&1 | tee "$WORK/submg-installed.log"
          rc=${PIPESTATUS[0]}
          kill "$INSTALLED_APP_PID" >/dev/null 2>&1 || true
          wait "$INSTALLED_APP_PID" 2>/dev/null || true
          set -e -o pipefail
          echo "installed-app submg driver exit code: $rc"
          if [ "$rc" != "0" ]; then
            echo "--- installed-app submg run logs ---"
            find "$INSTALLED_RUNS" -type f \( -name 'pipeline.out' -o -name 'pipeline.err' -o -name 'run.sh' \
              -o -name 'output_*' -o -name 'error_*' -o -name 'submg.log' -o -name 'sample_preliminary_accessions.txt' \) 2>/dev/null \
              | while IFS= read -r f; do echo "::group::$f"; sed -n '1,200p' "$f"; echo "::endgroup::"; done
            echo "::group::installed server.log (tail)"; tail -n 150 "$WORK/server.log" 2>/dev/null; echo "::endgroup::"
            echo "::group::install.log (tail)"; tail -n 80 "$WORK/install.log" 2>/dev/null; echo "::endgroup::"
            exit 1
          fi
          echo "submg integration verified on the installed app."

      - name: Collect submg run diagnostics
        if: ${{ always() && env.ENA_USERNAME != '' }}
        run: |
          set +e
          if [ -n "${SEQDESK_RUN_DIR:-}" ] && [ -d "$SEQDESK_RUN_DIR" ]; then
            find "$SEQDESK_RUN_DIR" -maxdepth 5 -printf '%y %10s  %p\n' 2>/dev/null | head -200
            find "$SEQDESK_RUN_DIR" -type f \( \
                 -name 'pipeline.out' -o -name 'pipeline.err' -o -name 'run.sh' \
              -o -name 'submg-metadata.json' -o -name 'output_*' -o -name 'error_*' \
              -o -name 'submg.log' -o -name 'sample_preliminary_accessions.txt' -o -name 'webin-cli.report' \) 2>/dev/null \
            | while IFS= read -r f; do
                echo "::group::$f"; sed -n '1,300p' "$f"; echo "::endgroup::"
              done
          else
            echo "No run dir at '${SEQDESK_RUN_DIR:-<unset>}'."
          fi
          echo "::group::server.log (tail)"; tail -n 120 "${SERVER_LOG:-/dev/null}" 2>/dev/null; echo "::endgroup::"
          true

      - name: Stop SeqDesk app
        if: ${{ always() && env.ENA_USERNAME != '' }}
        run: |
          set +e
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          fi

      - name: Upload submg E2E artifacts
        if: ${{ always() && env.ENA_USERNAME != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-submg-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SERVER_LOG }}
            ${{ env.SUBMG_E2E_LOG }}
            ${{ runner.temp }}/submg-assembly.log
            ${{ env.SEQDESK_RUN_DIR }}
            ${{ env.INSTALLED_RUNS }}
            ${{ runner.temp }}/install-submg/submg-installed.log
            ${{ runner.temp }}/install-submg/server.log
            ${{ runner.temp }}/install-submg/install.log
          if-no-files-found: warn
          retention-days: 5
