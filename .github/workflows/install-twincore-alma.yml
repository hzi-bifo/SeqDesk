name: Install Twincore Instance (Alma Linux)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-twincore-alma
  cancel-in-progress: false

jobs:
  install-twincore-alma:
    name: Side-by-side canary install on Twincore AlmaLinux
    runs-on: [self-hosted, linux, twincore, alma]
    timeout-minutes: 45
    env:
      DB_HOST: 127.0.0.1
      DB_NAME: seqdesk
      DB_PASSWORD: seqdesk
      DB_PORT: 5432
      DB_USER: seqdesk
      FALLBACK_DB_PORT: 55432
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure canary paths
        run: |
          echo "PORT=18887" >> "$GITHUB_ENV"
          echo "CANARY_DIR=$RUNNER_TEMP/seqdesk-twincore-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "INFRA_CONFIG=$RUNNER_TEMP/infrastructure-twincore.json" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/install-twincore.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/server-twincore.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/providers-twincore.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/seqdesk-twincore.config.json" >> "$GITHUB_ENV"
          echo "STORE_SMOKE_JSON=$RUNNER_TEMP/store-smoke-twincore.json" >> "$GITHUB_ENV"
          echo "PGDATA_DIR=$RUNNER_TEMP/postgres-twincore-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "PG_LOG=$RUNNER_TEMP/postgres-twincore.log" >> "$GITHUB_ENV"

      - name: Ensure PostgreSQL database
        run: |
          set -euo pipefail

          if pg_isready -h "$DB_HOST" -p "$DB_PORT" >/dev/null 2>&1 && \
             PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -tAc "SELECT 1" >/dev/null 2>&1; then
            echo "Using existing local PostgreSQL seqdesk database."
            exit 0
          fi

          if ! command -v initdb >/dev/null 2>&1 || ! command -v pg_ctl >/dev/null 2>&1; then
            echo "PostgreSQL provisioning requires either an existing local seqdesk database or local initdb/pg_ctl binaries on this self-hosted runner."
            echo "This workflow no longer uses sudo. Pre-create the database or install PostgreSQL server tools for unprivileged startup."
            exit 1
          fi

          rm -rf "$PGDATA_DIR"
          initdb -D "$PGDATA_DIR" -U postgres -A trust >/dev/null
          {
            echo "listen_addresses = '127.0.0.1'"
            echo "port = $FALLBACK_DB_PORT"
          } >> "$PGDATA_DIR/postgresql.conf"
          pg_ctl -D "$PGDATA_DIR" -l "$PG_LOG" start

          for _ in $(seq 1 30); do
            if pg_isready -h "$DB_HOST" -p "$FALLBACK_DB_PORT" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          psql -h "$DB_HOST" -p "$FALLBACK_DB_PORT" -U postgres -d postgres -c "DO \$\$ BEGIN CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASSWORD'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE $DB_USER WITH PASSWORD '$DB_PASSWORD'; END \$\$;"
          if ! psql -h "$DB_HOST" -p "$FALLBACK_DB_PORT" -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1; then
            psql -h "$DB_HOST" -p "$FALLBACK_DB_PORT" -U postgres -d postgres -c "CREATE DATABASE $DB_NAME OWNER $DB_USER"
          fi

          echo "DB_PORT=$FALLBACK_DB_PORT" >> "$GITHUB_ENV"
          echo "USE_EPHEMERAL_POSTGRES=1" >> "$GITHUB_ENV"
          echo "Provisioned PostgreSQL via temporary user-space cluster on port $FALLBACK_DB_PORT."

      - name: Create infrastructure JSON
        run: |
          cat > "$INFRA_CONFIG" <<EOF
          {
            "port": $PORT,
            "pipelinesEnabled": false,
            "nextAuthUrl": "http://127.0.0.1:$PORT",
            "databaseUrl": "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public",
            "directUrl": "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public"
          }
          EOF

      - name: Install canary side-by-side (source installer, headless)
        run: |
          set -euo pipefail
          SEQDESK_LOG="$INSTALL_LOG" bash "$GITHUB_WORKSPACE/scripts/install.sh" \
            -y \
            --without-pipelines \
            --branch "$GITHUB_REF_NAME" \
            --dir "$CANARY_DIR" \
            --config "$INFRA_CONFIG"

      - name: Verify install artifacts
        run: |
          set -euo pipefail
          test -f "$CANARY_DIR/package.json"
          test -f "$CANARY_DIR/seqdesk.config.json"
          test -x "$CANARY_DIR/start.sh"
          cp "$CANARY_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"

      - name: Validate installed config values
        run: |
          set -euo pipefail
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$CANARY_DIR/seqdesk.config.json" \
            --expected-port "$PORT"

      - name: Verify canary app startup, auth flows, and pipeline store
        run: |
          set -euo pipefail
          cd "$CANARY_DIR"

          ./start.sh "$PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          READY=0
          for _ in $(seq 1 180); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-smoke.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"
          node "$GITHUB_WORKSPACE/scripts/run-auth-smoke.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"
          node "$GITHUB_WORKSPACE/scripts/run-pipeline-store-smoke.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --pipeline-ids "mag,submg" \
            --result-file "$STORE_SMOKE_JSON"

      - name: Upload canary install artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-twincore-alma
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.STORE_SMOKE_JSON }}
            ${{ env.PG_LOG }}
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup canary directory
        if: always()
        run: |
          if [ "${USE_EPHEMERAL_POSTGRES:-0}" = "1" ] && [ -n "${PGDATA_DIR:-}" ]; then
            pg_ctl -D "$PGDATA_DIR" stop -m fast || true
            rm -rf "$PGDATA_DIR"
          fi
          rm -rf "$CANARY_DIR"
