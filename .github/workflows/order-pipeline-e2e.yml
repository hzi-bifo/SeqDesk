name: Order Pipeline End-to-End

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_github_hosted:
        description: Run the end-to-end test on GitHub-hosted Ubuntu first
        required: true
        default: true
        type: boolean
      run_self_hosted:
        description: Run the same end-to-end test on the Twincore self-hosted runner after GitHub-hosted passes
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  github_hosted:
    name: Order Pipeline E2E (GitHub-hosted)
    if: ${{ github.event_name == 'push' || inputs.run_github_hosted }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -el {0}
    env:
      PIPELINE_CONDA_ENV: seqdesk-pipelines-ci-${{ github.run_id }}-gh
      PIPELINE_E2E_RUNNER_LABEL: github-hosted
      PIPELINE_E2E_WORKFLOW_LABEL: Order Pipeline End-to-End

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set runtime paths
        run: |
          echo "PIPELINE_E2E_TMPDIR=$RUNNER_TEMP/order-pipeline-e2e-gh" >> "$GITHUB_ENV"
          echo "NXF_HOME=$RUNNER_TEMP/.nextflow-gh" >> "$GITHUB_ENV"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Create pipeline Conda environment
        run: |
          conda create -y -n "$PIPELINE_CONDA_ENV" \
            --override-channels \
            -c conda-forge \
            -c bioconda \
            python=3.11 \
            openjdk=17 \
            nodejs \
            coreutils \
            nextflow \
            nf-core

      - name: Run order pipeline end-to-end
        run: bash scripts/run-order-pipeline-e2e.sh --keep-temp

      - name: Publish order pipeline summary
        if: ${{ always() }}
        run: |
          if [[ -f "$PIPELINE_E2E_TMPDIR/ORDER_PIPELINE_E2E_SUMMARY.md" ]]; then
            cat "$PIPELINE_E2E_TMPDIR/ORDER_PIPELINE_E2E_SUMMARY.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload order pipeline outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: order-pipeline-e2e-github-hosted
          path: ${{ runner.temp }}/order-pipeline-e2e-gh
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup Conda environment
        if: ${{ always() }}
        run: |
          conda env remove -n "$PIPELINE_CONDA_ENV" || true
          rm -rf "$PIPELINE_E2E_TMPDIR" "$NXF_HOME"

  self_hosted:
    name: Order Pipeline E2E (Self-hosted Twincore)
    needs: github_hosted
    # Self-hosted leg runs only on the private CI mirror (auto on its mirrored push).
    if: ${{ github.repository == 'hzi-bifo/SeqDesk-ci' && (needs.github_hosted.result == 'success' || needs.github_hosted.result == 'skipped') }}
    runs-on:
      group: bifo_dmz
      labels: [self-hosted, Linux, X64, db-local, twincore, alma]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash -el {0}
    env:
      PIPELINE_CONDA_ENV: seqdesk-pipelines-ci-${{ github.run_id }}-twincore
      PIPELINE_E2E_RUNNER_LABEL: self-hosted-twincore
      PIPELINE_E2E_WORKFLOW_LABEL: Order Pipeline End-to-End

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set runtime paths
        run: |
          echo "PIPELINE_E2E_TMPDIR=$RUNNER_TEMP/order-pipeline-e2e-twincore" >> "$GITHUB_ENV"
          echo "NXF_HOME=$RUNNER_TEMP/.nextflow-twincore" >> "$GITHUB_ENV"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Create pipeline Conda environment
        run: |
          conda create -y -n "$PIPELINE_CONDA_ENV" \
            --override-channels \
            -c conda-forge \
            -c bioconda \
            python=3.11 \
            openjdk=17 \
            nodejs \
            coreutils \
            nextflow \
            nf-core

      - name: Run order pipeline end-to-end
        run: bash scripts/run-order-pipeline-e2e.sh --keep-temp

      - name: Publish order pipeline summary
        if: ${{ always() }}
        run: |
          if [[ -f "$PIPELINE_E2E_TMPDIR/ORDER_PIPELINE_E2E_SUMMARY.md" ]]; then
            cat "$PIPELINE_E2E_TMPDIR/ORDER_PIPELINE_E2E_SUMMARY.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload order pipeline outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: order-pipeline-e2e-self-hosted
          path: ${{ runner.temp }}/order-pipeline-e2e-twincore
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup Conda environment
        if: ${{ always() }}
        run: |
          conda env remove -n "$PIPELINE_CONDA_ENV" || true
          rm -rf "$PIPELINE_E2E_TMPDIR" "$NXF_HOME"

  writeback_integration:
    name: Order Writeback Integration (read-cleaning promotion)
    if: ${{ github.event_name == 'push' || inputs.run_github_hosted }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seqdesk
          POSTGRES_PASSWORD: seqdesk
          POSTGRES_DB: seqdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seqdesk -d seqdesk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_test?schema=public
      DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_test?schema=public
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      # Exercises the order read-cleaning -> candidate -> admin promotion writeback
      # path end-to-end against a real database (no detaxizer/kraken2 required).
      - name: Run read-cleaning promotion integration test
        run: npm run test:live -- src/lib/pipelines/pending-writebacks.live.test.ts
