name: Alma Install E2E

on:
  # Runs once a day on the private mirror (jobs are guarded to SeqDesk-ci), plus
  # on demand — not on every commit.
  schedule:
    - cron: "0 4 * * *" # daily 04:00 UTC (staggered after the SLURM run)
  workflow_dispatch:
    inputs:
      profile_id:
        description: "Hosted install profile id"
        required: true
        default: "ci-runner"
      profile_registry_url:
        description: "Hosted profile registry URL"
        required: true
        default: "https://seqdesk.org/api/install-profiles"
      subsample_reads:
        description: "SHORT run: subsample the Gemma reads to this fraction (e.g. 0.1) so metaxpath finishes in ~30-60min. Empty = full run (the canonical validation)."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: alma-install-e2e-${{ github.event.inputs.profile_id || 'ci-runner' }}
  cancel-in-progress: false

jobs:
  build-install-artifacts:
    name: Build release and npm launcher artifacts
    # The whole Alma E2E (build + self-hosted installs) runs only on the private CI mirror.
    if: ${{ github.repository == 'hzi-bifo/SeqDesk-ci' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build release tarball
        env:
          DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public
          DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          bash "$GITHUB_WORKSPACE/scripts/build-release.sh" "$VERSION" --offline-fonts --webpack
          mkdir -p "$RUNNER_TEMP/alma-release-artifact"
          cp "$GITHUB_WORKSPACE/seqdesk-${VERSION}.tar.gz" "$RUNNER_TEMP/alma-release-artifact/"

      - name: Pack npm launcher
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/npm/seqdesk"
          npm run sync-version
          mkdir -p "$RUNNER_TEMP/alma-npm-launcher"
          npm pack --pack-destination "$RUNNER_TEMP/alma-npm-launcher" > "$RUNNER_TEMP/alma-npm-launcher/npm-pack-name.txt"
          npm pack --dry-run > "$RUNNER_TEMP/alma-npm-launcher/npm-pack-dry-run.txt" 2>&1

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: alma-release-tarball
          path: ${{ runner.temp }}/alma-release-artifact/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload npm launcher package
        uses: actions/upload-artifact@v4
        with:
          name: alma-npm-launcher
          path: ${{ runner.temp }}/alma-npm-launcher/*
          if-no-files-found: error
          retention-days: 14

  install-without-profile:
    name: Install without profile on AlmaLinux
    needs: build-install-artifacts
    if: ${{ github.repository == 'hzi-bifo/SeqDesk-ci' }}
    runs-on:
      group: bifo_dmz
      labels: [self-hosted, Linux, X64, db-local, twincore, alma]
    timeout-minutes: 75
    env:
      DB_HOST: 127.0.0.1
      DB_PASSWORD: seqdesk
      DB_PORT: 5432
      DB_USER: seqdesk
      FALLBACK_DB_PORT: 55433
      NEXT_TELEMETRY_DISABLED: 1
      # Hoisted out of the run block so the block carries no ${{ }} (see the with-profile job).
      RC_SPIKE_URL: ${{ vars.READ_CLEANING_SPIKE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Redirect caches to /net + free /home (the runner /home is a small shared NFS)
        run: |
          set +e
          # /home is a small, shared NFS that runs ~98% full, so conda-incubator/setup-miniconda@v3
          # aborts with "Not enough free disk space" and the conda/npm/nextflow caches that pile up
          # there bite recurringly. Two-part durable fix:
          #  (1) REDIRECT the caches that land on /home onto /net (the big shared FS where the heavy
          #      work already lives) for the rest of this job — so /home stops filling at the source;
          #  (2) reclaim what is already on /home as a backstop.
          # All of this is re-created on demand; the warm pipeline conda ENVS live on /net, untouched.
          RC_NET=""
          for cand in /net/broker/autotest/seqdesk-ci /net/broker /net/runner; do
            if mkdir -p "$cand/seqdesk-runner-cache" 2>/dev/null; then RC_NET="$cand/seqdesk-runner-cache"; break; fi
          done
          if [ -n "$RC_NET" ]; then
            mkdir -p "$RC_NET/conda-pkgs" "$RC_NET/nextflow-home" "$RC_NET/npm" "$RC_NET/xdg-cache" 2>/dev/null
            {
              echo "CONDA_PKGS_DIRS=$RC_NET/conda-pkgs"
              echo "NXF_HOME=$RC_NET/nextflow-home"
              echo "npm_config_cache=$RC_NET/npm"
              echo "XDG_CACHE_HOME=$RC_NET/xdg-cache"
            } >> "$GITHUB_ENV"
            echo "Runner caches redirected to $RC_NET (off the shared NFS /home)"
          else
            echo "No writable /net root found — caches stay on /home; the cleanup below is the only mitigation."
          fi
          echo "free /home — before:"; df -h "$HOME" 2>/dev/null | tail -1
          rm -rf "$HOME/.cache"/* "$HOME/.npm/_cacache" 2>/dev/null
          rm -rf "$HOME/conda_pkgs_dir"/* "$HOME/.conda/pkgs"/* 2>/dev/null
          echo "after:"; df -h "$HOME" 2>/dev/null | tail -1
          true

      - name: Setup Miniconda for PostgreSQL tools
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Configure canary paths
        run: |
          set -euo pipefail
          RUN_SUFFIX="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-plain"
          PORT=$((19000 + (GITHUB_RUN_NUMBER % 1000)))
          MOCK_RELEASE_PORT=$((21000 + (GITHUB_RUN_NUMBER % 1000)))
          DB_NAME="seqdesk_plain_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          # /home is ~full (the install's 2G preflight fails there). Root the heavy work dirs on
          # a writable big shared FS — probe /net/broker then /net/runner, fall back to
          # $RUNNER_TEMP. Same pattern as the profile job. Small logs/JSON + postgres stay on
          # $RUNNER_TEMP (tiny; logs are uploaded as artifacts).
          ALMA_WORK_ROOT=""
          for cand in "${{ vars.ALMA_WORK_ROOT || '' }}" /net/broker/autotest/seqdesk-ci/alma-work /net/runner/seqdesk-alma; do
            [ -z "$cand" ] && continue
            if mkdir -p "$cand/$RUN_SUFFIX" 2>/dev/null; then ALMA_WORK_ROOT="$cand"; break; fi
          done
          if [ -n "$ALMA_WORK_ROOT" ]; then
            WORK="$ALMA_WORK_ROOT/$RUN_SUFFIX"
            find "$ALMA_WORK_ROOT" -mindepth 1 -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          else
            WORK="$RUNNER_TEMP/seqdesk-alma-$RUN_SUFFIX"; mkdir -p "$WORK"
            echo "WARN: no shared FS writable — falling back to \$RUNNER_TEMP (/home may be full)"
          fi
          echo "Alma work dir: $WORK ($(df -h "$WORK" | awk 'NR==2{print $4" free on "$6}'))"
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_PORT=$MOCK_RELEASE_PORT" >> "$GITHUB_ENV"
          echo "DB_NAME=$DB_NAME" >> "$GITHUB_ENV"
          echo "ALMA_WORK=$WORK" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$WORK/app" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/install-plain-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/server-plain-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/providers-plain-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/seqdesk-plain-$RUN_SUFFIX.config.json" >> "$GITHUB_ENV"
          echo "PGDATA_DIR=$RUNNER_TEMP/postgres-plain-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "PG_LOG=$RUNNER_TEMP/postgres-plain-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PG_TOOLCHAIN_DIR=$RUNNER_TEMP/seqdesk-postgres-tools-plain-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "RELEASE_ARTIFACT_DIR=$WORK/release-artifact" >> "$GITHUB_ENV"
          echo "NPM_ARTIFACT_DIR=$WORK/npm-artifact" >> "$GITHUB_ENV"
          echo "NPM_CACHE=$WORK/npm-cache" >> "$GITHUB_ENV"
          echo "NPM_PREFIX=$WORK/npm-prefix" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_ROOT=$WORK/release-server" >> "$GITHUB_ENV"
          echo "MOCK_SERVER_LOG=$RUNNER_TEMP/plain-release-server-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "NPM_PACK_METADATA=$RUNNER_TEMP/plain-npm-pack-$RUN_SUFFIX.txt" >> "$GITHUB_ENV"

      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: alma-release-tarball
          path: ${{ env.RELEASE_ARTIFACT_DIR }}

      - name: Download npm launcher package
        uses: actions/download-artifact@v4
        with:
          name: alma-npm-launcher
          path: ${{ env.NPM_ARTIFACT_DIR }}

      - name: Setup PostgreSQL toolchain
        shell: bash -el {0}
        run: |
          set -euo pipefail
          rm -rf "$PG_TOOLCHAIN_DIR"
          conda create -y -p "$PG_TOOLCHAIN_DIR" --override-channels -c conda-forge postgresql
          echo "$PG_TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"

      - name: Ensure PostgreSQL database
        run: |
          set -euo pipefail

          find_pg_bin_dir() {
            local candidate=""
            if command -v initdb >/dev/null 2>&1 && command -v pg_ctl >/dev/null 2>&1; then
              dirname "$(command -v initdb)"
              return 0
            fi
            if command -v pg_config >/dev/null 2>&1; then
              candidate="$(pg_config --bindir 2>/dev/null || true)"
              if [ -n "$candidate" ] && [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            fi
            for candidate in /usr/pgsql-*/bin /usr/lib/postgresql/*/bin; do
              if [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          create_seqdesk_database() {
            local port="$1"
            local admin_user="$2"
            local admin_password="${3:-}"
            if [ -n "$admin_password" ]; then
              export PGPASSWORD="$admin_password"
            else
              unset PGPASSWORD || true
            fi
            psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "DO \$\$ BEGIN CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASSWORD'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE $DB_USER WITH PASSWORD '$DB_PASSWORD'; END \$\$;"
            if ! psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1; then
              psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "CREATE DATABASE $DB_NAME OWNER $DB_USER"
            fi
          }

          wait_for_postgres() {
            local port="$1"
            for _ in $(seq 1 30); do
              if pg_isready -h "$DB_HOST" -p "$port" >/dev/null 2>&1; then
                return 0
              fi
              sleep 1
            done
            return 1
          }

          if pg_isready -h "$DB_HOST" -p "$DB_PORT" >/dev/null 2>&1; then
            if create_seqdesk_database "$DB_PORT" postgres; then
              echo "Using existing local PostgreSQL on port $DB_PORT."
              exit 0
            fi
          fi

          PG_BIN_DIR="$(find_pg_bin_dir || true)"
          if [ -n "$PG_BIN_DIR" ]; then
            rm -rf "$PGDATA_DIR"
            "$PG_BIN_DIR/initdb" -D "$PGDATA_DIR" -U postgres -A trust >/dev/null
            {
              echo "listen_addresses = '127.0.0.1'"
              echo "port = $FALLBACK_DB_PORT"
            } >> "$PGDATA_DIR/postgresql.conf"
            "$PG_BIN_DIR/pg_ctl" -D "$PGDATA_DIR" -l "$PG_LOG" start
            wait_for_postgres "$FALLBACK_DB_PORT"
            create_seqdesk_database "$FALLBACK_DB_PORT" postgres
            echo "DB_PORT=$FALLBACK_DB_PORT" >> "$GITHUB_ENV"
            echo "USE_EPHEMERAL_POSTGRES=1" >> "$GITHUB_ENV"
            echo "PG_CTL_BIN=$PG_BIN_DIR/pg_ctl" >> "$GITHUB_ENV"
            echo "Provisioned PostgreSQL via temporary user-space cluster."
            exit 0
          fi

          echo "PostgreSQL provisioning requires existing local PostgreSQL or user-space PostgreSQL tools."
          exit 1

      - name: Prepare mock installer and release metadata
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_DATE="$(date -u +%F)"
          mkdir -p "$MOCK_RELEASE_ROOT/api" "$MOCK_RELEASE_ROOT/downloads"
          cp "$GITHUB_WORKSPACE/scripts/install-dist.sh" "$MOCK_RELEASE_ROOT/install.sh"
          TARBALL_PATH="$(find "$RELEASE_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tar.gz' | head -n 1)"
          if [ -z "$TARBALL_PATH" ]; then
            echo "Release tarball not found in $RELEASE_ARTIFACT_DIR"
            exit 1
          fi
          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          cp "$TARBALL_PATH" "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME"
          CHECKSUM="sha256:$(sha256sum "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME" | cut -d' ' -f1)"
          cat > "$MOCK_RELEASE_ROOT/api/version" <<EOF
          {"latest":{"version":"$VERSION","channel":"stable","releaseDate":"$RELEASE_DATE","downloadUrl":"http://127.0.0.1:$MOCK_RELEASE_PORT/downloads/$TARBALL_NAME","checksum":"$CHECKSUM","releaseNotes":"CI plain e2e test release artifact","minNodeVersion":"18.0.0"},"updateAvailable":false,"currentVersion":null}
          EOF

      - name: Install side-by-side without profile through npm launcher
        run: |
          set -euo pipefail
          NPM_TGZ="$(find "$NPM_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tgz' | head -n 1)"
          if [ -z "$NPM_TGZ" ]; then
            echo "Npm launcher tarball not found in $NPM_ARTIFACT_DIR"
            exit 1
          fi
          cp "$NPM_ARTIFACT_DIR/npm-pack-dry-run.txt" "$NPM_PACK_METADATA"
          npm install -g "$NPM_TGZ" --prefix "$NPM_PREFIX" --cache "$NPM_CACHE"

          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null && \
               curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" >/dev/null; then
              break
            fi
            sleep 1
          done

          PATH="$NPM_PREFIX/bin:$PATH" \
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" \
          SEQDESK_INSTALL_URL="http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" \
          SEQDESK_LOG="$INSTALL_LOG" \
            seqdesk \
              -y \
              --without-pipelines \
              --no-pm2 \
              --dir "$INSTALL_DIR" \
              --port "$PORT" \
              --nextauth-url "http://127.0.0.1:$PORT" \
              --database-url "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public" \
              --database-direct-url "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public"

      - name: Verify install artifacts and config
        run: |
          set -euo pipefail
          CFG="$INSTALL_DIR/settings.json"; [ -f "$CFG" ] || CFG="$INSTALL_DIR/seqdesk.config.json"
          test -f "$INSTALL_DIR/package.json"
          test -f "$CFG"
          test -x "$INSTALL_DIR/start.sh"
          cp "$CFG" "$CONFIG_SNAPSHOT"
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$CFG" \
            --expected-port "$PORT"

      - name: Verify installed app startup and auth flows
        run: |
          set -euo pipefail
          cd "$INSTALL_DIR"
          # Persistent, shared Nextflow conda cacheDir (a sibling of the per-run work root, so
          # the per-run cleanup and the canary stale-dir prune both leave it intact) so per-process
          # pipeline conda envs — metaxpath's especially — are solved ONCE and reused across runs
          # instead of cold-built every run (the cold classic-conda solve was stalling metaxpath
          # past its timeout). The env override wins over the installed config; harmless when
          # ALMA_WORK is unset (cacheDir simply stays at Nextflow's default).
          CONDA_CACHE_DIR=""
          if [ -n "${ALMA_WORK:-}" ]; then
            CONDA_CACHE_DIR="$(dirname "$(dirname "$ALMA_WORK")")/seqdesk-conda-cache"
            mkdir -p "$CONDA_CACHE_DIR" 2>/dev/null || true
          fi
          echo "Nextflow conda cacheDir: ${CONDA_CACHE_DIR:-<default>}"
          # Optional override for where the read-cleaning spiked example bundle is hosted
          # (the seed route reads SEQDESK_READ_CLEANING_SPIKE_URL; empty → the code default).
          # When a shared conda base is configured (the job that runs the metaxpath SLURM leg), point
          # the app's pipeline-execution conda at it via env. SEQDESK_CONDA_PATH/ENV override the
          # installed config (config/loader.ts maps them to pipelines.execution.conda.*) — the OFFLINE
          # compute nodes can only read this shared conda. This does NOT change the app's default mode
          # (stays local — the smoke + local Gemma runs are unaffected); only forced-SLURM runs use it,
          # and local+SLURM then build/reuse the SAME shared env cache. No-op in the without-profile
          # job (SLURM_SHARED_CONDA_BASE is unset there).
          if [ -n "${SLURM_SHARED_CONDA_BASE:-}" ]; then
            export SEQDESK_CONDA_PATH="$SLURM_SHARED_CONDA_BASE"
            export SEQDESK_CONDA_ENV="${SLURM_SHARED_CONDA_ENV:-}"
            echo "app boot: pipeline-execution conda -> $SLURM_SHARED_CONDA_BASE (metaxpath SLURM leg enabled)"
          fi
          SEQDESK_READ_CLEANING_SPIKE_URL="${RC_SPIKE_URL:-}" \
          SEQDESK_CONDA_CACHE_DIR="$CONDA_CACHE_DIR" ./start.sh "$PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"

      - name: Upload install e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alma-install-without-profile
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.PG_LOG }}
            ${{ env.MOCK_SERVER_LOG }}
            ${{ env.NPM_PACK_METADATA }}
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup canary resources
        if: always()
        run: |
          set +e
          if [ "${USE_EPHEMERAL_POSTGRES:-0}" = "1" ] && [ -n "${PGDATA_DIR:-}" ] && [ -n "${PG_CTL_BIN:-}" ]; then
            "$PG_CTL_BIN" -D "$PGDATA_DIR" stop -m fast || true
            rm -rf "$PGDATA_DIR"
          fi
          if command -v psql >/dev/null 2>&1; then
            PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" -U "${DB_USER:-seqdesk}" -d postgres -c "DROP DATABASE IF EXISTS ${DB_NAME:-seqdesk_plain_missing}" >/dev/null 2>&1 || true
          fi
          # Stop any worker the installed app auto-started (e.g. pipeline-monitor).
          # It is spawned detached, so it keeps the release node_modules/.prisma
          # engine open after the app stops; on the runner's NFS home that leaves
          # an undeletable .nfs* silly-rename file and the rm below fails with
          # "Directory not empty". Scope the kill to this job's install dir.
          if [ -n "${INSTALL_DIR:-}" ]; then
            pkill -f "${INSTALL_DIR}.*-monitor" >/dev/null 2>&1 || true
            sleep 2
          fi
          rm -rf "${PG_TOOLCHAIN_DIR:-}" "$INSTALL_DIR" "$MOCK_RELEASE_ROOT" "$RELEASE_ARTIFACT_DIR" "$NPM_ARTIFACT_DIR" "$NPM_CACHE" "$NPM_PREFIX" "${ALMA_WORK:-}" || true

  install-with-profile:
    name: Install with hosted profile on AlmaLinux
    needs: build-install-artifacts
    if: ${{ github.repository == 'hzi-bifo/SeqDesk-ci' }}
    runs-on:
      group: bifo_dmz
      labels: [self-hosted, Linux, X64, db-local, twincore, alma]
    # 360 (6h): the ceiling must exceed the SUM of the per-run caps so a worst-case run (every
    # pipeline hitting its own timeout) completes rather than being cut off mid-pipeline — here
    # metaxpath 3h + mag 1h + read-cleaning 40m + the fast Gemma runs 45m + install ~20m ≈ 5h45m.
    # This is a self-hosted runner, so there is NO 6h GitHub-hosted job cap. In practice each cap
    # finishes EARLY once the shared conda cache is warm, so a normal run is ~2-3h; the ceiling
    # only bites on the first full run that builds every per-process env cold.
    timeout-minutes: 360
    env:
      DB_HOST: 127.0.0.1
      DB_PASSWORD: seqdesk
      DB_PORT: 5432
      DB_USER: seqdesk
      FALLBACK_DB_PORT: 55434
      NEXT_TELEMETRY_DISABLED: 1
      PROFILE_ID: ${{ github.event.inputs.profile_id || 'ci-runner' }}
      PROFILE_REGISTRY_URL: ${{ github.event.inputs.profile_registry_url || 'https://seqdesk.org/api/install-profiles' }}
      SEQDESK_CI_PROFILE_CODE: ${{ secrets.SEQDESK_CI_PROFILE_CODE }}
      # MetaxPath is an optional private add-on on this canary; a package failure (e.g.
      # an asset/version mismatch or a failing package install) should warn, not abort the install
      # — so the rest of the profile (pipelines + the Gemma example dataset) still applies
      # and gets verified. Remove this once a compatible MetaxPath artifact is published.
      SEQDESK_METAXPATH_OPTIONAL: "1"
      # read-cleaning (nf-core/detaxizer) needs a kraken2 DB to classify host/contaminant
      # reads. Same shared-FS path + repo-var override as the SLURM E2E so a facility can
      # stage the DB once for both harnesses. Absent → the read-cleaning smoke skips cleanly
      # (it's gated on the DB, exactly like mag is gated on GTDB).
      SLURM_SHARED_KRAKEN2_DB: ${{ vars.SLURM_SHARED_KRAKEN2_DB || '/net/broker/checkm_refdata/kraken2_db' }}
      # Shared conda base/env (the same repo vars the SLURM E2E uses). Lets the metaxpath SLURM leg
      # point the installed app's SLURM executor at a conda the OFFLINE compute nodes can read.
      # Unset → the app installs local-only and the metaxpath SLURM leg skips cleanly.
      SLURM_SHARED_CONDA_BASE: ${{ vars.SLURM_SHARED_CONDA_BASE }}
      SLURM_SHARED_CONDA_ENV: ${{ vars.SLURM_SHARED_CONDA_ENV }}
      # Hoisted out of the big "Verify installed app startup" run block. That block also drives every
      # Gemma run, so it's near GitHub's per-block expression-template limit (~21000 chars per
      # templated scalar) — workflow_dispatch rejects the file if the block carries inline ${{ }}.
      # Referencing these as $env in the block keeps the block free of expressions entirely.
      RC_SPIKE_URL: ${{ vars.READ_CLEANING_SPIKE_URL }}
      GEMMA_SUBSAMPLE: ${{ github.event.inputs.subsample_reads }}
      # SLURM runs (the metaxpath SLURM leg) use the INLINE executor — the whole Nextflow run wraps
      # into ONE sbatch on an offline compute node that can only REUSE cached conda envs. Inherited
      # by the booted app; unused by local runs, so harmless when no SLURM leg runs.
      SEQDESK_SLURM_INLINE_EXECUTOR: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate profile secret
        run: |
          set -euo pipefail
          if [ -z "${SEQDESK_CI_PROFILE_CODE:-}" ]; then
            echo "Missing GitHub secret SEQDESK_CI_PROFILE_CODE for hosted dummy profile resolution."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Redirect caches to /net + free /home (the runner /home is a small shared NFS)
        run: |
          set +e
          # /home is a small, shared NFS that runs ~98% full, so conda-incubator/setup-miniconda@v3
          # aborts with "Not enough free disk space" and the conda/npm/nextflow caches that pile up
          # there bite recurringly. Two-part durable fix:
          #  (1) REDIRECT the caches that land on /home onto /net (the big shared FS where the heavy
          #      work already lives) for the rest of this job — so /home stops filling at the source;
          #  (2) reclaim what is already on /home as a backstop.
          # All of this is re-created on demand; the warm pipeline conda ENVS live on /net, untouched.
          RC_NET=""
          for cand in /net/broker/autotest/seqdesk-ci /net/broker /net/runner; do
            if mkdir -p "$cand/seqdesk-runner-cache" 2>/dev/null; then RC_NET="$cand/seqdesk-runner-cache"; break; fi
          done
          if [ -n "$RC_NET" ]; then
            mkdir -p "$RC_NET/conda-pkgs" "$RC_NET/nextflow-home" "$RC_NET/npm" "$RC_NET/xdg-cache" 2>/dev/null
            {
              echo "CONDA_PKGS_DIRS=$RC_NET/conda-pkgs"
              echo "NXF_HOME=$RC_NET/nextflow-home"
              echo "npm_config_cache=$RC_NET/npm"
              echo "XDG_CACHE_HOME=$RC_NET/xdg-cache"
            } >> "$GITHUB_ENV"
            echo "Runner caches redirected to $RC_NET (off the shared NFS /home)"
          else
            echo "No writable /net root found — caches stay on /home; the cleanup below is the only mitigation."
          fi
          echo "free /home — before:"; df -h "$HOME" 2>/dev/null | tail -1
          rm -rf "$HOME/.cache"/* "$HOME/.npm/_cacache" 2>/dev/null
          rm -rf "$HOME/conda_pkgs_dir"/* "$HOME/.conda/pkgs"/* 2>/dev/null
          echo "after:"; df -h "$HOME" 2>/dev/null | tail -1
          true

      - name: Setup Miniconda for PostgreSQL tools
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Configure canary paths
        run: |
          set -euo pipefail
          RUN_SUFFIX="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-profile"
          PORT=$((20000 + (GITHUB_RUN_NUMBER % 1000)))
          MOCK_RELEASE_PORT=$((22000 + (GITHUB_RUN_NUMBER % 1000)))
          DB_NAME="seqdesk_profile_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          # /home is ~98% full (~7G), so the install + kraken2 DB + Gemma run outputs fill it
          # and the heavy metaxpath run dies with "No space left on device". Root the heavy work
          # dirs on the big shared FS (/net/runner, ~249G) instead — the Gemma runs are LOCAL so
          # the runner just needs to see it. Fall back to $RUNNER_TEMP if it isn't writable.
          # Small logs/JSON (uploaded as artifacts) stay on $RUNNER_TEMP.
          # Pick the first WRITABLE big shared FS for the heavy work dirs (/home is ~98% full).
          # /net/broker is where the SLURM E2E already writes as this runner user; /net/runner
          # is mounted for interactive logins but not necessarily for the runner — so try both,
          # then fall back to $RUNNER_TEMP. Override with the ALMA_WORK_ROOT Actions var.
          ALMA_WORK_ROOT=""
          for cand in "${{ vars.ALMA_WORK_ROOT || '' }}" /net/broker/autotest/seqdesk-ci/alma-work /net/runner/seqdesk-alma; do
            [ -z "$cand" ] && continue
            if mkdir -p "$cand/$RUN_SUFFIX" 2>/dev/null; then ALMA_WORK_ROOT="$cand"; break; fi
          done
          if [ -n "$ALMA_WORK_ROOT" ]; then
            WORK="$ALMA_WORK_ROOT/$RUN_SUFFIX"
            # prune stale dirs from earlier runs (cleanup can leave NFS .nfs* silly-renames)
            find "$ALMA_WORK_ROOT" -mindepth 1 -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true
          else
            WORK="$RUNNER_TEMP/seqdesk-alma-$RUN_SUFFIX"; mkdir -p "$WORK"
            echo "WARN: no shared FS writable — falling back to \$RUNNER_TEMP (/home may be full)"
          fi
          echo "Alma work dir: $WORK ($(df -h "$WORK" | awk 'NR==2{print $4" free on "$6}'))"
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_PORT=$MOCK_RELEASE_PORT" >> "$GITHUB_ENV"
          echo "DB_NAME=$DB_NAME" >> "$GITHUB_ENV"
          echo "ALMA_WORK=$WORK" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$WORK/app" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/install-profile-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/server-profile-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/providers-profile-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/seqdesk-profile-$RUN_SUFFIX.config.json" >> "$GITHUB_ENV"
          echo "PROFILE_ASSERT_JSON=$RUNNER_TEMP/profile-assert-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          echo "TELEMETRY_JSON=$RUNNER_TEMP/telemetry-profile-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          echo "PIPELINE_SMOKE_JSON=$RUNNER_TEMP/pipeline-smoke-profile-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          echo "PROFILE_DATA_DIR=$WORK/data" >> "$GITHUB_ENV"
          echo "PROFILE_RUN_DIR=$WORK/runs" >> "$GITHUB_ENV"
          # Postgres stays on local $RUNNER_TEMP, not NFS /net/runner (NFS has fsync/locking
          # quirks for a DB) — it's small (~hundreds of MB), so /home's headroom is fine.
          echo "PGDATA_DIR=$RUNNER_TEMP/postgres-profile-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "PG_LOG=$RUNNER_TEMP/postgres-profile-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PG_TOOLCHAIN_DIR=$RUNNER_TEMP/seqdesk-postgres-tools-profile-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "RELEASE_ARTIFACT_DIR=$WORK/release-artifact" >> "$GITHUB_ENV"
          echo "NPM_ARTIFACT_DIR=$WORK/npm-artifact" >> "$GITHUB_ENV"
          echo "NPM_CACHE=$WORK/npm-cache" >> "$GITHUB_ENV"
          echo "NPM_PREFIX=$WORK/npm-prefix" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_ROOT=$WORK/release-server" >> "$GITHUB_ENV"
          echo "MOCK_SERVER_LOG=$RUNNER_TEMP/profile-release-server-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "NPM_PACK_METADATA=$RUNNER_TEMP/profile-npm-pack-$RUN_SUFFIX.txt" >> "$GITHUB_ENV"

      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: alma-release-tarball
          path: ${{ env.RELEASE_ARTIFACT_DIR }}

      - name: Download npm launcher package
        uses: actions/download-artifact@v4
        with:
          name: alma-npm-launcher
          path: ${{ env.NPM_ARTIFACT_DIR }}

      - name: Setup PostgreSQL toolchain
        shell: bash -el {0}
        run: |
          set -euo pipefail
          rm -rf "$PG_TOOLCHAIN_DIR"
          conda create -y -p "$PG_TOOLCHAIN_DIR" --override-channels -c conda-forge postgresql
          echo "$PG_TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"

      - name: Ensure PostgreSQL database
        run: |
          set -euo pipefail

          find_pg_bin_dir() {
            local candidate=""
            if command -v initdb >/dev/null 2>&1 && command -v pg_ctl >/dev/null 2>&1; then
              dirname "$(command -v initdb)"
              return 0
            fi
            if command -v pg_config >/dev/null 2>&1; then
              candidate="$(pg_config --bindir 2>/dev/null || true)"
              if [ -n "$candidate" ] && [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            fi
            for candidate in /usr/pgsql-*/bin /usr/lib/postgresql/*/bin; do
              if [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          create_seqdesk_database() {
            local port="$1"
            local admin_user="$2"
            local admin_password="${3:-}"
            if [ -n "$admin_password" ]; then
              export PGPASSWORD="$admin_password"
            else
              unset PGPASSWORD || true
            fi
            psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "DO \$\$ BEGIN CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASSWORD'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE $DB_USER WITH PASSWORD '$DB_PASSWORD'; END \$\$;"
            if ! psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1; then
              psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "CREATE DATABASE $DB_NAME OWNER $DB_USER"
            fi
          }

          wait_for_postgres() {
            local port="$1"
            for _ in $(seq 1 30); do
              if pg_isready -h "$DB_HOST" -p "$port" >/dev/null 2>&1; then
                return 0
              fi
              sleep 1
            done
            return 1
          }

          if pg_isready -h "$DB_HOST" -p "$DB_PORT" >/dev/null 2>&1; then
            if create_seqdesk_database "$DB_PORT" postgres; then
              echo "Using existing local PostgreSQL on port $DB_PORT."
              exit 0
            fi
          fi

          PG_BIN_DIR="$(find_pg_bin_dir || true)"
          if [ -n "$PG_BIN_DIR" ]; then
            rm -rf "$PGDATA_DIR"
            "$PG_BIN_DIR/initdb" -D "$PGDATA_DIR" -U postgres -A trust >/dev/null
            {
              echo "listen_addresses = '127.0.0.1'"
              echo "port = $FALLBACK_DB_PORT"
            } >> "$PGDATA_DIR/postgresql.conf"
            "$PG_BIN_DIR/pg_ctl" -D "$PGDATA_DIR" -l "$PG_LOG" start
            wait_for_postgres "$FALLBACK_DB_PORT"
            create_seqdesk_database "$FALLBACK_DB_PORT" postgres
            echo "DB_PORT=$FALLBACK_DB_PORT" >> "$GITHUB_ENV"
            echo "USE_EPHEMERAL_POSTGRES=1" >> "$GITHUB_ENV"
            echo "PG_CTL_BIN=$PG_BIN_DIR/pg_ctl" >> "$GITHUB_ENV"
            echo "Provisioned PostgreSQL via temporary user-space cluster."
            exit 0
          fi

          echo "PostgreSQL provisioning requires existing local PostgreSQL or user-space PostgreSQL tools."
          exit 1

      - name: Prepare mock installer and release metadata
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_DATE="$(date -u +%F)"
          mkdir -p "$MOCK_RELEASE_ROOT/api" "$MOCK_RELEASE_ROOT/downloads"
          cp "$GITHUB_WORKSPACE/scripts/install-dist.sh" "$MOCK_RELEASE_ROOT/install.sh"
          TARBALL_PATH="$(find "$RELEASE_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tar.gz' | head -n 1)"
          if [ -z "$TARBALL_PATH" ]; then
            echo "Release tarball not found in $RELEASE_ARTIFACT_DIR"
            exit 1
          fi
          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          cp "$TARBALL_PATH" "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME"
          CHECKSUM="sha256:$(sha256sum "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME" | cut -d' ' -f1)"
          cat > "$MOCK_RELEASE_ROOT/api/version" <<EOF
          {"latest":{"version":"$VERSION","channel":"stable","releaseDate":"$RELEASE_DATE","downloadUrl":"http://127.0.0.1:$MOCK_RELEASE_PORT/downloads/$TARBALL_NAME","checksum":"$CHECKSUM","releaseNotes":"CI profile e2e test release artifact","minNodeVersion":"18.0.0"},"updateAvailable":false,"currentVersion":null}
          EOF

      - name: Install side-by-side with hosted dummy profile through npm launcher
        run: |
          set -euo pipefail
          NPM_TGZ="$(find "$NPM_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tgz' | head -n 1)"
          if [ -z "$NPM_TGZ" ]; then
            echo "Npm launcher tarball not found in $NPM_ARTIFACT_DIR"
            exit 1
          fi
          cp "$NPM_ARTIFACT_DIR/npm-pack-dry-run.txt" "$NPM_PACK_METADATA"
          npm install -g "$NPM_TGZ" --prefix "$NPM_PREFIX" --cache "$NPM_CACHE"

          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null && \
               curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" >/dev/null; then
              break
            fi
            sleep 1
          done

          PATH="$NPM_PREFIX/bin:$PATH" \
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" \
          SEQDESK_INSTALL_URL="http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" \
          SEQDESK_PROFILE_REGISTRY_URL="$PROFILE_REGISTRY_URL" \
          SEQDESK_LOG="$INSTALL_LOG" \
            bash -c '
              set -euo pipefail
              pipeline_args=(--without-pipelines)
              if [ "$PROFILE_ID" = "ci-runner" ]; then
                pipeline_args=(--with-pipelines --data-path "$PROFILE_DATA_DIR" --run-dir "$PROFILE_RUN_DIR")
              fi
              seqdesk \
                -y \
                "${pipeline_args[@]}" \
                --no-pm2 \
                --dir "$INSTALL_DIR" \
                --port "$PORT" \
                --nextauth-url "http://127.0.0.1:$PORT" \
                --database-url "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public" \
                --database-direct-url "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public" \
                --profile "$PROFILE_ID" \
                --profile-code "$SEQDESK_CI_PROFILE_CODE"
            '

      - name: Verify install artifacts and profile settings
        run: |
          set -euo pipefail
          CFG="$INSTALL_DIR/settings.json"; [ -f "$CFG" ] || CFG="$INSTALL_DIR/seqdesk.config.json"
          test -f "$INSTALL_DIR/package.json"
          test -f "$CFG"
          test -x "$INSTALL_DIR/start.sh"
          cp "$CFG" "$CONFIG_SNAPSHOT"
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$CFG" \
            --expected-port "$PORT" \
            --expected-pipelines-enabled true
          node "$GITHUB_WORKSPACE/scripts/assert-install-profile-applied.mjs" \
            --dir "$INSTALL_DIR" \
            --profile-id "$PROFILE_ID" \
            --expected-device-id "ont-minion-mk1d" > "$PROFILE_ASSERT_JSON"

      - name: Verify installed app startup and auth flows
        run: |
          set -euo pipefail
          cd "$INSTALL_DIR"
          # Persistent, shared Nextflow conda cacheDir (a sibling of the per-run work root, so
          # the per-run cleanup and the canary stale-dir prune both leave it intact) so per-process
          # pipeline conda envs — metaxpath's especially — are solved ONCE and reused across runs
          # instead of cold-built every run (the cold classic-conda solve was stalling metaxpath
          # past its timeout). The env override wins over the installed config; harmless when
          # ALMA_WORK is unset (cacheDir simply stays at Nextflow's default).
          CONDA_CACHE_DIR=""
          if [ -n "${ALMA_WORK:-}" ]; then
            CONDA_CACHE_DIR="$(dirname "$(dirname "$ALMA_WORK")")/seqdesk-conda-cache"
            mkdir -p "$CONDA_CACHE_DIR" 2>/dev/null || true
          fi
          echo "Nextflow conda cacheDir: ${CONDA_CACHE_DIR:-<default>}"
          # Optional override for where the read-cleaning spiked example bundle is hosted
          # (the seed route reads SEQDESK_READ_CLEANING_SPIKE_URL; empty → the code default).
          # When a shared conda base is configured (the job that runs the metaxpath SLURM leg), point
          # the app's pipeline-execution conda at it via env. SEQDESK_CONDA_PATH/ENV override the
          # installed config (config/loader.ts maps them to pipelines.execution.conda.*) — the OFFLINE
          # compute nodes can only read this shared conda. This does NOT change the app's default mode
          # (stays local — the smoke + local Gemma runs are unaffected); only forced-SLURM runs use it,
          # and local+SLURM then build/reuse the SAME shared env cache. No-op in the without-profile
          # job (SLURM_SHARED_CONDA_BASE is unset there).
          if [ -n "${SLURM_SHARED_CONDA_BASE:-}" ]; then
            export SEQDESK_CONDA_PATH="$SLURM_SHARED_CONDA_BASE"
            export SEQDESK_CONDA_ENV="${SLURM_SHARED_CONDA_ENV:-}"
            echo "app boot: pipeline-execution conda -> $SLURM_SHARED_CONDA_BASE (metaxpath SLURM leg enabled)"
          fi
          SEQDESK_READ_CLEANING_SPIKE_URL="${RC_SPIKE_URL:-}" \
          SEQDESK_CONDA_CACHE_DIR="$CONDA_CACHE_DIR" ./start.sh "$PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"
          node "$GITHUB_WORKSPACE/scripts/run-telemetry-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --output "$TELEMETRY_JSON"
          if [ "$PROFILE_ID" = "ci-runner" ]; then
            node "$GITHUB_WORKSPACE/scripts/run-install-profile-pipeline-smoke.mjs" \
              --dir "$INSTALL_DIR" \
              --base-url "http://127.0.0.1:${PORT}" \
              --email "admin@example.com" \
              --password "admin" \
              --output "$PIPELINE_SMOKE_JSON"

            # Real-data pipeline runs: drive the read-consuming pipelines through the
            # installed app on the REAL 5-sample Gemma ONT dataset (order DEV-GEMMA-ONT-001
            # / study gemma-nanopore-metaxpath) in LOCAL mode. Complements the SLURM E2E's
            # synthetic data. Each run is independent so one failure still reports the rest.
            gemma_fail=0
            run_gemma() {
              local pid="$1"; local to="$2"; shift 2
              echo "===== Gemma real-data run: ${pid} ====="
              if node "$GITHUB_WORKSPACE/scripts/run-pipeline-runtime-e2e.mjs" \
                --base-url "http://127.0.0.1:${PORT}" \
                --email "admin@example.com" \
                --password "admin" \
                --pipeline-id "${pid}" "$@" \
                --skip-slurm \
                --skip-if-disabled \
                --timeout "${to}"; then
                echo "Gemma real-data run OK: ${pid}"
              else
                echo "Gemma real-data run FAILED: ${pid}"
                gemma_fail=1
              fi
            }
            # Warn-only variant: a failure is surfaced but does NOT fail the suite. Used
            # for pipelines still being brought up on the runner (e.g. the private
            # metaxpath add-on), so we get the signal without reding the install E2E.
            run_gemma_warn() {
              local pid="$1"; local to="$2"; shift 2
              echo "===== Gemma real-data run (warn-only): ${pid} ====="
              if node "$GITHUB_WORKSPACE/scripts/run-pipeline-runtime-e2e.mjs" \
                --base-url "http://127.0.0.1:${PORT}" \
                --email "admin@example.com" \
                --password "admin" \
                --pipeline-id "${pid}" "$@" \
                --skip-slurm \
                --skip-if-disabled \
                --timeout "${to}"; then
                echo "Gemma real-data run OK: ${pid}"
              else
                echo "WARN (warn-only): Gemma real-data run did not pass: ${pid} — not failing the suite"
              fi
            }
            # Read-consuming pipelines that apply to the Gemma reads and run reliably
            # (hard-asserted). study-demo-report skips cleanly if not enabled on the profile.
            # read-cleaning is NOT run on the Gemma reads (they are already CLEANED, so they
            # fail detaxizer's dataClassIn:[raw,unknown] gate) — it runs further down on the
            # mag-smoke RAW minigut reads instead. reads-qc surfaced a local-run
            # completed->running flip that needs its own investigation (a follow-up in
            # PIPELINE_E2E_COVERAGE.md).
            #
            # SHORT run (manual dispatch with -f subsample_reads=0.1): subsample the Gemma reads so
            # metaxpath classifies a fraction and the matrix finishes in ~30-60min instead of ~3h.
            # An ITERATION smoke, NOT the canonical validation — the scheduled full run stays the
            # source of truth. Empty input (scheduled / default) = full run.
            SUBSAMPLE="${GEMMA_SUBSAMPLE:-}"
            if [ -n "$SUBSAMPLE" ]; then
              echo "::group::SHORT run — subsampling Gemma reads to fraction $SUBSAMPLE"
              n=0
              # The Gemma reads are UNCOMPRESSED .fastq (under reads/fastq_pass/barcodeNN/), not
              # .gz — so match both, and decompress/recompress only for .gz (cat for plain .fastq).
              while IFS= read -r fq; do
                ok=0
                case "$fq" in
                  *.gz) zcat "$fq" 2>/dev/null | awk -v f="$SUBSAMPLE" 'BEGIN{srand(7)} NR%4==1{k=(rand()<f)} k' | gzip > "$fq.sub" 2>/dev/null && ok=1 || true ;;
                  *)    awk -v f="$SUBSAMPLE" 'BEGIN{srand(7)} NR%4==1{k=(rand()<f)} k' "$fq" > "$fq.sub" 2>/dev/null && ok=1 || true ;;
                esac
                if [ "$ok" = 1 ]; then mv -f "$fq.sub" "$fq" 2>/dev/null && n=$((n+1)) || true; else rm -f "$fq.sub" 2>/dev/null || true; fi
              done < <(find "$PROFILE_DATA_DIR" -path '*gemma-nanopore-metaxpath*' \( -name '*.fastq.gz' -o -name '*.fq.gz' -o -name '*.fastq' -o -name '*.fq' \) -type f 2>/dev/null)
              echo "subsampled $n Gemma FASTQ file(s) to fraction $SUBSAMPLE"
              if [ "$n" -eq 0 ]; then echo "WARN: no Gemma reads found to subsample — metaxpath runs on full data."; fi
              echo "::endgroup::"
            fi
            # fastq-checksum round-trips md5(file) vs the seeded checksum, which subsampling breaks,
            # so skip it in a SHORT run (it adds nothing to a metaxpath-iteration smoke).
            [ -n "$SUBSAMPLE" ] || run_gemma fastq-checksum 900 --order-number DEV-GEMMA-ONT-001
            run_gemma study-demo-report 900  --study-alias gemma-nanopore-metaxpath
            run_gemma fastqc            900  --order-number DEV-GEMMA-ONT-001
            # metaxpath (private add-on, STUDY target — the app rejects order targets).
            # HARD gate. Flake causes fixed: the completed->running demote (a7186aa); the /home
            # "No space left" disk-out (heavy work now on the shared FS); and the false-COMPLETED
            # where the monitor scraped a mid-run "exit code: 0" from live conda/Nextflow output
            # and finalized the run before classification ran (inferPipelineExitCode now trusts
            # ONLY the wrapper's canonical exit marker). Timeout is VERY generous (10800s / 3h):
            # METAX_PROFILE scans 5 ONT samples against the full metax DB (slow — DB-scan bound,
            # not sample-size bound; ~1h for the classifications alone last run), and the ~8
            # downstream steps build their per-process conda envs cold the FIRST run that reaches
            # them. The cap finishes early once everything is cached, so a completing run proves
            # the whole 13-step DAG — a long first wait is expected and fine.
            # Still a clean SKIP if the profile doesn't enable it (--skip-if-disabled).
            # METAX_PROFILE (64 GB) / PRED_VFS_AMRS (96 GB) are production-sized memory declarations
            # that exceed this runner's ~62 GB, so Nextflow's local executor rejects them pre-flight
            # ("Process requirement exceeds available memory"). The CI fixture is tiny (5 small
            # samples; actual peak ~3 GB), so override both down to fit the runner — this lets
            # metaxpath actually classify on the test data instead of being rejected before it runs.
            run_gemma metaxpath   10800 --study-alias gemma-nanopore-metaxpath \
              --config-json '{"metaxProfileMemory":"48 GB","predVfsAmrsMemory":"48 GB"}'
            # metaxpath SLURM leg (warn-only) — extracted to scripts/metaxpath-slurm-leg.sh so this
            # large run block stays under GitHub's per-segment expression-template limit. Gated on a
            # SLURM-configured app (shared conda) + sbatch; the script always exits 0 (warn-only).
            if [ -n "${SLURM_SHARED_CONDA_BASE:-}" ] && command -v sbatch >/dev/null 2>&1; then
              bash "$GITHUB_WORKSPACE/scripts/metaxpath-slurm-leg.sh" "$PORT" || true
            else
              echo "metaxpath SLURM leg SKIPPED (SLURM_SHARED_CONDA_BASE unset or sbatch unavailable)."
            fi
            # Surface metaxpath's taxonomy output so we can read the classified taxa (it's not a
            # curated artifact). List its non-conda output files, dump the best report candidate,
            # and copy it for download. FULLY non-fatal — set +e/+o pipefail in a subshell so a
            # find|head SIGPIPE or an empty match can never red the step.
            (
              set +e +o pipefail
              echo "::group::metaxpath run-folder forensics"
              mxdir="$(find "$PROFILE_RUN_DIR" -maxdepth 1 -type d -name 'METAXPATH-*' | head -1)"
              echo "run dir: ${mxdir:-<none>}"
              echo "--- all output files (excluding conda env) ---"
              [ -n "$mxdir" ] && find "$mxdir" -type f 2>/dev/null | grep -v '/work/conda/' | sed "s#${mxdir}/##" | sort | head -90
              echo "--- nextflow trace (name | status | exit) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/trace.txt" ] && cut -f4,5,6 "$mxdir/trace.txt" 2>/dev/null | head -40
              echo "--- pipeline.out tail (classification summary?) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.out" ] && tail -40 "$mxdir/logs/pipeline.out"
              echo "--- pipeline.err tail (conda solver / Nextflow errors?) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.err" ] && tail -60 "$mxdir/logs/pipeline.err"
              echo "--- .nextflow.log tail (process / conda-build outcome) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/.nextflow.log" ] && tail -60 "$mxdir/.nextflow.log"
              echo "--- run.sh (launcher: foreground nextflow? backgrounding?) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/run.sh" ] && cat "$mxdir/run.sh"
              echo "--- exit marker in pipeline.out (did run.sh exit, and with what code?) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.out" ] && { grep -n "Pipeline completed with exit code" "$mxdir/logs/pipeline.out" || echo "NO MARKER — run.sh had not exited"; }
              echo "--- .nextflow.log completion/conda/error markers (whole file) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/.nextflow.log" ] && grep -iE "Workflow completed|Execution complete|terminated with|aborted|ERROR ~|Goodbye|Creating Conda|Conda environment|exit status" "$mxdir/.nextflow.log" | tail -25
              echo "--- METAX_PROFILE failure: error report (Caused by / Command error) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.out" ] && grep -A5 'Caused by' "$mxdir/logs/pipeline.out" 2>/dev/null | head -12
              [ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.out" ] && grep -A25 'Command error:' "$mxdir/logs/pipeline.out" 2>/dev/null | head -30
              echo "--- runner memory + OOM check (peakMemory was ~3GB, so likely NOT oom) ---"
              free -h 2>/dev/null | head -3 || true
              dmesg 2>/dev/null | grep -iE "out of memory|killed process|oom-kill" | tail -5 || echo "dmesg unavailable"
              echo "--- FAILED process work dir (resolved from the error report) ---"
              wd="$([ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.out" ] && grep -oE '/[^ ]*/work/[a-f0-9]{2}/[a-f0-9]+' "$mxdir/logs/pipeline.out" 2>/dev/null | tail -1)"
              echo "work dir: ${wd:-<none>}"
              if [ -n "$wd" ] && [ -d "$wd" ]; then
                echo "  .exitcode=$(cat "$wd/.exitcode" 2>/dev/null || echo '<absent: killed/aborted before writing exit code>')"
                echo "  --- .command.err ---"; tail -50 "$wd/.command.err" 2>/dev/null
                echo "  --- .command.log ---"; tail -60 "$wd/.command.log" 2>/dev/null
                echo "  --- .command.run conda/env lines ---"; grep -iE "conda|CONDA|activate|mamba|nxf_|NXF_" "$wd/.command.run" 2>/dev/null | head -12
              fi
              echo "--- metax DB payload present? ---"
              ls -ldL /net/broker/checkm_refdata/metaxpath_db/payload 2>/dev/null | head
              [ -n "$mxdir" ] && grep -hoE -- "--db [^ ]+|--dmp-dir [^ ]+" "$mxdir"/work/*/*/.command.sh 2>/dev/null | sort -u | while read -r flag p; do echo "  $flag $p: $([ -e "$p" ] && echo EXISTS || echo MISSING)"; done
              echo "--- weblog hits in pipeline.out (status / event) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/logs/pipeline.out" ] && grep -iE "weblog|response code" "$mxdir/logs/pipeline.out" | tail -8
              echo "--- installed app server log: pipeline finalization ---"
              [ -n "${SERVER_LOG:-}" ] && [ -f "${SERVER_LOG:-}" ] && grep -iE "metaxpath|finaliz|local execution|Pipeline (Run|Weblog)|process.*close|exit code" "$SERVER_LOG" | tail -40
              echo "--- generated config conda block (cacheDir wired through?) ---"
              [ -n "$mxdir" ] && [ -f "$mxdir/nextflow.config" ] && grep -A5 'conda {' "$mxdir/nextflow.config" 2>/dev/null | head -24
              echo "--- shared conda cache state (cacheDir=${CONDA_CACHE_DIR:-<unset>}) ---"
              [ -n "${CONDA_CACHE_DIR:-}" ] && ls -1 "$CONDA_CACHE_DIR" 2>/dev/null | head -20
              echo "--- candidate report files + dump ---"
              rep="$(find "$mxdir" -type f 2>/dev/null | grep -v '/work/conda/' | grep -iE 'report|top50|taxonom|classif|kraken|abundance|[.]tsv$' | head -5)"
              printf '%s\n' "$rep"
              firstrep="$(printf '%s\n' "$rep" | head -1)"
              if [ -n "$firstrep" ] && [ -f "$firstrep" ]; then
                echo "--- ${firstrep} ---"; sed -n '1,80p' "$firstrep"
                cp "$firstrep" "$RUNNER_TEMP/metaxpath-report-$RUN_SUFFIX.${firstrep##*.}"
              fi
              echo "::endgroup::"
            ) || true

            # mag (nf-core/mag 3.0.0, short-read paired-end) — the Gemma ONT reads can't drive it,
            # so seed a tiny PUBLIC nf-core/mag example dataset (test_minigut paired-end) as a real
            # order/study/sample, then run mag LIGHTWEIGHT (MEGAHIT only; skip SPAdes + binning-QC +
            # GTDB-Tk, which need huge DBs/RAM) to prove an assembly is generated AND saved to the DB
            # on this runner. Warn-only while we bring it up. The host-derived process.resourceLimits
            # cap (generic-executor) lets mag's oversized per-process memory declarations run here.
            run_gemma_warn mag 3600 --order-number DEV-MAG-ILMN-001 \
              --seed-example-dataset mag-smoke \
              --config-json '{"skipSpades":true,"skipConcoct":true,"skipProkka":true,"skipBinQc":true,"skipGtdbtk":true}'
            ( set +e +o pipefail
              echo "::group::mag run-folder forensics"
              magdir="$(find "$PROFILE_RUN_DIR" -maxdepth 1 -type d -name 'MAG-*' | head -1)"
              echo "run dir: ${magdir:-<none>}"
              [ -n "$magdir" ] && [ -f "$magdir/trace.txt" ] && { echo "--- trace (name|status|exit) ---"; cut -f4,5,6 "$magdir/trace.txt" 2>/dev/null | head -50; }
              [ -n "$magdir" ] && [ -f "$magdir/logs/pipeline.out" ] && { echo "--- pipeline.out tail ---"; tail -30 "$magdir/logs/pipeline.out"; }
              [ -n "$magdir" ] && [ -f "$magdir/logs/pipeline.out" ] && { echo "--- exit marker ---"; grep -n "Pipeline completed with exit code" "$magdir/logs/pipeline.out" || echo "NO MARKER"; }
              echo "--- assembly outputs on disk ---"
              [ -n "$magdir" ] && find "$magdir" -type f \( -name '*.contigs.fa.gz' -o -name '*.contigs.fa' -o -name '*.fasta.gz' \) 2>/dev/null | grep -v '/work/conda/' | head -10
              echo "--- error report (Caused by) ---"
              [ -n "$magdir" ] && [ -f "$magdir/logs/pipeline.out" ] && grep -A4 'Caused by' "$magdir/logs/pipeline.out" 2>/dev/null | head -12
              echo "::endgroup::"
            ) || true

            # read-cleaning (nf-core/detaxizer) — screen RAW reads for host/contaminant and stage
            # cleaned reads. The Gemma reads are already CLEANED (dataClassIn:[raw,unknown] rejects
            # them), so reuse the mag-smoke order seeded above (DEV-MAG-ILMN-001): its minigut reads
            # are dataClass="raw" AND it's a human-gut metagenome, so detaxizer's default
            # tax2filter="Homo sapiens" has real host reads to strip. Needs a kraken2 DB (the same
            # managed kraken2Db key the admin pipeline-config UI exposes + the SLURM E2E pins). If
            # the DB isn't staged on the shared FS, SKIP cleanly — read-cleaning is gated on the DB
            # exactly like mag is gated on GTDB. Warn-only while we bring it up on the runner. The
            # mag line above already seeded the order, so no re-seed here.
            RC_KRAKEN2_DB="${SLURM_SHARED_KRAKEN2_DB:-/net/broker/checkm_refdata/kraken2_db}"
            if [ -e "$RC_KRAKEN2_DB" ]; then
              echo "read-cleaning: kraken2 DB present at $RC_KRAKEN2_DB — running detaxizer on the mag-smoke RAW reads."
              # detaxizer's KRAKEN2PREPARATION untars --kraken2db (`tar -xf "$db"` then finds *.k2d
              # recursively), so it needs a tar archive, NOT a directory — a dir gives
              # "tar: <db>: Is a directory" -> KRAKEN2PREPARATION exit 2. Facilities stage the DB as
              # a directory, so pack it into a cached .tar once (NO gzip: kraken2 .k2d hash tables are
              # incompressible, so gzip only burns time) on the shared-FS cache and point kraken2Db
              # at the .tar. detaxizer finds the .k2d at any depth, so the archive layout is flexible.
              RC_KRAKEN2_INPUT="$RC_KRAKEN2_DB"
              if [ -d "$RC_KRAKEN2_DB" ]; then
                RC_K2_CACHE="${CONDA_CACHE_DIR:+$(dirname "$CONDA_CACHE_DIR")/seqdesk-kraken2-cache}"
                [ -z "$RC_K2_CACHE" ] && RC_K2_CACHE="$PROFILE_RUN_DIR/../seqdesk-kraken2-cache"
                mkdir -p "$RC_K2_CACHE" 2>/dev/null || true
                RC_KRAKEN2_INPUT="$RC_K2_CACHE/$(basename "$RC_KRAKEN2_DB").tar"
                echo "read-cleaning: --kraken2db is a directory ($(du -sh "$RC_KRAKEN2_DB" 2>/dev/null | cut -f1 || echo '?')); detaxizer untars it, so packing -> $RC_KRAKEN2_INPUT (cached)."
                if [ ! -s "$RC_KRAKEN2_INPUT" ]; then
                  tar -cf "$RC_KRAKEN2_INPUT" -C "$(dirname "$RC_KRAKEN2_DB")" "$(basename "$RC_KRAKEN2_DB")" \
                    || { echo "WARN: kraken2 DB tar failed — falling back to the directory (detaxizer will reject it)."; RC_KRAKEN2_INPUT="$RC_KRAKEN2_DB"; }
                fi
                echo "read-cleaning: kraken2Db -> $RC_KRAKEN2_INPUT ($(du -sh "$RC_KRAKEN2_INPUT" 2>/dev/null | cut -f1 || echo '?'))"
              fi
              run_gemma_warn read-cleaning 2400 --order-number DEV-MAG-ILMN-001 \
                --config-json "{\"kraken2Db\":\"$RC_KRAKEN2_INPUT\",\"classificationKraken2\":true,\"tax2filter\":\"Homo sapiens\"}"
              ( set +e +o pipefail
                echo "::group::read-cleaning run-folder forensics"
                rcdir="$(find "$PROFILE_RUN_DIR" -maxdepth 1 -type d -name 'READ-CLEANING-*' | head -1)"
                echo "run dir: ${rcdir:-<none>}"
                [ -n "$rcdir" ] && [ -f "$rcdir/trace.txt" ] && { echo "--- trace (name|status|exit) ---"; cut -f4,5,6 "$rcdir/trace.txt" 2>/dev/null | head -50; }
                [ -n "$rcdir" ] && [ -f "$rcdir/logs/pipeline.out" ] && { echo "--- pipeline.out tail ---"; tail -30 "$rcdir/logs/pipeline.out"; }
                [ -n "$rcdir" ] && [ -f "$rcdir/logs/pipeline.out" ] && { echo "--- exit marker ---"; grep -n "Pipeline completed with exit code" "$rcdir/logs/pipeline.out" || echo "NO MARKER"; }
                echo "--- cleaned-read / classification outputs on disk ---"
                [ -n "$rcdir" ] && find "$rcdir" -type f \( -name '*filtered*.fastq.gz' -o -name '*.kraken2.*' -o -name '*classified*' -o -name '*_filtered.fastq.gz' \) 2>/dev/null | grep -v '/work/conda/' | head -10
                echo "--- error report (Caused by) ---"
                [ -n "$rcdir" ] && [ -f "$rcdir/logs/pipeline.out" ] && grep -A4 'Caused by' "$rcdir/logs/pipeline.out" 2>/dev/null | head -12
                echo "::endgroup::"
              ) || true

              # SPIKED dataset — deterministic contamination-removal COUNT (not just ">=1
              # candidate"). Seed the hosted spiked bundle (30 human-mt + 30 E. coli reads per
              # sample) via the read-cleaning-spike example route, run read-cleaning on its raw
              # reads, then assert (SEQDESK_RUNTIME_E2E_RC_SPIKE_CHECK) that host reads were
              # REMOVED + microbes RETAINED by counting the cleaned vs raw FASTQs. HARD gate (the count
              # check still warns+skips if the data isn't readable, so only a real regression reds).
              # Same kraken2 DB. The bundle URL is the seed module's default
              # (https://seqdesk.com/example-datasets/read-cleaning-spiked-ont-3sample.tar.gz);
              # host the tar.gz there, or set the READ_CLEANING_SPIKE_URL var (plumbed to the
              # app as SEQDESK_READ_CLEANING_SPIKE_URL at boot). Seeds cleanly only if reachable.
              SEQDESK_RUNTIME_E2E_RC_SPIKE_CHECK=1 \
                run_gemma read-cleaning 2400 --order-number DEV-RC-SPIKE-001 \
                  --seed-example-dataset read-cleaning-spike \
                  --config-json "{\"kraken2Db\":\"$RC_KRAKEN2_INPUT\",\"classificationKraken2\":true,\"tax2filter\":\"Homo sapiens\"}"
            else
              echo "read-cleaning: kraken2 DB absent at '$RC_KRAKEN2_DB' — SKIPPING (stays gated on a staged kraken2 DB; set SLURM_SHARED_KRAKEN2_DB or place the DB at the default path)."
            fi

            if [ "$gemma_fail" -ne 0 ]; then
              echo "One or more Gemma real-data pipeline runs failed."
              exit 1
            fi
          fi

      - name: Upload install-profile e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alma-install-with-profile-${{ github.event.inputs.profile_id || 'ci-runner' }}
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.PROFILE_ASSERT_JSON }}
            ${{ env.TELEMETRY_JSON }}
            ${{ env.PIPELINE_SMOKE_JSON }}
            ${{ env.PG_LOG }}
            ${{ env.MOCK_SERVER_LOG }}
            ${{ env.NPM_PACK_METADATA }}
            ${{ runner.temp }}/metaxpath-report-*
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup canary resources
        if: always()
        run: |
          set +e
          if [ "${USE_EPHEMERAL_POSTGRES:-0}" = "1" ] && [ -n "${PGDATA_DIR:-}" ] && [ -n "${PG_CTL_BIN:-}" ]; then
            "$PG_CTL_BIN" -D "$PGDATA_DIR" stop -m fast || true
            rm -rf "$PGDATA_DIR"
          fi
          if command -v psql >/dev/null 2>&1; then
            PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" -U "${DB_USER:-seqdesk}" -d postgres -c "DROP DATABASE IF EXISTS ${DB_NAME:-seqdesk_profile_missing}" >/dev/null 2>&1 || true
          fi
          # Stop any worker the installed app auto-started (e.g. pipeline-monitor).
          # It is spawned detached, so it keeps the release node_modules/.prisma
          # engine open after the app stops; on the runner's NFS home that leaves
          # an undeletable .nfs* silly-rename file and the rm below fails with
          # "Directory not empty". Scope the kill to this job's install dir.
          if [ -n "${INSTALL_DIR:-}" ]; then
            pkill -f "${INSTALL_DIR}.*-monitor" >/dev/null 2>&1 || true
            sleep 2
          fi
          # Remove the whole shared-FS work dir (postgres stopped + monitor killed above). It
          # lives on /net/runner, which is NOT auto-reclaimed between jobs like $RUNNER_TEMP.
          rm -rf "${PG_TOOLCHAIN_DIR:-}" "$INSTALL_DIR" "$MOCK_RELEASE_ROOT" "$RELEASE_ARTIFACT_DIR" "$NPM_ARTIFACT_DIR" "$NPM_CACHE" "$NPM_PREFIX" "${PROFILE_DATA_DIR:-}" "${PROFILE_RUN_DIR:-}" "${ALMA_WORK:-}" || true
