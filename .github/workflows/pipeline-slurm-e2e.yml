# Pipeline SLURM E2E
#
# Exercises real SLURM pipeline execution *through the running SeqDesk app* on the
# self-hosted AlmaLinux (Twincore) runner. It boots the built app against a local
# PostgreSQL database, logs in via the API, then drives pipeline runs with
# executionMode='slurm' so the SBATCH script generation (#SBATCH directives) and the
# Nextflow `executor = 'slurm'` config path get real coverage.
#
# REQUIREMENTS: the self-hosted runner MUST provide `sbatch`, `squeue`, and `sacct`
# on PATH. The runtime/SLURM smoke scripts guard on those commands and will fail fast
# if they are missing. Nextflow + Java are provisioned via a throwaway Conda env and
# wired into the app through the SEQDESK_CONDA_* settings so the generated run scripts
# can activate the toolchain.

name: Pipeline SLURM E2E

on:
  # Runs once a day on the private mirror (jobs are guarded to SeqDesk-ci), plus
  # on demand — not on every commit.
  schedule:
    - cron: "0 2 * * *" # daily 02:00 UTC
  workflow_dispatch:
    inputs:
      runtime_pipeline_id:
        description: "Consuming pipeline id for the runtime (local + SLURM) E2E"
        required: true
        default: "fastq-checksum"
        type: string

permissions:
  contents: read

concurrency:
  group: pipeline-slurm-e2e
  cancel-in-progress: false

jobs:
  slurm_app_e2e:
    name: Pipeline SLURM E2E (Self-hosted Alma)
    # Self-hosted runner lives only on the private CI mirror; never run on the public repo.
    if: ${{ github.repository == 'hzi-bifo/SeqDesk-ci' }}
    runs-on:
      group: bifo_dmz
      labels: [self-hosted, Linux, X64, db-local, twincore, alma]
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PIPELINE_CONDA_ENV: seqdesk-pipelines-ci-${{ github.run_id }}-slurm
      # Compute nodes do NOT share /home or the runner _work tree with the runner
      # (each node mounts /home from a different NFS server); only a dedicated shared
      # filesystem is visible cluster-wide. These point the SLURM run dir + pipeline
      # conda env at that shared FS. Set as Actions variables on the private CI mirror;
      # empty on the public repo, in which case the job falls back to runner-local
      # paths (fine for the local-mode portion, but SLURM submissions need the shared FS).
      SLURM_SHARED_CONDA_BASE: ${{ vars.SLURM_SHARED_CONDA_BASE }}
      SLURM_SHARED_RUN_ROOT: ${{ vars.SLURM_SHARED_RUN_ROOT }}
      # Full prefix PATH of the pipeline conda env on the shared FS. Names don't resolve
      # across nodes here (conda maps a name to ~/.conda/envs, which is per-node home),
      # and the admin conda's envs/ dir is read-only to the CI user, so the env lives at
      # a runner-writable prefix and is activated by full path.
      SLURM_SHARED_CONDA_ENV: ${{ vars.SLURM_SHARED_CONDA_ENV }}
      # This runner's SLURM account caps concurrent submissions per user (QOS
      # MaxSubmitJobsPerUser=1), so run each pipeline as a SINGLE SLURM job with
      # Nextflow's local executor inside instead of one job per process. Job-level so
      # both the app (boot) and the E2E assertions see it.
      SEQDESK_SLURM_INLINE_EXECUTOR: "1"
      DB_HOST: 127.0.0.1
      DB_PASSWORD: seqdesk
      DB_PORT: 5432
      DB_USER: seqdesk
      FALLBACK_DB_PORT: 55435
      # Short SLURM resource overrides so the smoke jobs are tiny and finish fast.
      SEQDESK_RUNTIME_E2E_SLURM_CORES: "1"
      SEQDESK_RUNTIME_E2E_SLURM_MEMORY: "1G"
      SEQDESK_RUNTIME_E2E_SLURM_TIME_LIMIT: "10"
      SEQDESK_SLURM_E2E_CORES: "1"
      SEQDESK_SLURM_E2E_MEMORY: "1G"
      SEQDESK_SLURM_E2E_TIME_LIMIT: "10"
      # Pipeline id the runtime smoke drives through both local and SLURM modes.
      RUNTIME_PIPELINE_ID: ${{ github.event.inputs.runtime_pipeline_id || 'fastq-checksum' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Configure run paths
        run: |
          set -euo pipefail
          RUN_SUFFIX="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-slurm"
          PORT=$((23000 + (GITHUB_RUN_NUMBER % 1000)))
          DB_NAME="seqdesk_slurm_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          echo "DB_NAME=$DB_NAME" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/server-slurm-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "RUNTIME_E2E_LOG=$RUNNER_TEMP/runtime-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "SLURM_E2E_LOG=$RUNNER_TEMP/slurm-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "FAILURE_E2E_LOG=$RUNNER_TEMP/slurm-failure-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "CANCEL_E2E_LOG=$RUNNER_TEMP/slurm-cancel-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "APPCHECK_E2E_LOG=$RUNNER_TEMP/appcheck-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/providers-slurm-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          # The SLURM compute node must see the pipeline's inputs (data), its run dir
          # (outputs/logs) AND any reference DBs, so place all three on the shared FS
          # when configured. Server/PG logs stay runner-local — only the app reads them.
          if [ -n "${SLURM_SHARED_RUN_ROOT:-}" ]; then
            SHARED_BASE="$SLURM_SHARED_RUN_ROOT"
            mkdir -p "$SHARED_BASE"
          else
            SHARED_BASE="$RUNNER_TEMP"
          fi
          echo "SEQDESK_DATA_DIR=$SHARED_BASE/seqdesk-data-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "SEQDESK_RUN_DIR=$SHARED_BASE/seqdesk-runs-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "SEQDESK_DB_DIR=$SHARED_BASE/seqdesk-pipeline-dbs-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "PGDATA_DIR=$RUNNER_TEMP/postgres-slurm-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "PG_LOG=$RUNNER_TEMP/postgres-slurm-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PG_TOOLCHAIN_DIR=$RUNNER_TEMP/seqdesk-postgres-tools-slurm-$RUN_SUFFIX" >> "$GITHUB_ENV"

      - name: Verify SLURM is available on the runner
        run: |
          set -euo pipefail
          missing=0
          for cmd in sbatch squeue sacct; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "Found $cmd: $(command -v "$cmd")"
            else
              echo "Missing required SLURM command on runner: $cmd" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "This workflow requires sbatch/squeue/sacct on the self-hosted runner." >&2
            exit 1
          fi

      - name: Create pipeline Conda environment
        run: |
          set -euo pipefail
          if [ -n "${SLURM_SHARED_CONDA_BASE:-}" ]; then
            # SLURM cluster: the compute nodes cannot see the runner's conda, so the env
            # must live on the shared filesystem. It is referenced by FULL PREFIX PATH,
            # not a name: a conda name maps to ~/.conda/envs, which is per-node home here
            # (each node mounts /home from a different NFS server), so names never resolve
            # across nodes. The env also can't go under the admin conda's envs/ dir (read
            # only to the CI user), so it lives at a runner-writable prefix on the shared
            # FS and is activated by path. Created once and reused across runs.
            CONDA_BIN="$SLURM_SHARED_CONDA_BASE/bin/conda"
            ENV_PREFIX="${SLURM_SHARED_CONDA_ENV:-$SLURM_SHARED_RUN_ROOT/conda-envs/seqdesk-pipelines}"
            echo "PIPELINE_CONDA_ENV=$ENV_PREFIX" >> "$GITHUB_ENV"
            PIPELINE_PKGS="python=3.11 openjdk=17 nodejs coreutils nextflow nf-core"
            # Pipelines run their process scripts inside this env on the compute node, so
            # it needs the full launcher toolchain (node + java + coreutils), not just
            # nextflow. Check the binaries INSIDE the env prefix directly — `conda run`
            # would also find tools on the runner's ambient PATH (e.g. the runner's own
            # node), giving a false "present" and skipping the top-up the compute node
            # needs. Reuse only when complete; else top up in place, or create new.
            if [ -x "$ENV_PREFIX/bin/nextflow" ] && [ -x "$ENV_PREFIX/bin/node" ]; then
              echo "Reusing existing shared conda env at $ENV_PREFIX (toolchain present)"
            elif [ -d "$ENV_PREFIX" ]; then
              echo "Topping up existing shared conda env at $ENV_PREFIX"
              "$CONDA_BIN" install -y -p "$ENV_PREFIX" \
                --override-channels -c conda-forge -c bioconda $PIPELINE_PKGS
            else
              echo "Creating shared conda env at $ENV_PREFIX"
              mkdir -p "$(dirname "$ENV_PREFIX")"
              "$CONDA_BIN" create -y -p "$ENV_PREFIX" \
                --override-channels -c conda-forge -c bioconda $PIPELINE_PKGS
            fi
          else
            conda create -y -n "$PIPELINE_CONDA_ENV" \
              --override-channels \
              -c conda-forge \
              -c bioconda \
              python=3.11 \
              openjdk=17 \
              nodejs \
              coreutils \
              nextflow \
              nf-core
          fi

      - name: Resolve Conda base and toolchain on PATH
        run: |
          set -euo pipefail
          # On a SLURM cluster the app must point at the shared conda the compute nodes
          # see, not the runner-local one. Falls back to the runner conda when unset.
          # Put the pipeline env tools (nextflow/java) on PATH so the app server can
          # locate them while still leaving the system SLURM binaries reachable.
          if [ -n "${SLURM_SHARED_CONDA_BASE:-}" ]; then
            CONDA_BASE="$SLURM_SHARED_CONDA_BASE"
            # The env is referenced by full prefix path on this cluster (names don't
            # resolve across nodes). Pin it for the app from the stable variable —
            # NOT via PIPELINE_CONDA_ENV, whose job-level env default makes its value
            # ambiguous against $GITHUB_ENV. Its bin is <prefix>/bin.
            echo "SEQDESK_CONDA_ENV=$SLURM_SHARED_CONDA_ENV" >> "$GITHUB_ENV"
            echo "$SLURM_SHARED_CONDA_ENV/bin" >> "$GITHUB_PATH"
          else
            CONDA_BASE="$(conda info --base)"
            echo "$CONDA_BASE/envs/$PIPELINE_CONDA_ENV/bin" >> "$GITHUB_PATH"
          fi
          echo "SEQDESK_CONDA_PATH=$CONDA_BASE" >> "$GITHUB_ENV"

      - name: Setup PostgreSQL toolchain
        run: |
          set -euo pipefail
          rm -rf "$PG_TOOLCHAIN_DIR"
          conda create -y -p "$PG_TOOLCHAIN_DIR" --override-channels -c conda-forge postgresql
          echo "$PG_TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"

      - name: Ensure PostgreSQL database
        run: |
          set -euo pipefail

          find_pg_bin_dir() {
            local candidate=""
            if command -v initdb >/dev/null 2>&1 && command -v pg_ctl >/dev/null 2>&1; then
              dirname "$(command -v initdb)"
              return 0
            fi
            if command -v pg_config >/dev/null 2>&1; then
              candidate="$(pg_config --bindir 2>/dev/null || true)"
              if [ -n "$candidate" ] && [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            fi
            for candidate in /usr/pgsql-*/bin /usr/lib/postgresql/*/bin; do
              if [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          create_seqdesk_database() {
            local port="$1"
            local admin_user="$2"
            local admin_password="${3:-}"
            if [ -n "$admin_password" ]; then
              export PGPASSWORD="$admin_password"
            else
              unset PGPASSWORD || true
            fi
            psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "DO \$\$ BEGIN CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASSWORD'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE $DB_USER WITH PASSWORD '$DB_PASSWORD'; END \$\$;"
            if ! psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1; then
              psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "CREATE DATABASE $DB_NAME OWNER $DB_USER"
            fi
          }

          wait_for_postgres() {
            local port="$1"
            for _ in $(seq 1 30); do
              if pg_isready -h "$DB_HOST" -p "$port" >/dev/null 2>&1; then
                return 0
              fi
              sleep 1
            done
            return 1
          }

          if pg_isready -h "$DB_HOST" -p "$DB_PORT" >/dev/null 2>&1; then
            if create_seqdesk_database "$DB_PORT" postgres; then
              echo "Using existing local PostgreSQL on port $DB_PORT."
              exit 0
            fi
          fi

          PG_BIN_DIR="$(find_pg_bin_dir || true)"
          if [ -n "$PG_BIN_DIR" ]; then
            rm -rf "$PGDATA_DIR"
            "$PG_BIN_DIR/initdb" -D "$PGDATA_DIR" -U postgres -A trust >/dev/null
            {
              echo "listen_addresses = '127.0.0.1'"
              echo "port = $FALLBACK_DB_PORT"
            } >> "$PGDATA_DIR/postgresql.conf"
            "$PG_BIN_DIR/pg_ctl" -D "$PGDATA_DIR" -l "$PG_LOG" start
            wait_for_postgres "$FALLBACK_DB_PORT"
            create_seqdesk_database "$FALLBACK_DB_PORT" postgres
            echo "DB_PORT=$FALLBACK_DB_PORT" >> "$GITHUB_ENV"
            echo "USE_EPHEMERAL_POSTGRES=1" >> "$GITHUB_ENV"
            echo "PG_CTL_BIN=$PG_BIN_DIR/pg_ctl" >> "$GITHUB_ENV"
            echo "Provisioned PostgreSQL via temporary user-space cluster."
            exit 0
          fi

          echo "PostgreSQL provisioning requires existing local PostgreSQL or user-space PostgreSQL tools."
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Set database connection environment
        run: |
          set -euo pipefail
          DB_URL="postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "DIRECT_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Seed database (admin + researcher accounts)
        run: npm run db:seed

      - name: Build SeqDesk app
        run: npm run build

      - name: Boot SeqDesk app and verify readiness
        run: |
          set -euo pipefail
          mkdir -p "$SEQDESK_DATA_DIR" "$SEQDESK_RUN_DIR" "$SEQDESK_DB_DIR"
          # Wire pipeline + conda execution into the running app so SLURM submissions
          # generate real #SBATCH scripts and activate the Nextflow toolchain.
          export NEXTAUTH_URL="http://127.0.0.1:${PORT}"
          export NEXTAUTH_SECRET="pipeline-slurm-e2e-secret"
          export SEQDESK_PIPELINES_ENABLED=true
          export SEQDESK_DATA_PATH="$SEQDESK_DATA_DIR"
          export SEQDESK_PIPELINE_RUN_DIR="$SEQDESK_RUN_DIR"
          export SEQDESK_PIPELINE_DATABASE_DIR="$SEQDESK_DB_DIR"
          export SEQDESK_CONDA_ENABLED=true
          export SEQDESK_CONDA_PATH="$SEQDESK_CONDA_PATH"
          # Prefer the stable shared-cluster env path; fall back to the per-run name.
          export SEQDESK_CONDA_ENV="${SLURM_SHARED_CONDA_ENV:-$PIPELINE_CONDA_ENV}"
          export SEQDESK_SLURM_ENABLED=true
          # SEQDESK_SLURM_INLINE_EXECUTOR is set at job level (inherited here).
          # SLURM compute nodes can't see the app's _work tree, so the pipeline
          # packages (Nextflow workflow scripts) must live on the shared FS. Stage
          # them next to the shared run dir and point the app there.
          if [ -n "${SLURM_SHARED_RUN_ROOT:-}" ]; then
            SHARED_PIPELINES_DIR="$(dirname "$SLURM_SHARED_RUN_ROOT")/pipelines"
            rm -rf "$SHARED_PIPELINES_DIR"
            mkdir -p "$SHARED_PIPELINES_DIR"
            cp -R pipelines/. "$SHARED_PIPELINES_DIR/"
            export SEQDESK_PIPELINES_DIR="$SHARED_PIPELINES_DIR"
            # Shared, PERSISTENT Nextflow conda cacheDir (outside the per-run dir, so
            # cleanup never removes it). A pipeline's LOCAL run (on the runner, which has
            # network) builds the per-process env here; the later SLURM run on the
            # network-isolated compute node reuses it by hash — no conda fetch needed.
            SHARED_CONDA_CACHE="$(dirname "$SLURM_SHARED_RUN_ROOT")/conda-cache"
            mkdir -p "$SHARED_CONDA_CACHE"
            export SEQDESK_CONDA_CACHE_DIR="$SHARED_CONDA_CACHE"
          fi
          echo "[boot] SEQDESK_CONDA_PATH=$SEQDESK_CONDA_PATH SEQDESK_CONDA_ENV=$SEQDESK_CONDA_ENV SEQDESK_PIPELINE_RUN_DIR=$SEQDESK_PIPELINE_RUN_DIR SEQDESK_PIPELINES_DIR=${SEQDESK_PIPELINES_DIR:-<app default>} SEQDESK_CONDA_CACHE_DIR=${SEQDESK_CONDA_CACHE_DIR:-<app default>}"
          PORT="$PORT" npm run start >"$SERVER_LOG" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time." >&2
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          echo "SeqDesk app is ready on port $PORT."

      - name: Run runtime pipeline E2E (local + SLURM through the app)
        env:
          SEQDESK_RUNTIME_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_RUNTIME_E2E_EMAIL: admin@example.com
          SEQDESK_RUNTIME_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          npm run pipeline:e2e:runtime -- \
            --ensure-dummy-data \
            --pipeline-id "$RUNTIME_PIPELINE_ID" \
            2>&1 | tee "$RUNTIME_E2E_LOG"

      # Runs EARLY on purpose: fastqc reads the order's FASTQs, and the fastq-checksum
      # step above is merge-mode (writes checksums, doesn't move/replace files), so the
      # order still has its original intact reads here (simulate-reads replace + the
      # failure-path test churn them LATER). fastqc declares a bioconda::fastqc conda
      # directive, so Nextflow builds a per-process conda env at runtime. The compute
      # node has NO network, so the SLURM run can't build it directly — but with the
      # shared SEQDESK_CONDA_CACHE_DIR set, the LOCAL run (on the networked runner) builds
      # the env into that shared cache first, and the SLURM run reuses it by hash. So
      # local+SLURM both work via the shared conda cache.
      - name: Run fastqc E2E (local + SLURM, artifacts)
        env:
          SEQDESK_RUNTIME_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_RUNTIME_E2E_EMAIL: admin@example.com
          SEQDESK_RUNTIME_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          npm run pipeline:e2e:runtime -- \
            --ensure-dummy-data \
            --pipeline-id fastqc \
            2>&1 | tee "$RUNNER_TEMP/fastqc-e2e-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.log"

      - name: Run study-demo-report E2E (local + SLURM, study target)
        env:
          SEQDESK_RUNTIME_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_RUNTIME_E2E_EMAIL: admin@example.com
          SEQDESK_RUNTIME_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          # study-demo-report is study-scoped and hermetic (awk only, no per-process
          # conda env), so it exercises the study-target path in both local and SLURM.
          npm run pipeline:e2e:runtime -- \
            --ensure-dummy-data \
            --pipeline-id study-demo-report \
            2>&1 | tee "$RUNNER_TEMP/study-demo-report-e2e-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.log"

      - name: Run simulate-reads E2E (local + SLURM, replace writeback)
        env:
          SEQDESK_RUNTIME_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_RUNTIME_E2E_EMAIL: admin@example.com
          SEQDESK_RUNTIME_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          # simulate-reads in BOTH local and SLURM (replace mode creates a new active
          # Read per sample). The SLURM-only smoke also runs it; this adds local coverage.
          npm run pipeline:e2e:runtime -- \
            --ensure-dummy-data \
            --pipeline-id simulate-reads \
            2>&1 | tee "$RUNNER_TEMP/simulate-reads-e2e-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.log"

      # reads-qc — study target; per-process seqkit/python conda built via the shared
      # cacheDir (the mechanism fastqc proved). HARD-ASSERTED (local + SLURM, `completes`
      # gate): the local `completed`->`running` re-sync flip that originally deferred it was
      # fixed (forceRunningFromQueue no longer demotes a genuinely-finished run — see
      # pipeline-run-ops-service.ts + its regression test), and reads-qc now reaches
      # `completed` and stays there in both modes.
      - name: Run reads-qc E2E (local + SLURM, study target)
        env:
          SEQDESK_RUNTIME_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_RUNTIME_E2E_EMAIL: admin@example.com
          SEQDESK_RUNTIME_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          npm run pipeline:e2e:runtime -- \
            --ensure-dummy-data \
            --pipeline-id reads-qc \
            2>&1 | tee "$RUNNER_TEMP/reads-qc-e2e-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.log"

      # read-cleaning coverage moved to the "Install SeqDesk + run a SLURM pipeline on the
      # installed app" step below. Its kraken2 DB is now MANAGED via the install profile
      # (one key: PipelineConfig.kraken2Db), the realistic facility flow — not a per-run
      # --config-json override, which production HIDES once the DB is server-managed
      # (hideWhenServerConfigured). That step already proves the managed DB is applied on the
      # installed app; the full read-cleaning RUN there is still gated on a hosted raw/spiked
      # dataset (see PIPELINE_E2E_COVERAGE.md).

      - name: Run SLURM-only pipeline smoke through the app
        env:
          SEQDESK_SLURM_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_SLURM_E2E_EMAIL: admin@example.com
          SEQDESK_SLURM_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          npm run pipeline:e2e:slurm 2>&1 | tee "$SLURM_E2E_LOG"

      - name: Run SLURM failure-path E2E through the app
        env:
          SEQDESK_SLURM_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_SLURM_E2E_EMAIL: admin@example.com
          SEQDESK_SLURM_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          # Deliberately runs a SLURM job that FAILS (missing FASTQ) to prove SeqDesk
          # reconciles the run to status=failed in the DB. The expected FAILED job in
          # sacct below is therefore intentional, not a regression. Runs after the
          # success smokes; the script restores the moved FASTQs in a finally block,
          # and the data dir is per-run and wiped in cleanup either way.
          npm run pipeline:e2e:slurm-failure 2>&1 | tee "$FAILURE_E2E_LOG"

      - name: Run SLURM cancel/stop E2E through the app
        env:
          SEQDESK_SLURM_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_SLURM_E2E_EMAIL: admin@example.com
          SEQDESK_SLURM_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          # Starts a SLURM run and immediately cancels it (DELETE -> scancel), asserting
          # the run reconciles to status=cancelled and the SLURM job is gone. The
          # expected CANCELLED job in sacct below is intentional.
          npm run pipeline:e2e:slurm-cancel 2>&1 | tee "$CANCEL_E2E_LOG"

      # --- App-behaviour checks (ordered after the proven pipeline steps) ---

      - name: Run pipeline no-data validation E2E
        env:
          SEQDESK_APPCHECK_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_APPCHECK_EMAIL: admin@example.com
          SEQDESK_APPCHECK_PASSWORD: admin
        run: |
          set -euo pipefail
          # Creates a throwaway DRAFT order with a read-less sample, then proves that
          # starting a run on it is rejected with a clean validation error (4xx, not a
          # 500/crash). Pure HTTP — no SLURM, no pipeline execution. Cleans up the order.
          echo "===== appcheck: nodata =====" | tee "$APPCHECK_E2E_LOG"
          npm run pipeline:e2e:appcheck -- --check nodata 2>&1 | tee -a "$APPCHECK_E2E_LOG"

      - name: Run pipeline access E2E (notifications + permissions)
        env:
          SEQDESK_APPCHECK_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_APPCHECK_EMAIL: admin@example.com
          SEQDESK_APPCHECK_PASSWORD: admin
        run: |
          set -euo pipefail
          # Runs a fast LOCAL fastq-checksum run to completion, then asserts (a) a
          # 'pipeline.completed' in-app notification fired, and (b) a non-admin
          # researcher cannot read/cancel the admin's run (403) and anonymous is 401.
          echo "===== appcheck: access =====" | tee -a "$APPCHECK_E2E_LOG"
          npm run pipeline:e2e:appcheck -- --check access 2>&1 | tee -a "$APPCHECK_E2E_LOG"

      - name: Run SLURM stuck-run reconciliation E2E
        env:
          SEQDESK_APPCHECK_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_APPCHECK_EMAIL: admin@example.com
          SEQDESK_APPCHECK_PASSWORD: admin
        run: |
          set -euo pipefail
          # Starts a SLURM run, lets it reach running/queued, then scancels the job OUT
          # OF BAND (behind the app's back) and asserts /sync reconciles the vanished job
          # to a terminal status instead of leaving it wedged (the 99%-stuck regression).
          # The expected CANCELLED job in sacct is intentional.
          echo "===== appcheck: stuck =====" | tee -a "$APPCHECK_E2E_LOG"
          npm run pipeline:e2e:appcheck -- --check stuck 2>&1 | tee -a "$APPCHECK_E2E_LOG"

      - name: SLURM shared-filesystem canary (diagnostic)
        if: always()
        run: |
          set +e
          if ! command -v sbatch >/dev/null 2>&1; then echo "sbatch unavailable; skip canary"; exit 0; fi
          WORK_DIR="$SEQDESK_RUN_DIR/_canary"   # under the runner _work tree (suspect: local disk)
          HOME_DIR="$HOME/seqdesk-ci-canary"    # under the shared home, OUTSIDE _work
          rm -rf "$WORK_DIR" "$HOME_DIR"; mkdir -p "$WORK_DIR" "$HOME_DIR"
          echo "head wrote work $(date)" > "$WORK_DIR/head-marker.txt"
          echo "head wrote home $(date)" > "$HOME_DIR/head-marker.txt"
          # Run slurmd's --output under $HOME (likely shared+writable) so the probe
          # results survive even when the _work run dir is not usable on the node.
          # The probe reports df/mount for both trees and tries read/write on each.
          JID=$(sbatch --parsable -p cpu -c 1 --mem=200M -t 5:00 -D "$HOME_DIR" \
            --output="$HOME_DIR/canary-%j.out" --error="$HOME_DIR/canary-%j.err" \
            --wrap "set +e; echo node=\$(hostname); echo '--- df WORK ---'; df -hP '$WORK_DIR' 2>&1; echo '--- df HOME ---'; df -hP '$HOME_DIR' 2>&1; echo '--- mounts ---'; mount 2>/dev/null | grep -E ' nfs|on /home|_work' | head; echo '--- read _work marker? ---'; cat '$WORK_DIR/head-marker.txt' 2>&1; echo '--- write _work? ---'; (echo x > '$WORK_DIR/node-write' && echo WORK-WRITE-OK || echo WORK-WRITE-FAIL) 2>&1; echo '--- write HOME? ---'; (echo x > '$HOME_DIR/node-write' && echo HOME-WRITE-OK || echo HOME-WRITE-FAIL) 2>&1; echo '--- pipeline conda env nextflow? ---'; '$PIPELINE_CONDA_ENV/bin/nextflow' -version 2>&1 | head -3")
          echo "canary job id: $JID"
          for _ in $(seq 1 90); do
            st=$(sacct -j "${JID%%;*}" --noheader -o State -P 2>/dev/null | head -1)
            case "$st" in *COMPLETED*|*FAILED*|*CANCEL*|*TIMEOUT*|*OUT_OF*) echo "canary final state: $st"; break;; esac
            sleep 2
          done
          echo "===== canary STDOUT (written by the node to \$HOME) ====="; cat "$HOME_DIR"/canary-*.out 2>&1
          echo "===== canary STDERR ====="; cat "$HOME_DIR"/canary-*.err 2>&1
          echo "===== node-write probes that landed back on the head node ====="
          echo "  _work/node-write: $(cat "$WORK_DIR/node-write" 2>&1)"
          echo "  HOME/node-write:  $(cat "$HOME_DIR/node-write" 2>&1)"
          echo "===== sacct (canary) ====="; sacct -j "${JID%%;*}" -o JobID,State,ExitCode,NodeList 2>&1
          rm -rf "$HOME_DIR"
          true

      - name: Stop SeqDesk app
        if: always()
        run: |
          set +e
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          fi

      # PROOF: a REAL INSTALL can run a SLURM pipeline and write results back to the DB —
      # "install SeqDesk, then run a SLURM job through that installed instance". Reuses this
      # job's shared FS + prebuilt conda env + SLURM_SHARED_* + inline executor, installing
      # via the npm launcher + a mock release server (the Alma E2E pattern). Runs after the
      # source-boot app is stopped (one app per DB). WARN-ONLY while it's brought up; the
      # first target is fastq-checksum, to expand to every pipeline (see PIPELINE_E2E_COVERAGE.md).
      - name: Install SeqDesk + run a SLURM pipeline on the installed app (warn-only)
        # always() so an unrelated earlier flake (e.g. the failure-path timing race) can't
        # skip this; continue-on-error so this experimental cut can't red the suite.
        if: always()
        continue-on-error: true
        env:
          # Pinned into the install profile as read-cleaning's MANAGED kraken2 DB (same default
          # + override as the source-boot read-cleaning step). Empty/absent → the profile omits
          # it and the read-cleaning full run stays gated on a raw dataset.
          SLURM_SHARED_KRAKEN2_DB: ${{ vars.SLURM_SHARED_KRAKEN2_DB || '/net/broker/checkm_refdata/kraken2_db' }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          # The installer's preflight needs ~2G free at --dir, but $RUNNER_TEMP is on /home
          # (only ~1G on this runner), so root the work area on the shared run FS that already
          # holds the pipeline run/data dirs. The trap stashes the small logs into slurm-diag
          # (uploaded as an artifact) and frees the heavy dirs — app node_modules/.next, the
          # npm cache, the installed data/run trees — on every exit path (these live on the
          # shared FS, which isn't auto-reclaimed between jobs like $RUNNER_TEMP is).
          WORK="${SLURM_SHARED_RUN_ROOT:-$RUNNER_TEMP}/install-slurm-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          APP_DIR="$WORK/app"; MOCK_ROOT="$WORK/mock"; NPM_PREFIX="$WORK/npm-prefix"
          INSTALLED_PORT=$((PORT + 1)); MOCK_PORT=$((PORT + 2))
          INSTALLED_DATA="$SEQDESK_DATA_DIR-installed"; INSTALLED_RUNS="$SEQDESK_RUN_DIR-installed"
          DIAG_OUT="$RUNNER_TEMP/slurm-diag"
          # A real install owns its database. Sharing the source-boot DB makes the installed
          # app's --ensure-dummy-data short-circuit (the order already exists) and then resolve
          # reads against a data dir where the FASTQs were never written. Give it a fresh DB on
          # the same ephemeral Postgres; the install migrates + seeds it, and dummy data then
          # lands in $INSTALLED_DATA consistently.
          INSTALLED_DB_NAME="${DB_NAME}_installed"
          INSTALLED_DB_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${INSTALLED_DB_NAME}?schema=public"
          rm -rf "$WORK"
          mkdir -p "$MOCK_ROOT/api" "$MOCK_ROOT/downloads" "$INSTALLED_DATA" "$INSTALLED_RUNS" "$NPM_PREFIX" "$DIAG_OUT"
          cleanup_install_slurm() {
            for f in install.log server.log mock.log install-slurm-fastq-checksum.log; do
              [ -f "$WORK/$f" ] && cp "$WORK/$f" "$DIAG_OUT/installslurm-$f" 2>/dev/null || true
            done
            rm -rf "$WORK" "$INSTALLED_DATA" "$INSTALLED_RUNS" 2>/dev/null || true
            PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" \
              -U "${DB_USER:-seqdesk}" -d postgres -c "DROP DATABASE IF EXISTS \"$INSTALLED_DB_NAME\"" >/dev/null 2>&1 || true
          }
          trap cleanup_install_slurm EXIT

          echo "=== create a fresh database for the installed app ==="
          PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" \
            -U "${DB_USER:-seqdesk}" -d postgres \
            -c "DROP DATABASE IF EXISTS \"$INSTALLED_DB_NAME\"" -c "CREATE DATABASE \"$INSTALLED_DB_NAME\""

          echo "=== build release tarball + npm launcher ==="
          bash "$GITHUB_WORKSPACE/scripts/build-release.sh" "$VERSION" --offline-fonts --webpack
          cp "$GITHUB_WORKSPACE/seqdesk-${VERSION}.tar.gz" "$MOCK_ROOT/downloads/"
          cp "$GITHUB_WORKSPACE/scripts/install-dist.sh" "$MOCK_ROOT/install.sh"
          CHECKSUM="sha256:$(sha256sum "$MOCK_ROOT/downloads/seqdesk-${VERSION}.tar.gz" | cut -d' ' -f1)"
          echo "{\"latest\":{\"version\":\"$VERSION\",\"channel\":\"stable\",\"releaseDate\":\"$(date -u +%F)\",\"downloadUrl\":\"http://127.0.0.1:$MOCK_PORT/downloads/seqdesk-${VERSION}.tar.gz\",\"checksum\":\"$CHECKSUM\",\"minNodeVersion\":\"18.0.0\"},\"updateAvailable\":false}" > "$MOCK_ROOT/api/version"
          ( cd "$GITHUB_WORKSPACE/npm/seqdesk" && npm run sync-version >/dev/null 2>&1 && npm pack --pack-destination "$WORK" >/dev/null )
          NPM_TGZ="$(find "$WORK" -maxdepth 1 -name 'seqdesk-*.tgz' | head -n1)"
          npm install -g "$NPM_TGZ" --prefix "$NPM_PREFIX" --cache "$WORK/npm-cache" >/dev/null

          echo "=== start mock release server ==="
          ( cd "$MOCK_ROOT" && exec python3 -m http.server "$MOCK_PORT" --bind 127.0.0.1 >"$WORK/mock.log" 2>&1 ) &
          MOCK_PID=$!
          for _ in $(seq 1 30); do curl -fsS "http://127.0.0.1:$MOCK_PORT/api/version" >/dev/null 2>&1 && break; sleep 1; done

          echo "=== install with SLURM execution configured ==="
          PATH="$NPM_PREFIX/bin:$PATH" \
          SEQDESK_API="http://127.0.0.1:$MOCK_PORT/api" \
          SEQDESK_INSTALL_URL="http://127.0.0.1:$MOCK_PORT/install.sh" \
          SEQDESK_LOG="$WORK/install.log" \
          SEQDESK_EXEC_USE_SLURM=true \
          SEQDESK_EXEC_CONDA_PATH="$SEQDESK_CONDA_PATH" \
          SEQDESK_EXEC_CONDA_ENV="$SEQDESK_CONDA_ENV" \
          SEQDESK_EXEC_SLURM_CORES=1 \
          SEQDESK_EXEC_SLURM_MEMORY=1G \
          SEQDESK_EXEC_SLURM_TIME_LIMIT=10 \
            seqdesk -y --no-pm2 --with-pipelines \
              --dir "$APP_DIR" --port "$INSTALLED_PORT" \
              --data-path "$INSTALLED_DATA" --run-dir "$INSTALLED_RUNS" \
              --nextauth-url "http://127.0.0.1:$INSTALLED_PORT" \
              --database-url "$INSTALLED_DB_URL" --database-direct-url "$INSTALLED_DB_URL"
          kill "$MOCK_PID" >/dev/null 2>&1 || true
          test -x "$APP_DIR/start.sh"

          echo "=== apply a facility install profile (managed pipeline config) ==="
          # Pin read-cleaning's managed kraken2 DB through the install profile, exactly as a
          # facility ships it — NOT a per-run --config-json override (production HIDES that
          # field once the DB is server-managed). apply-install-profile.mjs is the same script
          # the installer runs for a hosted --profile; we feed a local resolved profile so the
          # test is self-contained. This writes PipelineConfig.config.kraken2Db, which is the
          # single key `nextflow ... --kraken2db` resolves from at run time.
          fail=0
          PROFILE_JSON="$WORK/profile.json"
          KRAKEN2_DB="${SLURM_SHARED_KRAKEN2_DB:-}"
          [ -e "$KRAKEN2_DB" ] || KRAKEN2_DB=""
          KRAKEN2_DB="$KRAKEN2_DB" PROFILE_OUT="$PROFILE_JSON" node -e '
            const fs = require("fs");
            const db = process.env.KRAKEN2_DB || "";
            const rc = { classificationKraken2: true, tax2filter: "Homo sapiens" };
            if (db) rc.kraken2Db = db;
            fs.writeFileSync(process.env.PROFILE_OUT, JSON.stringify(
              { pipelines: { enabled: true,
                  enable: ["fastq-checksum", "reads-qc", "read-cleaning"],
                  configs: { "read-cleaning": rc } } }, null, 2));
          '
          if [ -n "$KRAKEN2_DB" ]; then
            echo "Profile pins read-cleaning kraken2Db = $KRAKEN2_DB"
          else
            echo "kraken2 DB absent at '${SLURM_SHARED_KRAKEN2_DB:-<unset>}' — profile omits kraken2Db (read-cleaning full run stays gated on a raw dataset)."
          fi
          # Apply from the source checkout (it ships apply-install-profile.mjs + the apply-core
          # lib + a generated Prisma client), targeting the INSTALLED app's own database, so the
          # installed app honors the managed config. (The installer doesn't leave this dev script
          # on the installed app's path post-install.)
          ( cd "$GITHUB_WORKSPACE" && DATABASE_URL="$INSTALLED_DB_URL" DIRECT_URL="$INSTALLED_DB_URL" \
              node scripts/apply-install-profile.mjs --profile-config "$PROFILE_JSON" ) \
            || { echo "ERROR: install-profile apply failed."; fail=1; }

          echo "=== assert the managed config landed in the DB the installed app reads ==="
          if [ -n "$KRAKEN2_DB" ]; then
            RC_DB_CONFIG="$(PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" -U "${DB_USER:-seqdesk}" -d "$INSTALLED_DB_NAME" -tAc "select config from \"PipelineConfig\" where \"pipelineId\"='read-cleaning'" 2>&1 || true)"
            echo "PipelineConfig[read-cleaning].config = $RC_DB_CONFIG"
            case "$RC_DB_CONFIG" in
              *"$KRAKEN2_DB"*) echo "OK: profile-managed kraken2Db persisted — --kraken2db resolves from here, no per-run override." ;;
              *) echo "ERROR: managed kraken2Db not found in PipelineConfig after profile apply."; fail=1 ;;
            esac
          fi

          echo "=== boot the INSTALLED app with the SLURM runtime env ==="
          ( cd "$APP_DIR"
            export DATABASE_URL="$INSTALLED_DB_URL" DIRECT_URL="$INSTALLED_DB_URL"
            export SEQDESK_SLURM_INLINE_EXECUTOR=1 SEQDESK_SLURM_ENABLED=true SEQDESK_CONDA_ENABLED=true
            export SEQDESK_CONDA_PATH="$SEQDESK_CONDA_PATH" SEQDESK_CONDA_ENV="$SEQDESK_CONDA_ENV"
            export SEQDESK_PIPELINE_RUN_DIR="$INSTALLED_RUNS" SEQDESK_DATA_PATH="$INSTALLED_DATA"
            [ -n "${SEQDESK_PIPELINES_DIR:-}" ] && export SEQDESK_PIPELINES_DIR
            [ -n "${SEQDESK_CONDA_CACHE_DIR:-}" ] && export SEQDESK_CONDA_CACHE_DIR
            exec ./start.sh "$INSTALLED_PORT" ) >"$WORK/server.log" 2>&1 &
          INSTALLED_APP_PID=$!
          for _ in $(seq 1 60); do curl -fsS "http://127.0.0.1:$INSTALLED_PORT/api/auth/providers" >/dev/null 2>&1 && break; sleep 2; done

          echo "=== run fastq-checksum in SLURM mode through the INSTALLED app ==="
          # No --config-json: managed config (and execution) come from the profile/install,
          # the realistic facility flow. Add read-cleaning here once a raw dataset is hosted.
          rc=0
          SEQDESK_RUNTIME_E2E_BASE_URL="http://127.0.0.1:$INSTALLED_PORT" \
          SEQDESK_RUNTIME_E2E_EMAIL=admin@example.com \
          SEQDESK_RUNTIME_E2E_PASSWORD=admin \
          SEQDESK_RUNTIME_E2E_SLURM_CORES=1 \
          SEQDESK_RUNTIME_E2E_SLURM_MEMORY=1G \
          SEQDESK_RUNTIME_E2E_SLURM_TIME_LIMIT=10 \
            npm run pipeline:e2e:runtime -- \
              --ensure-dummy-data --pipeline-id fastq-checksum --skip-local \
              2>&1 | tee "$WORK/install-slurm-fastq-checksum.log" || rc=$?
          kill "$INSTALLED_APP_PID" >/dev/null 2>&1 || true
          echo "install-SLURM fastq-checksum exit: $rc"
          if [ "$rc" != 0 ]; then
            echo "--- installed-app run logs (the cleanup trap frees these; dump them now) ---"
            find "$INSTALLED_RUNS" -type f \( -name 'slurm-*.err' -o -name 'slurm-*.out' \
              -o -name '.command.err' -o -name '.command.log' -o -name '.command.sh' \
              -o -name 'pipeline.err' -o -name 'pipeline.out' -o -name '.nextflow.log' -o -name 'run.sh' \) \
              2>/dev/null | sort | while IFS= read -r f; do
                echo "::group::$f"; sed -n '1,200p' "$f" 2>/dev/null; echo "::endgroup::"; done || true
          fi
          [ "$rc" = 0 ] || fail=1
          exit "$fail"

      - name: Collect SLURM + pipeline diagnostics
        if: always()
        run: |
          set +e
          DIAG="$RUNNER_TEMP/slurm-diag"
          mkdir -p "$DIAG"

          # 1) Run-folder tree + every relevant log, echoed to the console AND staged.
          if [ -n "${SEQDESK_RUN_DIR:-}" ] && [ -d "$SEQDESK_RUN_DIR" ]; then
            find "$SEQDESK_RUN_DIR" -maxdepth 5 -printf '%y %10s  %p\n' 2>/dev/null | tee "$DIAG/run-dir-tree.txt"
            find "$SEQDESK_RUN_DIR" -type f \( \
                 -name 'pipeline.out' -o -name 'pipeline.err' \
              -o -name 'slurm-*.out' -o -name 'slurm-*.err' \
              -o -name '.nextflow.log*' -o -name 'run.sh' -o -name 'trace.txt' \
              -o -name '.command.err' -o -name '.command.log' -o -name '.command.out' \) 2>/dev/null \
            | while IFS= read -r f; do
                echo "::group::$f"
                sed -n '1,500p' "$f"
                echo "::endgroup::"
              done
          else
            echo "No run dir at '${SEQDESK_RUN_DIR:-<unset>}'."
          fi

          # 2) SLURM's own view — the only clue when a job fails before writing any log
          #    (e.g. compute node can't see the run dir, so --output can't be opened).
          if command -v sacct >/dev/null 2>&1; then
            echo "### sacct (last 2h)" | tee "$DIAG/sacct.txt"
            sacct -u "$USER" --starttime=now-2hours \
              --format=JobID,JobName%45,State,ExitCode,Reason%50,WorkDir%140,NodeList 2>&1 \
              | tee -a "$DIAG/sacct.txt"
            if command -v scontrol >/dev/null 2>&1; then
              for jid in $(sacct -u "$USER" --starttime=now-2hours --noheader --format=JobID -P 2>/dev/null | grep -E '^[0-9]+$' | sort -u); do
                echo "### scontrol show job $jid" | tee -a "$DIAG/scontrol.txt"
                scontrol show job "$jid" 2>&1 | tee -a "$DIAG/scontrol.txt"
                # cat the StdOut/StdErr paths SLURM actually resolved, wherever they landed
                for kind in StdOut StdErr; do
                  p="$(scontrol show job "$jid" 2>/dev/null | tr ' ' '\n' | sed -n "s/^${kind}=//p")"
                  if [ -n "$p" ] && [ -f "$p" ]; then
                    echo "::group::$kind($jid) = $p"; sed -n '1,300p' "$p"; echo "::endgroup::"
                    cp "$p" "$DIAG/" 2>/dev/null
                  fi
                done
              done
            fi
          else
            echo "sacct not on PATH; cannot capture SLURM accounting." | tee "$DIAG/sacct.txt"
          fi
          true

      - name: Upload SLURM pipeline E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-slurm-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SERVER_LOG }}
            ${{ env.RUNTIME_E2E_LOG }}
            ${{ env.SLURM_E2E_LOG }}
            ${{ env.FAILURE_E2E_LOG }}
            ${{ env.CANCEL_E2E_LOG }}
            ${{ env.APPCHECK_E2E_LOG }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.PG_LOG }}
            ${{ env.SEQDESK_RUN_DIR }}
            ${{ runner.temp }}/slurm-diag
            # Per-process conda envs (built at runtime for pipelines like fastqc) are a
            # large tree of symlinks that breaks the upload — and they're not useful as
            # artifacts. The per-process logs are already echoed by the diagnostics step.
            !${{ env.SEQDESK_RUN_DIR }}/**/work/conda/**
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup resources
        if: always()
        run: |
          set +e
          if [ "${USE_EPHEMERAL_POSTGRES:-0}" = "1" ] && [ -n "${PGDATA_DIR:-}" ] && [ -n "${PG_CTL_BIN:-}" ]; then
            "$PG_CTL_BIN" -D "$PGDATA_DIR" stop -m fast || true
            rm -rf "$PGDATA_DIR"
          fi
          if command -v psql >/dev/null 2>&1; then
            PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" -U "${DB_USER:-seqdesk}" -d postgres -c "DROP DATABASE IF EXISTS ${DB_NAME:-seqdesk_slurm_missing}" >/dev/null 2>&1 || true
          fi
          # Remove temp dirs BEFORE the conda env: this shell runs with the env
          # active on PATH, so deleting it first leaves `rm` unresolvable (exit 127).
          rm -rf "${PG_TOOLCHAIN_DIR:-}" "${SEQDESK_DATA_DIR:-}" "${SEQDESK_RUN_DIR:-}" "${SEQDESK_DB_DIR:-}"
          if [ -n "${SLURM_SHARED_RUN_ROOT:-}" ]; then
            rm -rf "$(dirname "$SLURM_SHARED_RUN_ROOT")/pipelines" || true
          fi
          # Only remove a throwaway per-run env. With the shared cluster conda
          # (SLURM_SHARED_CONDA_BASE set) the env is persistent and reused across runs.
          if [ -z "${SLURM_SHARED_CONDA_BASE:-}" ]; then
            conda env remove -n "$PIPELINE_CONDA_ENV" || true
          fi
