# Pipeline SLURM E2E
#
# Exercises real SLURM pipeline execution *through the running SeqDesk app* on the
# self-hosted AlmaLinux (Twincore) runner. It boots the built app against a local
# PostgreSQL database, logs in via the API, then drives pipeline runs with
# executionMode='slurm' so the SBATCH script generation (#SBATCH directives) and the
# Nextflow `executor = 'slurm'` config path get real coverage.
#
# REQUIREMENTS: the self-hosted runner MUST provide `sbatch`, `squeue`, and `sacct`
# on PATH. The runtime/SLURM smoke scripts guard on those commands and will fail fast
# if they are missing. Nextflow + Java are provisioned via a throwaway Conda env and
# wired into the app through the SEQDESK_CONDA_* settings so the generated run scripts
# can activate the toolchain.

name: Pipeline SLURM E2E

on:
  # Manual only — the self-hosted SLURM run is started on demand (on the private
  # mirror), not automatically on every commit.
  workflow_dispatch:
    inputs:
      runtime_pipeline_id:
        description: "Consuming pipeline id for the runtime (local + SLURM) E2E"
        required: true
        default: "fastq-checksum"
        type: string

permissions:
  contents: read

concurrency:
  group: pipeline-slurm-e2e
  cancel-in-progress: false

jobs:
  slurm_app_e2e:
    name: Pipeline SLURM E2E (Self-hosted Alma)
    # Self-hosted runner lives only on the private CI mirror; never run on the public repo.
    if: ${{ github.repository == 'hzi-bifo/SeqDesk-ci' }}
    runs-on:
      group: bifo_dmz
      labels: [self-hosted, Linux, X64, db-local, twincore, alma]
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PIPELINE_CONDA_ENV: seqdesk-pipelines-ci-${{ github.run_id }}-slurm
      DB_HOST: 127.0.0.1
      DB_PASSWORD: seqdesk
      DB_PORT: 5432
      DB_USER: seqdesk
      FALLBACK_DB_PORT: 55435
      # Short SLURM resource overrides so the smoke jobs are tiny and finish fast.
      SEQDESK_RUNTIME_E2E_SLURM_CORES: "1"
      SEQDESK_RUNTIME_E2E_SLURM_MEMORY: "1G"
      SEQDESK_RUNTIME_E2E_SLURM_TIME_LIMIT: "10"
      SEQDESK_SLURM_E2E_CORES: "1"
      SEQDESK_SLURM_E2E_MEMORY: "1G"
      SEQDESK_SLURM_E2E_TIME_LIMIT: "10"
      # Pipeline id the runtime smoke drives through both local and SLURM modes.
      RUNTIME_PIPELINE_ID: ${{ github.event.inputs.runtime_pipeline_id || 'fastq-checksum' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          miniconda-version: latest

      - name: Configure run paths
        run: |
          set -euo pipefail
          RUN_SUFFIX="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-slurm"
          PORT=$((23000 + (GITHUB_RUN_NUMBER % 1000)))
          DB_NAME="seqdesk_slurm_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          echo "DB_NAME=$DB_NAME" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/server-slurm-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "RUNTIME_E2E_LOG=$RUNNER_TEMP/runtime-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "SLURM_E2E_LOG=$RUNNER_TEMP/slurm-e2e-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/providers-slurm-$RUN_SUFFIX.json" >> "$GITHUB_ENV"
          echo "SEQDESK_DATA_DIR=$RUNNER_TEMP/seqdesk-data-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "SEQDESK_RUN_DIR=$RUNNER_TEMP/seqdesk-runs-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "SEQDESK_DB_DIR=$RUNNER_TEMP/seqdesk-pipeline-dbs-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "PGDATA_DIR=$RUNNER_TEMP/postgres-slurm-$RUN_SUFFIX" >> "$GITHUB_ENV"
          echo "PG_LOG=$RUNNER_TEMP/postgres-slurm-$RUN_SUFFIX.log" >> "$GITHUB_ENV"
          echo "PG_TOOLCHAIN_DIR=$RUNNER_TEMP/seqdesk-postgres-tools-slurm-$RUN_SUFFIX" >> "$GITHUB_ENV"

      - name: Verify SLURM is available on the runner
        run: |
          set -euo pipefail
          missing=0
          for cmd in sbatch squeue sacct; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "Found $cmd: $(command -v "$cmd")"
            else
              echo "Missing required SLURM command on runner: $cmd" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "This workflow requires sbatch/squeue/sacct on the self-hosted runner." >&2
            exit 1
          fi

      - name: Create pipeline Conda environment
        run: |
          conda create -y -n "$PIPELINE_CONDA_ENV" \
            --override-channels \
            -c conda-forge \
            -c bioconda \
            python=3.11 \
            openjdk=17 \
            nodejs \
            coreutils \
            nextflow \
            nf-core

      - name: Resolve Conda base and toolchain on PATH
        run: |
          set -euo pipefail
          CONDA_BASE="$(conda info --base)"
          echo "SEQDESK_CONDA_PATH=$CONDA_BASE" >> "$GITHUB_ENV"
          # Put the pipeline env tools (nextflow/java) on PATH so the app server can
          # locate them while still leaving the system SLURM binaries reachable.
          echo "$CONDA_BASE/envs/$PIPELINE_CONDA_ENV/bin" >> "$GITHUB_PATH"

      - name: Setup PostgreSQL toolchain
        run: |
          set -euo pipefail
          rm -rf "$PG_TOOLCHAIN_DIR"
          conda create -y -p "$PG_TOOLCHAIN_DIR" --override-channels -c conda-forge postgresql
          echo "$PG_TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"

      - name: Ensure PostgreSQL database
        run: |
          set -euo pipefail

          find_pg_bin_dir() {
            local candidate=""
            if command -v initdb >/dev/null 2>&1 && command -v pg_ctl >/dev/null 2>&1; then
              dirname "$(command -v initdb)"
              return 0
            fi
            if command -v pg_config >/dev/null 2>&1; then
              candidate="$(pg_config --bindir 2>/dev/null || true)"
              if [ -n "$candidate" ] && [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            fi
            for candidate in /usr/pgsql-*/bin /usr/lib/postgresql/*/bin; do
              if [ -x "$candidate/initdb" ] && [ -x "$candidate/pg_ctl" ]; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          create_seqdesk_database() {
            local port="$1"
            local admin_user="$2"
            local admin_password="${3:-}"
            if [ -n "$admin_password" ]; then
              export PGPASSWORD="$admin_password"
            else
              unset PGPASSWORD || true
            fi
            psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "DO \$\$ BEGIN CREATE ROLE $DB_USER LOGIN PASSWORD '$DB_PASSWORD'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE $DB_USER WITH PASSWORD '$DB_PASSWORD'; END \$\$;"
            if ! psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1; then
              psql -h "$DB_HOST" -p "$port" -U "$admin_user" -d postgres -c "CREATE DATABASE $DB_NAME OWNER $DB_USER"
            fi
          }

          wait_for_postgres() {
            local port="$1"
            for _ in $(seq 1 30); do
              if pg_isready -h "$DB_HOST" -p "$port" >/dev/null 2>&1; then
                return 0
              fi
              sleep 1
            done
            return 1
          }

          if pg_isready -h "$DB_HOST" -p "$DB_PORT" >/dev/null 2>&1; then
            if create_seqdesk_database "$DB_PORT" postgres; then
              echo "Using existing local PostgreSQL on port $DB_PORT."
              exit 0
            fi
          fi

          PG_BIN_DIR="$(find_pg_bin_dir || true)"
          if [ -n "$PG_BIN_DIR" ]; then
            rm -rf "$PGDATA_DIR"
            "$PG_BIN_DIR/initdb" -D "$PGDATA_DIR" -U postgres -A trust >/dev/null
            {
              echo "listen_addresses = '127.0.0.1'"
              echo "port = $FALLBACK_DB_PORT"
            } >> "$PGDATA_DIR/postgresql.conf"
            "$PG_BIN_DIR/pg_ctl" -D "$PGDATA_DIR" -l "$PG_LOG" start
            wait_for_postgres "$FALLBACK_DB_PORT"
            create_seqdesk_database "$FALLBACK_DB_PORT" postgres
            echo "DB_PORT=$FALLBACK_DB_PORT" >> "$GITHUB_ENV"
            echo "USE_EPHEMERAL_POSTGRES=1" >> "$GITHUB_ENV"
            echo "PG_CTL_BIN=$PG_BIN_DIR/pg_ctl" >> "$GITHUB_ENV"
            echo "Provisioned PostgreSQL via temporary user-space cluster."
            exit 0
          fi

          echo "PostgreSQL provisioning requires existing local PostgreSQL or user-space PostgreSQL tools."
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Set database connection environment
        run: |
          set -euo pipefail
          DB_URL="postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?schema=public"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "DIRECT_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npm run db:migrate:deploy

      - name: Seed database (admin + researcher accounts)
        run: npm run db:seed

      - name: Build SeqDesk app
        run: npm run build

      - name: Boot SeqDesk app and verify readiness
        run: |
          set -euo pipefail
          mkdir -p "$SEQDESK_DATA_DIR" "$SEQDESK_RUN_DIR" "$SEQDESK_DB_DIR"
          # Wire pipeline + conda execution into the running app so SLURM submissions
          # generate real #SBATCH scripts and activate the Nextflow toolchain.
          export NEXTAUTH_URL="http://127.0.0.1:${PORT}"
          export NEXTAUTH_SECRET="pipeline-slurm-e2e-secret"
          export SEQDESK_PIPELINES_ENABLED=true
          export SEQDESK_DATA_PATH="$SEQDESK_DATA_DIR"
          export SEQDESK_PIPELINE_RUN_DIR="$SEQDESK_RUN_DIR"
          export SEQDESK_PIPELINE_DATABASE_DIR="$SEQDESK_DB_DIR"
          export SEQDESK_CONDA_ENABLED=true
          export SEQDESK_CONDA_PATH="$SEQDESK_CONDA_PATH"
          export SEQDESK_CONDA_ENV="$PIPELINE_CONDA_ENV"
          export SEQDESK_SLURM_ENABLED=true
          PORT="$PORT" npm run start >"$SERVER_LOG" 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time." >&2
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          echo "SeqDesk app is ready on port $PORT."

      - name: Run runtime pipeline E2E (local + SLURM through the app)
        env:
          SEQDESK_RUNTIME_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_RUNTIME_E2E_EMAIL: admin@example.com
          SEQDESK_RUNTIME_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          npm run pipeline:e2e:runtime -- \
            --ensure-dummy-data \
            --pipeline-id "$RUNTIME_PIPELINE_ID" \
            2>&1 | tee "$RUNTIME_E2E_LOG"

      - name: Run SLURM-only pipeline smoke through the app
        env:
          SEQDESK_SLURM_E2E_BASE_URL: http://127.0.0.1:${{ env.PORT }}
          SEQDESK_SLURM_E2E_EMAIL: admin@example.com
          SEQDESK_SLURM_E2E_PASSWORD: admin
        run: |
          set -euo pipefail
          npm run pipeline:e2e:slurm 2>&1 | tee "$SLURM_E2E_LOG"

      - name: Stop SeqDesk app
        if: always()
        run: |
          set +e
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          fi

      - name: Upload SLURM pipeline E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-slurm-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SERVER_LOG }}
            ${{ env.RUNTIME_E2E_LOG }}
            ${{ env.SLURM_E2E_LOG }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.PG_LOG }}
            ${{ env.SEQDESK_RUN_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup resources
        if: always()
        run: |
          set +e
          if [ "${USE_EPHEMERAL_POSTGRES:-0}" = "1" ] && [ -n "${PGDATA_DIR:-}" ] && [ -n "${PG_CTL_BIN:-}" ]; then
            "$PG_CTL_BIN" -D "$PGDATA_DIR" stop -m fast || true
            rm -rf "$PGDATA_DIR"
          fi
          if command -v psql >/dev/null 2>&1; then
            PGPASSWORD="${DB_PASSWORD:-seqdesk}" psql -h "${DB_HOST:-127.0.0.1}" -p "${DB_PORT:-5432}" -U "${DB_USER:-seqdesk}" -d postgres -c "DROP DATABASE IF EXISTS ${DB_NAME:-seqdesk_slurm_missing}" >/dev/null 2>&1 || true
          fi
          conda env remove -n "$PIPELINE_CONDA_ENV" || true
          rm -rf "${PG_TOOLCHAIN_DIR:-}" "${SEQDESK_DATA_DIR:-}" "${SEQDESK_RUN_DIR:-}" "${SEQDESK_DB_DIR:-}"
