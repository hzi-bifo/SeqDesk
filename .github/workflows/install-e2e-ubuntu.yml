name: Install (Ubuntu)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-public-release-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build release tarball
        env:
          DATABASE_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public
          DIRECT_URL: postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          bash "$GITHUB_WORKSPACE/scripts/build-release.sh" "$VERSION" --offline-fonts --webpack
          mkdir -p "$RUNNER_TEMP/public-release-tarball"
          cp "$GITHUB_WORKSPACE/seqdesk-${VERSION}.tar.gz" "$RUNNER_TEMP/public-release-tarball/"

      - name: Upload public release tarball
        uses: actions/upload-artifact@v4
        with:
          name: public-release-tarball
          path: ${{ runner.temp }}/public-release-tarball/*
          if-no-files-found: error
          retention-days: 14

  public-installer-ubuntu:
    needs: build-public-release-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE seqdesk LOGIN PASSWORD 'seqdesk'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE seqdesk WITH PASSWORD 'seqdesk'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'seqdesk'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE seqdesk OWNER seqdesk"
          fi

      - name: Configure paths
        run: |
          echo "PORT=8787" >> "$GITHUB_ENV"
          echo "RECONFIG_PORT=8789" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$RUNNER_TEMP/seqdesk-public" >> "$GITHUB_ENV"
          echo "INFRA_CONFIG=$RUNNER_TEMP/infrastructure-public.json" >> "$GITHUB_ENV"
          echo "RECONFIG_CONFIG=$RUNNER_TEMP/infrastructure-public-reconfigure.json" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/public-install.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/public-server.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/public-providers.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/public-seqdesk.config.json" >> "$GITHUB_ENV"
          echo "RELEASE_ARTIFACT_DIR=$RUNNER_TEMP/public-release-artifact" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_ROOT=$RUNNER_TEMP/public-release-server" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_PORT=8791" >> "$GITHUB_ENV"
          echo "MOCK_SERVER_LOG=$RUNNER_TEMP/public-release-server.log" >> "$GITHUB_ENV"

      - name: Download public release tarball
        uses: actions/download-artifact@v4
        with:
          name: public-release-tarball
          path: ${{ env.RELEASE_ARTIFACT_DIR }}

      - name: Prepare mock release metadata
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_DATE="$(date -u +%F)"
          mkdir -p "$MOCK_RELEASE_ROOT/api" "$MOCK_RELEASE_ROOT/downloads"
          TARBALL_PATH="$(find "$RELEASE_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tar.gz' | head -n 1)"
          if [ -z "$TARBALL_PATH" ]; then
            echo "Release tarball not found in $RELEASE_ARTIFACT_DIR"
            exit 1
          fi
          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          cp "$TARBALL_PATH" "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME"
          CHECKSUM="sha256:$(sha256sum "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME" | cut -d' ' -f1)"
          cat > "$MOCK_RELEASE_ROOT/api/version" <<EOF
          {"latest":{"version":"$VERSION","channel":"stable","releaseDate":"$RELEASE_DATE","downloadUrl":"http://127.0.0.1:$MOCK_RELEASE_PORT/downloads/$TARBALL_NAME","checksum":"$CHECKSUM","releaseNotes":"CI e2e test release artifact","minNodeVersion":"18.0.0"},"updateAvailable":false,"currentVersion":null}
          EOF

      - name: Create infrastructure JSON
        run: |
          cat > "$INFRA_CONFIG" <<EOF
          {
            "port": $PORT,
            "pipelinesEnabled": false,
            "nextAuthUrl": "http://127.0.0.1:$PORT",
            "databaseUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public",
            "directUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public"
          }
          EOF
          cat > "$RECONFIG_CONFIG" <<EOF
          {
            "port": $RECONFIG_PORT,
            "pipelinesEnabled": false,
            "nextAuthUrl": "http://127.0.0.1:$RECONFIG_PORT",
            "databaseUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public",
            "directUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public"
          }
          EOF

      - name: Run public installer (headless)
        run: |
          set -euo pipefail
          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null; then
              break
            fi
            sleep 1
          done
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" SEQDESK_LOG="$INSTALL_LOG" \
            bash "$GITHUB_WORKSPACE/scripts/install-dist.sh" \
            -y --without-pipelines --no-pm2 --dir "$INSTALL_DIR" --config "$INFRA_CONFIG"

      - name: Verify install artifacts
        run: |
          set -euo pipefail
          test -f "$INSTALL_DIR/package.json"
          test -f "$INSTALL_DIR/seqdesk.config.json"
          test -x "$INSTALL_DIR/start.sh"
          cp "$INSTALL_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"

      - name: Validate initial config values
        run: |
          set -euo pipefail
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$INSTALL_DIR/seqdesk.config.json" \
            --expected-port "$PORT"

      - name: Reconfigure public install in place
        run: |
          set -euo pipefail
          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null; then
              break
            fi
            sleep 1
          done
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" SEQDESK_LOG="$INSTALL_LOG" \
            bash "$GITHUB_WORKSPACE/scripts/install-dist.sh" \
            -y --reconfigure --without-pipelines --no-pm2 --dir "$INSTALL_DIR" --config "$RECONFIG_CONFIG"

      - name: Validate reconfigured config values
        run: |
          set -euo pipefail
          cp "$INSTALL_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$INSTALL_DIR/seqdesk.config.json" \
            --expected-port "$RECONFIG_PORT"

      - name: Verify public app startup and auth flows
        run: |
          set -euo pipefail
          cd "$INSTALL_DIR"

          ./start.sh "$RECONFIG_PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          READY=0
          for _ in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:${RECONFIG_PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${RECONFIG_PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${RECONFIG_PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"

      - name: Upload install e2e artifacts (public installer)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-public-ubuntu
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.MOCK_SERVER_LOG }}
          if-no-files-found: warn
          retention-days: 14

  source-installer-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE seqdesk LOGIN PASSWORD 'seqdesk'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE seqdesk WITH PASSWORD 'seqdesk'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'seqdesk'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE seqdesk OWNER seqdesk"
          fi

      - name: Configure paths
        run: |
          echo "PORT=8788" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$RUNNER_TEMP/seqdesk-source" >> "$GITHUB_ENV"
          echo "INFRA_CONFIG=$RUNNER_TEMP/infrastructure-source.json" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/source-install.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/source-server.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/source-providers.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/source-seqdesk.config.json" >> "$GITHUB_ENV"
          echo "STORE_E2E_JSON=$RUNNER_TEMP/source-store-e2e.json" >> "$GITHUB_ENV"

      - name: Create infrastructure JSON
        run: |
          cat > "$INFRA_CONFIG" <<EOF
          {
            "port": $PORT,
            "pipelinesEnabled": false,
            "nextAuthUrl": "http://127.0.0.1:$PORT",
            "databaseUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public",
            "directUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public"
          }
          EOF

      - name: Run source installer (headless)
        run: |
          set -euo pipefail
          SEQDESK_REPO="file://$GITHUB_WORKSPACE" SEQDESK_LOG="$INSTALL_LOG" bash "$GITHUB_WORKSPACE/scripts/install.sh" \
            -y --without-pipelines --branch "$GITHUB_REF_NAME" --dir "$INSTALL_DIR" --config "$INFRA_CONFIG"

      - name: Verify install artifacts
        run: |
          set -euo pipefail
          test -f "$INSTALL_DIR/package.json"
          test -f "$INSTALL_DIR/seqdesk.config.json"
          test -x "$INSTALL_DIR/start.sh"
          cp "$INSTALL_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"

      - name: Validate installed config values
        run: |
          set -euo pipefail
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$INSTALL_DIR/seqdesk.config.json" \
            --expected-port "$PORT"

      - name: Verify source app startup, auth flows, and pipeline store
        run: |
          set -euo pipefail
          cd "$INSTALL_DIR"

          ./start.sh "$PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          READY=0
          for _ in $(seq 1 180); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"
          node "$GITHUB_WORKSPACE/scripts/run-pipeline-store-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --pipeline-ids "mag,submg" \
            --result-file "$STORE_E2E_JSON"

      - name: Upload install e2e artifacts (source installer)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-source-ubuntu
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.STORE_E2E_JSON }}
          if-no-files-found: warn
          retention-days: 14

  public-installer-ubuntu-pm2:
    needs: build-public-release-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE seqdesk LOGIN PASSWORD 'seqdesk'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE seqdesk WITH PASSWORD 'seqdesk'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'seqdesk'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE seqdesk OWNER seqdesk"
          fi

      - name: Configure paths
        run: |
          echo "PORT=8790" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$RUNNER_TEMP/seqdesk-public-pm2" >> "$GITHUB_ENV"
          echo "INFRA_CONFIG=$RUNNER_TEMP/infrastructure-public-pm2.json" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/public-pm2-install.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/public-pm2-server.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/public-pm2-providers.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/public-pm2-seqdesk.config.json" >> "$GITHUB_ENV"
          echo "PM2_INFO=$RUNNER_TEMP/public-pm2-info.txt" >> "$GITHUB_ENV"
          echo "PM2_HOME=$RUNNER_TEMP/public-pm2-home" >> "$GITHUB_ENV"
          echo "RELEASE_ARTIFACT_DIR=$RUNNER_TEMP/public-release-artifact" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_ROOT=$RUNNER_TEMP/public-release-server" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_PORT=8792" >> "$GITHUB_ENV"
          echo "MOCK_SERVER_LOG=$RUNNER_TEMP/public-pm2-release-server.log" >> "$GITHUB_ENV"

      - name: Download public release tarball
        uses: actions/download-artifact@v4
        with:
          name: public-release-tarball
          path: ${{ env.RELEASE_ARTIFACT_DIR }}

      - name: Prepare mock release metadata
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_DATE="$(date -u +%F)"
          mkdir -p "$MOCK_RELEASE_ROOT/api" "$MOCK_RELEASE_ROOT/downloads"
          TARBALL_PATH="$(find "$RELEASE_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tar.gz' | head -n 1)"
          if [ -z "$TARBALL_PATH" ]; then
            echo "Release tarball not found in $RELEASE_ARTIFACT_DIR"
            exit 1
          fi
          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          cp "$TARBALL_PATH" "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME"
          CHECKSUM="sha256:$(sha256sum "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME" | cut -d' ' -f1)"
          cat > "$MOCK_RELEASE_ROOT/api/version" <<EOF
          {"latest":{"version":"$VERSION","channel":"stable","releaseDate":"$RELEASE_DATE","downloadUrl":"http://127.0.0.1:$MOCK_RELEASE_PORT/downloads/$TARBALL_NAME","checksum":"$CHECKSUM","releaseNotes":"CI e2e test release artifact","minNodeVersion":"18.0.0"},"updateAvailable":false,"currentVersion":null}
          EOF

      - name: Create infrastructure JSON
        run: |
          cat > "$INFRA_CONFIG" <<EOF
          {
            "port": $PORT,
            "pipelinesEnabled": false,
            "nextAuthUrl": "http://127.0.0.1:$PORT",
            "databaseUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public",
            "directUrl": "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public"
          }
          EOF

      - name: Run public installer with PM2
        run: |
          set -euo pipefail
          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null; then
              break
            fi
            sleep 1
          done
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" SEQDESK_LOG="$INSTALL_LOG" \
            bash "$GITHUB_WORKSPACE/scripts/install-dist.sh" \
            -y --without-pipelines --use-pm2 --dir "$INSTALL_DIR" --config "$INFRA_CONFIG"

      - name: Verify install artifacts
        run: |
          set -euo pipefail
          test -f "$INSTALL_DIR/package.json"
          test -f "$INSTALL_DIR/seqdesk.config.json"
          test -x "$INSTALL_DIR/start.sh"
          cp "$INSTALL_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"

      - name: Validate installed config values
        run: |
          set -euo pipefail
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$INSTALL_DIR/seqdesk.config.json" \
            --expected-port "$PORT"

      - name: Verify PM2 process exists
        run: |
          set -euo pipefail
          if command -v pm2 >/dev/null 2>&1; then
            PM2_BIN="$(command -v pm2)"
          elif [ -x "$INSTALL_DIR/node_modules/.bin/pm2" ]; then
            PM2_BIN="$INSTALL_DIR/node_modules/.bin/pm2"
          else
            echo "PM2 binary not found"
            exit 1
          fi
          echo "PM2_BIN=$PM2_BIN" >> "$GITHUB_ENV"
          "$PM2_BIN" describe seqdesk >"$PM2_INFO"

      - name: Wait for PM2-managed app
        run: |
          set -euo pipefail
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            "${PM2_BIN}" logs seqdesk --nostream --lines 200 || true
            exit 1
          fi

      - name: Assert credentials provider exists
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"

      - name: Verify researcher login works
        run: |
          set -euo pipefail
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"

      - name: Verify admin login works
        run: |
          set -euo pipefail
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"

      - name: Capture PM2 logs
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${PM2_BIN:-}" ]; then
            "${PM2_BIN}" logs seqdesk --nostream --lines 200 >"$SERVER_LOG" 2>&1 || true
          fi

      - name: Upload install e2e artifacts (public installer PM2)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-public-ubuntu-pm2
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.PM2_INFO }}
            ${{ env.MOCK_SERVER_LOG }}
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup PM2 process
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${PM2_BIN:-}" ]; then
            "${PM2_BIN}" delete seqdesk >/dev/null 2>&1 || true
          fi

  npm-launcher-ubuntu:
    name: Install via npm launcher (npm i -g seqdesk)
    needs: build-public-release-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE seqdesk LOGIN PASSWORD 'seqdesk'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE seqdesk WITH PASSWORD 'seqdesk'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'seqdesk'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE seqdesk OWNER seqdesk"
          fi

      - name: Configure paths
        run: |
          echo "PORT=8793" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$RUNNER_TEMP/seqdesk-npm-launcher" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/npm-launcher-install.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/npm-launcher-server.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/npm-launcher-providers.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/npm-launcher-seqdesk.config.json" >> "$GITHUB_ENV"
          echo "RELEASE_ARTIFACT_DIR=$RUNNER_TEMP/npm-launcher-release-artifact" >> "$GITHUB_ENV"
          echo "NPM_ARTIFACT_DIR=$RUNNER_TEMP/npm-launcher-package" >> "$GITHUB_ENV"
          echo "NPM_CACHE=$RUNNER_TEMP/npm-launcher-cache" >> "$GITHUB_ENV"
          echo "NPM_PREFIX=$RUNNER_TEMP/npm-launcher-prefix" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_ROOT=$RUNNER_TEMP/npm-launcher-release-server" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_PORT=8794" >> "$GITHUB_ENV"
          echo "MOCK_SERVER_LOG=$RUNNER_TEMP/npm-launcher-release-server.log" >> "$GITHUB_ENV"
          echo "NPM_PACK_METADATA=$RUNNER_TEMP/npm-launcher-pack.txt" >> "$GITHUB_ENV"

      - name: Download public release tarball
        uses: actions/download-artifact@v4
        with:
          name: public-release-tarball
          path: ${{ env.RELEASE_ARTIFACT_DIR }}

      - name: Pack npm launcher
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/npm/seqdesk"
          npm run sync-version
          mkdir -p "$NPM_ARTIFACT_DIR"
          npm pack --pack-destination "$NPM_ARTIFACT_DIR" > "$NPM_ARTIFACT_DIR/npm-pack-name.txt"
          npm pack --dry-run > "$NPM_ARTIFACT_DIR/npm-pack-dry-run.txt" 2>&1

      - name: Prepare mock installer and release metadata
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_DATE="$(date -u +%F)"
          mkdir -p "$MOCK_RELEASE_ROOT/api" "$MOCK_RELEASE_ROOT/downloads"
          cp "$GITHUB_WORKSPACE/scripts/install-dist.sh" "$MOCK_RELEASE_ROOT/install.sh"
          TARBALL_PATH="$(find "$RELEASE_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tar.gz' | head -n 1)"
          if [ -z "$TARBALL_PATH" ]; then
            echo "Release tarball not found in $RELEASE_ARTIFACT_DIR"
            exit 1
          fi
          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          cp "$TARBALL_PATH" "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME"
          CHECKSUM="sha256:$(sha256sum "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME" | cut -d' ' -f1)"
          cat > "$MOCK_RELEASE_ROOT/api/version" <<EOF
          {"latest":{"version":"$VERSION","channel":"stable","releaseDate":"$RELEASE_DATE","downloadUrl":"http://127.0.0.1:$MOCK_RELEASE_PORT/downloads/$TARBALL_NAME","checksum":"$CHECKSUM","releaseNotes":"CI npm launcher e2e release artifact","minNodeVersion":"18.0.0"},"updateAvailable":false,"currentVersion":null}
          EOF

      - name: Install globally via npm and run launcher (npm i -g seqdesk)
        run: |
          set -euo pipefail
          NPM_TGZ="$(find "$NPM_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tgz' | head -n 1)"
          if [ -z "$NPM_TGZ" ]; then
            echo "Npm launcher tarball not found in $NPM_ARTIFACT_DIR"
            exit 1
          fi
          cp "$NPM_ARTIFACT_DIR/npm-pack-dry-run.txt" "$NPM_PACK_METADATA"
          npm install -g "$NPM_TGZ" --prefix "$NPM_PREFIX" --cache "$NPM_CACHE"

          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null && \
               curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" >/dev/null; then
              break
            fi
            sleep 1
          done

          PATH="$NPM_PREFIX/bin:$PATH" \
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" \
          SEQDESK_INSTALL_URL="http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" \
          SEQDESK_LOG="$INSTALL_LOG" \
            seqdesk \
              -y \
              --without-pipelines \
              --no-pm2 \
              --dir "$INSTALL_DIR" \
              --port "$PORT" \
              --nextauth-url "http://127.0.0.1:$PORT" \
              --database-url "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public" \
              --database-direct-url "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk?schema=public"

      - name: Verify install artifacts and config
        run: |
          set -euo pipefail
          test -f "$INSTALL_DIR/package.json"
          test -f "$INSTALL_DIR/seqdesk.config.json"
          test -x "$INSTALL_DIR/start.sh"
          cp "$INSTALL_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$INSTALL_DIR/seqdesk.config.json" \
            --expected-port "$PORT"

      - name: Verify installed app startup, DB migrate, and auth flows
        run: |
          set -euo pipefail
          cd "$INSTALL_DIR"
          ./start.sh "$PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "user@example.com" \
            --password "user" \
            --expected-role "RESEARCHER"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"

      - name: Upload npm launcher e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-npm-launcher-ubuntu
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.MOCK_SERVER_LOG }}
            ${{ env.NPM_PACK_METADATA }}
          if-no-files-found: warn
          retention-days: 14

  install-profile-fixture-ubuntu:
    name: Apply checked-in install profile (no secret)
    needs: build-public-release-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PROFILE_ID: ci-fixture
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "DO \$\$ BEGIN CREATE ROLE seqdesk LOGIN PASSWORD 'seqdesk'; EXCEPTION WHEN duplicate_object THEN ALTER ROLE seqdesk WITH PASSWORD 'seqdesk'; END \$\$;"
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'seqdesk_profile_fixture'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE DATABASE seqdesk_profile_fixture OWNER seqdesk"
          fi

      - name: Configure paths
        run: |
          echo "PORT=8795" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$RUNNER_TEMP/seqdesk-profile-fixture" >> "$GITHUB_ENV"
          echo "INSTALL_LOG=$RUNNER_TEMP/profile-fixture-install.log" >> "$GITHUB_ENV"
          echo "SERVER_LOG=$RUNNER_TEMP/profile-fixture-server.log" >> "$GITHUB_ENV"
          echo "PROVIDERS_JSON=$RUNNER_TEMP/profile-fixture-providers.json" >> "$GITHUB_ENV"
          echo "CONFIG_SNAPSHOT=$RUNNER_TEMP/profile-fixture-seqdesk.config.json" >> "$GITHUB_ENV"
          echo "PROFILE_ASSERT_JSON=$RUNNER_TEMP/profile-fixture-assert.json" >> "$GITHUB_ENV"
          echo "FIXTURE_PROFILE=$GITHUB_WORKSPACE/.github/fixtures/ci-install-profile.json" >> "$GITHUB_ENV"
          echo "RELEASE_ARTIFACT_DIR=$RUNNER_TEMP/profile-fixture-release-artifact" >> "$GITHUB_ENV"
          echo "NPM_ARTIFACT_DIR=$RUNNER_TEMP/profile-fixture-npm-package" >> "$GITHUB_ENV"
          echo "NPM_CACHE=$RUNNER_TEMP/profile-fixture-npm-cache" >> "$GITHUB_ENV"
          echo "NPM_PREFIX=$RUNNER_TEMP/profile-fixture-npm-prefix" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_ROOT=$RUNNER_TEMP/profile-fixture-release-server" >> "$GITHUB_ENV"
          echo "MOCK_RELEASE_PORT=8796" >> "$GITHUB_ENV"
          echo "MOCK_SERVER_LOG=$RUNNER_TEMP/profile-fixture-release-server.log" >> "$GITHUB_ENV"

      - name: Download public release tarball
        uses: actions/download-artifact@v4
        with:
          name: public-release-tarball
          path: ${{ env.RELEASE_ARTIFACT_DIR }}

      - name: Pack npm launcher
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/npm/seqdesk"
          npm run sync-version
          mkdir -p "$NPM_ARTIFACT_DIR"
          npm pack --pack-destination "$NPM_ARTIFACT_DIR" > "$NPM_ARTIFACT_DIR/npm-pack-name.txt"

      - name: Prepare mock installer and release metadata
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_DATE="$(date -u +%F)"
          mkdir -p "$MOCK_RELEASE_ROOT/api" "$MOCK_RELEASE_ROOT/downloads"
          cp "$GITHUB_WORKSPACE/scripts/install-dist.sh" "$MOCK_RELEASE_ROOT/install.sh"
          TARBALL_PATH="$(find "$RELEASE_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tar.gz' | head -n 1)"
          if [ -z "$TARBALL_PATH" ]; then
            echo "Release tarball not found in $RELEASE_ARTIFACT_DIR"
            exit 1
          fi
          TARBALL_NAME="$(basename "$TARBALL_PATH")"
          cp "$TARBALL_PATH" "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME"
          CHECKSUM="sha256:$(sha256sum "$MOCK_RELEASE_ROOT/downloads/$TARBALL_NAME" | cut -d' ' -f1)"
          cat > "$MOCK_RELEASE_ROOT/api/version" <<EOF
          {"latest":{"version":"$VERSION","channel":"stable","releaseDate":"$RELEASE_DATE","downloadUrl":"http://127.0.0.1:$MOCK_RELEASE_PORT/downloads/$TARBALL_NAME","checksum":"$CHECKSUM","releaseNotes":"CI install profile fixture release artifact","minNodeVersion":"18.0.0"},"updateAvailable":false,"currentVersion":null}
          EOF

      - name: Install side-by-side without profile through npm launcher
        run: |
          set -euo pipefail
          NPM_TGZ="$(find "$NPM_ARTIFACT_DIR" -maxdepth 1 -name 'seqdesk-*.tgz' | head -n 1)"
          if [ -z "$NPM_TGZ" ]; then
            echo "Npm launcher tarball not found in $NPM_ARTIFACT_DIR"
            exit 1
          fi
          npm install -g "$NPM_TGZ" --prefix "$NPM_PREFIX" --cache "$NPM_CACHE"

          cd "$MOCK_RELEASE_ROOT"
          python3 -m http.server "$MOCK_RELEASE_PORT" --bind 127.0.0.1 >>"$MOCK_SERVER_LOG" 2>&1 &
          MOCK_SERVER_PID=$!
          cleanup() {
            kill "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
            wait "$MOCK_SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/api/version" >/dev/null && \
               curl -fsS "http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" >/dev/null; then
              break
            fi
            sleep 1
          done

          PATH="$NPM_PREFIX/bin:$PATH" \
          SEQDESK_API="http://127.0.0.1:${MOCK_RELEASE_PORT}/api" \
          SEQDESK_INSTALL_URL="http://127.0.0.1:${MOCK_RELEASE_PORT}/install.sh" \
          SEQDESK_LOG="$INSTALL_LOG" \
            seqdesk \
              -y \
              --without-pipelines \
              --no-pm2 \
              --dir "$INSTALL_DIR" \
              --port "$PORT" \
              --nextauth-url "http://127.0.0.1:$PORT" \
              --database-url "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_profile_fixture?schema=public" \
              --database-direct-url "postgresql://seqdesk:seqdesk@127.0.0.1:5432/seqdesk_profile_fixture?schema=public"

      - name: Apply checked-in install profile via --profile-config (no secret)
        run: |
          set -euo pipefail
          test -f "$FIXTURE_PROFILE"
          # A release/launcher install lays the app (scripts, .env, node_modules)
          # out under $INSTALL_DIR/current; seqdesk.config.json is at the install
          # root (symlinked into current). Run apply from the app dir so apply-core
          # finds .env (DB connection) and writes the install's seqdesk.config.json.
          if [ -f "$INSTALL_DIR/current/scripts/apply-install-profile.mjs" ]; then
            APP_DIR="$INSTALL_DIR/current"
          elif [ -f "$INSTALL_DIR/scripts/apply-install-profile.mjs" ]; then
            APP_DIR="$INSTALL_DIR"
          else
            echo "apply-install-profile.mjs not found under $INSTALL_DIR or $INSTALL_DIR/current"
            ls -la "$INSTALL_DIR" "$INSTALL_DIR/current" 2>/dev/null || true
            exit 1
          fi
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
          cd "$APP_DIR"
          node scripts/apply-install-profile.mjs --profile-config "$FIXTURE_PROFILE"

      - name: Assert install profile applied (Prisma DB + config persistence)
        run: |
          set -euo pipefail
          CONFIG_DIR="${APP_DIR:-$INSTALL_DIR}"
          cp "$CONFIG_DIR/seqdesk.config.json" "$CONFIG_SNAPSHOT"
          node "$GITHUB_WORKSPACE/scripts/assert-installed-config.mjs" \
            --file "$CONFIG_DIR/seqdesk.config.json" \
            --expected-port "$PORT" >/dev/null
          INSTALL_DIR="$INSTALL_DIR" APP_DIR="${APP_DIR:-$INSTALL_DIR}" PROFILE_ID="$PROFILE_ID" PROFILE_ASSERT_JSON="$PROFILE_ASSERT_JSON" \
          node --input-type=module -e '
            import fs from "node:fs";
            import path from "node:path";
            import { createRequire } from "node:module";

            const installDir = process.env.INSTALL_DIR;
            const appDir = process.env.APP_DIR || installDir;
            const expectedProfileId = process.env.PROFILE_ID;
            const expectedDeviceId = "ont-minion-mk1d";

            function fail(message) {
              console.error("ASSERT FAIL: " + message);
              process.exit(1);
            }
            function parseJsonObject(raw, label) {
              if (!raw) return {};
              try {
                const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
                if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
              } catch (error) {
                fail("Failed to parse " + label + ": " + (error && error.message ? error.message : error));
              }
              return {};
            }
            function requireField(items, name, label) {
              if (!Array.isArray(items) || !items.some((item) => item && item.name === name)) {
                fail("Expected " + label + " field " + name + " to be present");
              }
            }

            // seqdesk.config.json persistence of safe install profile metadata
            const configPath = path.join(appDir, "seqdesk.config.json");
            const config = parseJsonObject(fs.readFileSync(configPath, "utf8"), configPath);
            if (!config.installProfile || config.installProfile.id !== expectedProfileId) {
              fail("seqdesk.config.json installProfile.id mismatch, got " + JSON.stringify(config.installProfile));
            }

            // Real Prisma DB reads from the installed app
            const databaseUrl = config && config.runtime && config.runtime.databaseUrl;
            if (typeof databaseUrl !== "string" || databaseUrl.trim().length === 0) {
              fail("Installed config does not include runtime.databaseUrl");
            }
            process.env.DATABASE_URL = databaseUrl;
            process.env.DIRECT_URL = (config.runtime && config.runtime.directUrl) || databaseUrl;

            const requireFromInstall = createRequire(path.join(appDir, "package.json"));
            const { PrismaClient } = requireFromInstall("@prisma/client");
            const prisma = new PrismaClient();
            try {
              const [settings, orderForm, pipelineConfigs] = await Promise.all([
                prisma.siteSettings.findUnique({ where: { id: "singleton" } }),
                prisma.orderFormConfig.findUnique({ where: { id: "singleton" } }),
                prisma.pipelineConfig.findMany(),
              ]);
              if (!settings) fail("SiteSettings singleton is missing");
              if (!orderForm) fail("OrderFormConfig singleton is missing");

              const extra = parseJsonObject(settings.extraSettings, "SiteSettings.extraSettings");
              if (!extra.installProfile || extra.installProfile.id !== expectedProfileId) {
                fail("extraSettings.installProfile.id mismatch, got " + JSON.stringify(extra.installProfile));
              }

              const orderSchema = parseJsonObject(orderForm.schema, "OrderFormConfig.schema");
              requireField(orderSchema.fields, "run_type", "order");
              requireField(orderSchema.fields, "internal_sample_code", "order");
              requireField(extra.studyFormFields, "study_experiment_type", "study");
              requireField(extra.sequencingRunSampleFormFields, "barcode", "run assignment");
              requireField(extra.sequencingRunSampleFormFields, "concentration_ng_ul", "run assignment");

              const sequencingTechRaw = extra.sequencingTechConfig;
              const sequencingTech = parseJsonObject(
                typeof sequencingTechRaw === "string" ? sequencingTechRaw : JSON.stringify(sequencingTechRaw),
                "extraSettings.sequencingTechConfig"
              );
              const availableDeviceIds = Array.isArray(sequencingTech.devices)
                ? sequencingTech.devices.filter((d) => d.available).map((d) => d.id)
                : [];
              if (availableDeviceIds.length !== 1 || availableDeviceIds[0] !== expectedDeviceId) {
                fail("Expected only " + expectedDeviceId + " available, got " + availableDeviceIds.join(", "));
              }

              if (settings.enaUsername !== "ci-fixture-webin-user") {
                fail("Expected fixture ENA username, got " + settings.enaUsername);
              }

              const enabledPipelines = pipelineConfigs
                .filter((p) => p.enabled)
                .map((p) => p.pipelineId)
                .sort();
              if (!enabledPipelines.includes("fastq-checksum")) {
                fail("Expected pipeline fastq-checksum to be enabled, got " + enabledPipelines.join(", "));
              }

              const result = {
                installProfile: extra.installProfile,
                availableDeviceIds,
                enabledPipelines,
                orderFields: orderSchema.fields.map((f) => f.name),
              };
              fs.writeFileSync(process.env.PROFILE_ASSERT_JSON, JSON.stringify(result, null, 2));
              process.stdout.write(JSON.stringify(result, null, 2));
            } finally {
              await prisma.$disconnect();
            }
          '

      - name: Verify installed app startup with applied profile
        run: |
          set -euo pipefail
          cd "$INSTALL_DIR"
          ./start.sh "$PORT" >"$SERVER_LOG" 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          READY=0
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/api/auth/providers" >"$PROVIDERS_JSON"; then
              READY=1
              break
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Application did not become ready in time."
            tail -n 200 "$SERVER_LOG" || true
            exit 1
          fi
          node -e '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!payload || typeof payload !== "object" || !Object.prototype.hasOwnProperty.call(payload, "credentials")) {
              console.error("Missing credentials provider in /api/auth/providers response");
              process.exit(1);
            }
          ' "$PROVIDERS_JSON"
          node "$GITHUB_WORKSPACE/scripts/run-auth-e2e.mjs" \
            --base-url "http://127.0.0.1:${PORT}" \
            --email "admin@example.com" \
            --password "admin" \
            --expected-role "FACILITY_ADMIN" \
            --check-path "/api/admin/users"

      - name: Upload install profile fixture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-profile-fixture-ubuntu
          path: |
            ${{ env.INSTALL_LOG }}
            ${{ env.SERVER_LOG }}
            ${{ env.CONFIG_SNAPSHOT }}
            ${{ env.PROVIDERS_JSON }}
            ${{ env.PROFILE_ASSERT_JSON }}
            ${{ env.MOCK_SERVER_LOG }}
          if-no-files-found: warn
          retention-days: 14
