id: 'nf-core-mag-summary'
description: ' - this information is collected when the pipeline is started.'
section_name: 'nf-core/mag Workflow Summary'
section_href: 'https://github.com/nf-core/mag'
plot_type: 'html'
data: |
    <p style="font-size:110%"><b>Input/output options</b></p>
    <dl class="dl-horizontal">
        <dt>input</dt><dd><samp>https://raw.githubusercontent.com/nf-core/test-datasets/mag/samplesheets/samplesheet.multirun.v4.csv</samp></dd>
        <dt>outdir</dt><dd><samp>./pipeline_test_out</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Institutional config options</b></p>
    <dl class="dl-horizontal">
        <dt>config_profile_description</dt><dd><samp>Minimal test dataset to check pipeline function</samp></dd>
        <dt>config_profile_name</dt><dd><samp>Test profile</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Generic options</b></p>
    <dl class="dl-horizontal">
        <dt>trace_report_suffix</dt><dd><samp>2026-01-27_18-24-28</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Reproducibility options</b></p>
    <dl class="dl-horizontal">
        <dt>megahit_fix_cpu_1</dt><dd><samp>true</samp></dd>
        <dt>spades_fix_cpus</dt><dd><samp>1</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Taxonomic profiling options</b></p>
    <dl class="dl-horizontal">
        <dt>cat_db</dt><dd><samp>https://raw.githubusercontent.com/nf-core/test-datasets/mag/databases/cat/minigut_cat.tar.gz</samp></dd>
        <dt>cat_no_suggestive_asterisks</dt><dd><samp>true</samp></dd>
        <dt>gtdb_db</dt><dd><samp>https://raw.githubusercontent.com/nf-core/test-datasets/mag/databases/gtdbtk/gtdbtk_mockup_20250422.tar.gz</samp></dd>
        <dt>gtdbtk_max_contamination</dt><dd><samp>10.0</samp></dd>
        <dt>gtdbtk_min_completeness</dt><dd><samp>0.01</samp></dd>
        <dt>gtdbtk_skip_aniscreen</dt><dd><samp>true</samp></dd>
        <dt>gtdbtk_use_full_tree</dt><dd><samp>true</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Gene prediction and annotation options</b></p>
    <dl class="dl-horizontal">
        <dt>prokka_fast_mode</dt><dd><samp>true</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Binning options</b></p>
    <dl class="dl-horizontal">
        <dt>max_unbinned_contigs</dt><dd><samp>2</samp></dd>
        <dt>min_length_unbinned_contigs</dt><dd><samp>1</samp></dd>
        <dt>skip_comebin</dt><dd><samp>true</samp></dd>
        <dt>skip_concoct</dt><dd><samp>true</samp></dd>
        <dt>skip_metabinner</dt><dd><samp>true</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Bin quality check options</b></p>
    <dl class="dl-horizontal">
        <dt>busco_clean</dt><dd><samp>true</samp></dd>
        <dt>busco_db</dt><dd><samp>https://raw.githubusercontent.com/nf-core/test-datasets/mag/databases/busco/bacteria_odb10.2024-01-08.tar.gz</samp></dd>
        <dt>busco_db_lineage</dt><dd><samp>bacteria_odb10</samp></dd>
        <dt>run_busco</dt><dd><samp>true</samp></dd>
    </dl>
    <p style="font-size:110%"><b>Core Nextflow options</b></p>
    <dl class="dl-horizontal">
        <dt>configFiles</dt><dd><samp>/Users/pmu15/.nextflow/assets/nf-core/mag/nextflow.config</samp></dd>
        <dt>launchDir</dt><dd><samp>/Users/pmu15/Documents/github.com/hzi-bifo/SeqDesk</samp></dd>
        <dt>profile</dt><dd><samp>test,conda</samp></dd>
        <dt>projectDir</dt><dd><samp>/Users/pmu15/.nextflow/assets/nf-core/mag</samp></dd>
        <dt>revision</dt><dd><samp>main</samp></dd>
        <dt>runName</dt><dd><samp>focused_dijkstra</samp></dd>
        <dt>userName</dt><dd><samp>pmu15</samp></dd>
        <dt>workDir</dt><dd><samp>/Users/pmu15/Documents/github.com/hzi-bifo/SeqDesk/work</samp></dd>
    </dl>
