# Conda environment for running nf-core pipelines
# Create with: conda env create -f environment.yml
# Activate with: conda activate seqdesk-pipelines

name: seqdesk-pipelines

channels:
  - bioconda
  - conda-forge

dependencies:
  # Java runtime (required by Nextflow)
  - openjdk>=11

  # Nextflow workflow engine
  - nextflow>=23.04

  # nf-core tools (optional but helpful)
  - nf-core>=2.10

  # Python (for nf-core and other tools)
  - python>=3.10

  # Useful utilities
  - curl
  - wget
  - git
